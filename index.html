  .sidebar{width:220px;padding:24px 14px}.logo-text{display:block}.sidebar-btn span:last-of-type{display:block}
  .sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
  .mb{width:520px;max-width:95%}.mob-nav{display:none}
}
</style>

  <div id="login-form">

let curUser=null,curProfile=null,allUsers=[];

const $=id=>document.getElementById(id);
const bal=()=>txs.reduce((s,t)=>s+(t.tipo==="egreso"?-Math.abs(t.monto):Math.abs(t.monto)),0);

function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}
function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(n){return n?n.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}

function validateLoginForm(){const rut=$("l-rut").value.trim();const pass=$("l-pass").value;$("login-btn").disabled=!(rut&&pass&&pass.length>=6)}
function validateRegisterForm(){const name=$("r-name").value.trim();const rut=$("r-rut").value.trim();const pass=$("r-pass").value;const pass2=$("r-pass2").value;$("register-btn").disabled=!(name&&rut&&pass&&pass2&&pass.length>=6&&pass===pass2)}

function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
  validateLoginForm();validateRegisterForm();
}

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;const btn=$("register-btn");
  if(!name||!rut||!pass||!pass2){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contraseña minimo 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contraseñas no coinciden";return}
  btn.disabled=true;btn.textContent="Creando...";$("r-err").textContent="";
  try{
    const cred=await auth.createUserWithEmailAndPassword(rutToEmail(rut),pass);

async function fbLoad(col,filter=null){try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}}
async function fbSave(col,data){try{const id=data._id||String(Date.now());const d={...data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(id).set(d,{merge:true});return id}catch(e){console.error(e);return null}}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete()}catch(e){console.error(e)}}

async function loadAll(){
  const uid=curUser.uid;
  const catDoc=await db.collection("categories").doc(uid).get();
  userCategories=catDoc.exists?catDoc.data():{...DEFAULT_CATEGORIES};
  
  let txsRaw=await fbLoad("transactions",{f:"uid",v:uid});
  txs=txsRaw.map(tx=>{
    if(!tx.tipo)tx.tipo=tx.amount>0?"ingreso":"egreso";
    if(!tx.monto)tx.monto=Math.abs(tx.amount||0);
    if(!tx.macro&&tx.cat){
      const isExp=tx.amount<0;
      tx.macro=!isExp?"Ingresos":["food","transport","shopping","health","entertainment","emergency","other_exp"].includes(tx.cat)?"Gastos Variables":"Gastos Fijos";
    }
    if(!tx.sub&&tx.cat){
      const m={food:"Supermercado",transport:"Combustible Auto",shopping:"Supermercado",health:"Salud",entertainment:"Deporte",emergency:"Emergencia",housing:"Arriendo",services:"Servicio Internet/TV",salary:"Sueldo Fijo Mensual"};
      tx.sub=m[tx.cat]||"Otros";
    }
    if(!tx.icon&&tx.macro&&userCategories[tx.macro]?.subs[tx.sub]){
      tx.icon=userCategories[tx.macro].subs[tx.sub].icon;
    }
    return tx;
  }).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  
  debts=await fbLoad("debts",{f:"fromUid",v:uid});
  superProds=await fbLoad("supermercado",{f:"uid",v:uid});
  render();
}

function rCashFlow(){
  const today=new Date().toISOString().slice(0,7);const months=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()+i);months.push(d.toISOString().slice(0,7))}
  const proj=months.map(m=>{const txM=txs.filter(t=>(t.fecha||"").startsWith(m));const inc=txM.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);const exp=txM.filter(t=>t.tipo==="egreso").reduce((s,t)=>s+t.monto,0);return{m,inc,exp,saldo:inc-exp}});
  let h=`<div class="card"><h3 class="card-t">📊 Proyección 12 meses</h3><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:10px"><tr style="background:#f1f5f9"><th style="padding:8px;text-align:left;font-weight:700;border:1px solid var(--border)">Mes</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">Ingresos</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">Egresos</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">SALDO</th></tr>`;
  proj.forEach(p=>{const isNow=p.m===today;h+=`<tr style="background:${isNow?'#0ea5e908':''}"><td style="padding:8px;border:1px solid var(--border);font-size:11px">${p.m}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:var(--green);font-weight:600;font-size:11px">${fmt(p.inc)}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:var(--red);font-weight:600;font-size:11px">${fmt(p.exp)}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:${p.saldo>=0?'var(--green)':'var(--red)'};font-weight:700;font-size:11px">${fmt(p.saldo)}</td></tr>`});
  h+=`</table></div>`;
  return h;
}

function rMov(){
  if(txs.length===0)return `<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p></div>`;
  let h=`<div style="margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">${txs.length} transacciones</p></div>`;
  h+=txs.map((tx,i)=>{const neg=tx.tipo==="egreso";const metodoEmoji={'Efectivo':'💵','Tarjeta Débito':'💳','Tarjeta Crédito':'💳','Transferencia Bancaria':'🏦','Cheque':'📄','Otra':'📌'}[tx.metodoPago]||'📌';return `<div class="tr" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${tx.icon||'📋'}</span><div><p class="desc">${tx.descripcion}</p><p class="date">${tx.fecha} • ${tx.macro}/${tx.sub} ${metodoEmoji}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.monto)}</p></div></div>`}).join("");

}

function rTarjetas(){
  const tarjetaTxs=txs.filter(t=>t.metodoPago==='Tarjeta Crédito');
  const byBanco={};
  tarjetaTxs.forEach(tx=>{const banco=tx.bancoPago||'Otra';if(!byBanco[banco])byBanco[banco]={monto:0,cuotas:[],txs:[]};byBanco[banco].monto+=tx.monto;if(tx.cuotas)byBanco[banco].cuotas.push(tx.cuotas);byBanco[banco].txs.push(tx)});
  let h=`<div style="margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">Estado de tus tarjetas</p></div>`;
  if(Object.keys(byBanco).length===0)h+=`<div class="es"><div class="ei">💳</div><p class="et">Sin compras con tarjeta crédito</p></div>`;
  else Object.entries(byBanco).forEach(([banco,data])=>{h+=`<div class="card" style="margin-bottom:12px"><p style="font-size:12px;font-weight:700">${banco}</p><p style="font-size:14px;color:var(--green);font-weight:700">Saldo: ${fmt(data.monto)}</p><p style="font-size:11px;color:var(--t3)">${data.txs.length} compras • ${data.cuotas.length} con cuotas</p></div>`});
  return h;
}

function closeSuperModal(){
  $("mo-super").classList.add("hidden");
  window.superProducts=[];
}

function switchSuperTab(t){
  document.querySelectorAll('[id^="super-tab-"]').forEach(el=>{
    el.classList.toggle("hidden", !el.id.includes(t));
  });
  document.querySelectorAll(".import-tab").forEach(b=>{
    const isActive=t==='manual'?b.textContent.includes('✏️'):t==='paste'?b.textContent.includes('📋'):b.textContent.includes('📊');
    b.classList.toggle("active", isActive);
  });
}

function addSuperProduct(){
  const prod=$("super-prod")?.value?.trim();
  const valor=$("super-valor")?.value;
  const cant=$("super-cantidad")?.value||"1";
  const comp=$("super-compartida")?.checked||false;
  
  if(!prod||!valor){
    toast("⚠️ Completa producto y valor");
    return;
  }
  
  window.superProducts.push({
    producto:prod,
    valor:parseInt(valor),
    cantidad:parseInt(cant),
    compartida:comp
  });
  
  $("super-prod").value="";
  $("super-valor").value="";
  $("super-cantidad").value="1";
  $("super-compartida").checked=false;
  toast("✓ Producto agregado");
}

function pasteSuperProducts(){
  const text=$("super-paste")?.value?.trim();
  if(!text){
    toast("⚠️ Pega datos");
    return;
  }
  
  const lines=text.split('\n');
  window.superProducts=[];
  
  lines.forEach(line=>{
    if(!line.trim())return;
    const parts=line.split(',').map(s=>s.trim());
    if(parts[0]&&parts[1]){
      window.superProducts.push({
        producto:parts[0],
        valor:parseInt(parts[1])||0,
        cantidad:parseInt(parts[2])||1,
        compartida:parts[3]?.toLowerCase()==='sí'||parts[3]?.toLowerCase()==='true'||false
      });
    }
  });
  
  toast(`✓ ${window.superProducts.length} productos procesados`);
}

function uploadSuperExcel(){
  const file=$("super-file")?.files?.[0];
  if(!file){
    toast("⚠️ Selecciona archivo");
    return;
  }
  
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws);
      
      window.superProducts=[];
      data.forEach(row=>{
        const prodName=row.Producto||row.producto||row.PRODUCTO;
        const prodValor=row.Valor||row.valor||row.VALOR;
        
        if(prodName&&prodValor){
          window.superProducts.push({
            producto:prodName,
            valor:parseInt(prodValor)||0,
            cantidad:parseInt(row.Cantidad||row.cantidad||row.CANTIDAD)||1,
            compartida:row.Compartida==='Sí'||row.compartida===true||false
          });
        }
      });
      
      toast(`✓ ${window.superProducts.length} productos importados`);
    }catch(err){
      toast("❌ Error procesando Excel");
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function saveSuperProducts(){
  if(!window.superProducts || window.superProducts.length===0){
    toast("⚠️ Agrega productos");
    return;
  }
  
  const fecha=$("super-fecha")?.value;
  if(!fecha){
    toast("⚠️ Selecciona fecha");
    return;
  }
  
  for(const p of window.superProducts){
    await fbSave("supermercado",{
      uid:curUser.uid,
      producto:p.producto,
      valor:p.valor,
      cantidad:p.cantidad,
      compartida:p.compartida,
      fecha:fecha
    });
  }
  
  toast("✓ Compra registrada");
  closeSuperModal();
  await loadAll();
}

async function openAddSubCategory(macro){
  const icon=prompt("Ícono (emoji):");if(!icon)return;
  const name=prompt("Nombre:");if(!name)return;
  userCategories[macro].subs[name]={icon,recurrente:false};
  await fbSave("categories",{_id:curUser.uid,...userCategories});
  toast("Categoría agregada");render();
}
