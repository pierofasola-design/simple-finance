<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="google" content="notranslate">
<title>SimpleFinance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;display:flex;flex-direction:column;width:100%}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* LOGIN */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo .icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo .text{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
.login-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--t3)}
.login-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fi{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:12px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1);outline:none}
.bp{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}.bp:active{transform:scale(.97)}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px}

/* APP */
.app{width:100%;min-height:100vh;background:var(--bg);display:flex}
.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;cursor:pointer;transition:all .15s;text-align:left}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px;display:flex;align-items:center;gap:10px}
.sf-user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logout-btn{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}.logout-btn:hover{background:#1e293b;color:#e2e8f0}

/* MAIN */
.main{flex:1;overflow:auto;padding:28px 36px 30px;width:100%}
.main-inner{max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--t1);margin-top:2px}

/* GRID & CARDS */
.sg{display:grid;gap:12px;margin-bottom:22px}.sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
.sc{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}.sc .inn{padding:18px 16px}
.sc .lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}.sc .val{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--t1);margin-top:6px}.sc .sub{font-size:11px;font-weight:600;margin-top:4px}
.card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fr{display:flex;gap:10px;margin-bottom:12px}.fr .fi{margin-bottom:0;flex:1}
.tg{display:grid;gap:8px}.tg2{grid-template-columns:1fr 1fr}
.tr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.tr .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}.tr .emoji-i{font-size:18px;flex-shrink:0}
.tr .desc{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr .date{font-size:10px;color:var(--t3)}.tr .right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tr .amt{font-size:13px;font-weight:700}.tr .amt.neg{color:var(--red)}.tr .amt.pos{color:var(--green)}
.ib{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.ib:hover{background:#f1f5f9}.ib.del:hover{background:#f43f5e15;color:var(--red)}.ib.edit:hover{background:#0ea5e915;color:var(--accent)}
.es{text-align:center;padding:40px 20px}.es .ei{font-size:48px;margin-bottom:12px}.es .et{font-size:16px;font-weight:700;color:var(--t1)}

/* BADGE */
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;display:inline-block}
.badge.paid{background:#10b98120;color:#10b981}.badge.pending{background:#f4724520;color:#f47245}.badge.upcoming{background:#818cf820;color:#818cf8}
.shared-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:#a855f712;color:#a855f7;margin-left:4px}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(14,165,233,.35);z-index:50;cursor:pointer}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0}
.mb{background:#fff;width:480px;max-width:95%;max-height:90vh;overflow-y:auto;border-radius:22px;padding:26px 22px 34px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;margin:20px 0}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt-t{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--t1)}
.mc{width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;font-size:16px;color:var(--t2);cursor:pointer}

/* TOGGLE */
.tt{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:16px;gap:2px}
.tb{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.tb.ae{background:#f43f5e15;color:#f43f5e}.tb.ai{background:#10b98115;color:#10b981}.tb.off{background:transparent;color:#94a3b8}
.cg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cb{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.cb:hover{border-color:var(--accent);color:var(--accent)}

/* TOAST & CONFIRM */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:999;background:#0f172a;color:#38bdf8;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid #1e293b;animation:fadeIn .3s ease-out}
.sync-ind{position:fixed;top:24px;right:24px;z-index:60;display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08);border:1px solid var(--border)}
.sd{width:8px;height:8px;border-radius:50%}.sd.on{background:#10b981}.sd.off{background:#f43f5e}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.cbox{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;text-align:center}
.cbox h3{font-size:18px;font-weight:700;margin-bottom:8px}.cbox p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.cbtns{display:flex;gap:10px}.cbtns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.cbtn-c{background:#f1f5f9;color:var(--t2)}.cbtn-d{background:var(--red);color:#fff}

/* DEBT CARD */
.debt-card{padding:14px;border-radius:14px;border:1px solid var(--border);background:#fff;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.debt-left{display:flex;align-items:center;gap:10px;flex:1}
.debt-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.debt-info .name{font-size:13px;font-weight:600;color:var(--t1)}.debt-info .detail{font-size:11px;color:var(--t3)}
.debt-right{text-align:right;display:flex;align-items:center;gap:8px}
.debt-amt{font-size:15px;font-weight:700}

/* CASH FLOW TABLE */
.cf-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.cf-table th{background:#f1f5f9;padding:8px;text-align:left;font-weight:700;color:var(--t1);border:1px solid var(--border)}
.cf-table td{padding:8px;border:1px solid var(--border);text-align:right}
.cf-table td:first-child{text-align:left;color:var(--t1);font-weight:600}
.cf-table .neg{color:var(--red)}.cf-table .pos{color:var(--green)}.cf-table .saldo{background:#f1f5f9;font-weight:700}

/* CHART BARS */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:120px;margin:20px 0;padding:0 10px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;min-width:0}
.bar{border-radius:4px 4px 0 0;min-height:4px;transition:all .3s;width:100%;max-width:30px}
.bar-label{font-size:9px;font-weight:700;color:var(--t3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%}

/* HIDDEN */
.hidden{display:none!important}

/* ══════════════════════════════════ */
/* MOBILE (< 768px) */
/* ══════════════════════════════════ */
@media(max-width:767px){
  .app{flex-direction:column}
  .sidebar{display:none}
  .main{padding:16px 12px 90px}
  .header-title{font-size:18px}
  .sg3{grid-template-columns:1fr}.sg4{grid-template-columns:1fr 1fr}
  .tg2{grid-template-columns:1fr}
  .sc .val{font-size:20px}.sc .inn{padding:12px 10px}
  .cf-table{font-size:9px}.cf-table th,.cf-table td{padding:4px 2px}
  .mb{width:95%;max-width:100%;max-height:85vh;padding:16px 12px 24px}
  .card{padding:12px}
  .fr{gap:8px}
  .bar{max-width:20px}
  .fab{bottom:75px;right:12px;width:48px;height:48px;font-size:20px}
  
  /* Mobile bottom nav */
  .mob-nav{display:flex!important;position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);padding:6px 0 8px;z-index:40;justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .mob-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;font-weight:700;color:var(--t3);padding:4px 6px;cursor:pointer}
  .mob-nav button.active{color:var(--accent)}
  .mob-nav button .mi{font-size:14px}
}

/* ══════════════════════════════════ */
/* TABLET (768px - 1024px) */
/* ══════════════════════════════════ */
@media(min-width:768px) and (max-width:1024px){
  .sidebar{width:80px;padding:16px 8px}
  .logo-text{display:none}
  .sidebar-btn span:last-of-type{display:none}
  .sidebar-btn{padding:9px 8px;font-size:12px}
  .sidebar-btn .emoji{font-size:16px}
  .main{padding:20px 16px;flex:1}
  .sg3{grid-template-columns:1fr 1fr}.sg4{grid-template-columns:1fr 1fr}
  .tg2{grid-template-columns:1fr}
  .mb{width:500px;max-width:90%}
  .bar{max-width:25px}
  .mob-nav{display:none}
}

/* ══════════════════════════════════ */
/* DESKTOP (> 1024px) */
/* ══════════════════════════════════ */
@media(min-width:1025px){
  .sidebar{width:220px;padding:24px 14px}
  .logo-text{display:block}
  .sidebar-btn span:last-of-type{display:block}
  .sidebar-btn{padding:11px 12px}
  .sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
  .tg2{grid-template-columns:1fr 1fr}
  .mb{width:480px;max-width:95%}
  .bar{max-width:40px}
  .mob-nav{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-bg">
<div class="login-card">
  <div class="login-logo"><div class="icon">S</div><span class="text">SimpleFinance</span></div>
  <div class="login-tabs">
    <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
    <button class="login-tab" id="tab-register" onclick="switchTab('register')">Crear</button>

  </div>

  </div>
</div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden" style="width:100%">
<div class="app" id="app">

  <div class="main" id="main">

      <div id="vc"></div>
    </div>
  </div>
</div>
<div class="mob-nav hidden" id="mob-nav"></div>
<div class="sync-ind" id="sync-ind"><span class="sd on"></span><span>OK</span></div>
<button class="fab" id="fab-btn" onclick="openModal()">+</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- MODAL -->

<div class="mb" onclick="event.stopPropagation()">

const fmt=n=>"$"+Math.abs(n).toLocaleString("es-CL");const $=id=>document.getElementById(id);
const gc=id=>ACAT.find(c=>c.id===id)||{id:"?",l:"Otro",i:"❓"};const grc=id=>REC_CATS.find(c=>c.id===id)||{id:"?",l:"Otro",i:"❓"};
const bal=()=>txs.reduce((s,t)=>s+t.amount,0);const totI=()=>txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
const totE=()=>txs.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0);

function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}
function calcPmt(p,r,n){if(!r)return p/n;const mr=r/100/12;return p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1)}
function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(n){return n?n.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}
function getOtherUsers(){return allUsers.filter(u=>u.uid!==curUser.uid)}
function addMonths(d,m){const nd=new Date(d);nd.setMonth(nd.getMonth()+m);return nd.toISOString().slice(0,10)}

// AUTH
function validateLoginForm(){
  const rut=$("l-rut").value.trim();
  const pass=$("l-pass").value;
  const btn=$("login-btn");
  
  if(rut&&pass&&pass.length>=6){
    btn.disabled=false;
    btn.style.opacity="1";
    btn.style.cursor="pointer";
  }else{
    btn.disabled=true;
    btn.style.opacity="0.5";
    btn.style.cursor="not-allowed";
  }
}

function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
  validateLoginForm();
}

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;
  const btn=$("register-btn");
  
  if(!name||!rut||!pass||!pass2){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contrasena minimo 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contrasenas no coinciden";return}
  
  btn.disabled=true;
  btn.textContent="Creando...";
  $("r-err").textContent="";
  
  try{
    const cred=await auth.createUserWithEmailAndPassword(rutToEmail(rut),pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast("Cuenta creada");
    switchTab("login");
    btn.textContent="Crear Cuenta";
  }catch(e){
    $("r-err").textContent=e.code==="auth/email-already-in-use"?"RUT ya registrado":e.code==="auth/weak-password"?"Contrasena muy debil":e.message;
    btn.disabled=false;
    btn.textContent="Crear Cuenta";
  }
}

function validateRegisterForm(){
  const name=$("r-name").value.trim();
  const rut=$("r-rut").value.trim();
  const pass=$("r-pass").value;
  const pass2=$("r-pass2").value;
  const btn=$("register-btn");
  
  if(name&&rut&&pass&&pass2&&pass.length>=6&&pass===pass2){
    btn.disabled=false;
    btn.style.opacity="1";
    btn.style.cursor="pointer";
  }else{
    btn.disabled=true;
    btn.style.opacity="0.5";
    btn.style.cursor="not-allowed";
  }
}

async function doLogin(){
  const rut=$("l-rut").value.trim(),pass=$("l-pass").value;
  const btn=$("login-btn");
  
  if(!rut||!pass){$("l-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("l-err").textContent="Contrasena minimo 6 caracteres";return}
  
  btn.disabled=true;
  btn.textContent="Ingresando...";
  $("l-err").textContent="";
  
  try{
    await auth.signInWithEmailAndPassword(rutToEmail(rut),pass);
  }catch(e){
    $("l-err").textContent=e.code==="auth/user-not-found"?"RUT no registrado":e.code==="auth/wrong-password"?"Contrasena incorrecta":"Error al ingresar";
    btn.disabled=false;
    btn.textContent="Ingresar";
  }
}

function doLogout(){auth.signOut()}

auth.onAuthStateChanged(async user=>{
  if(user){
    curUser=user;
    const doc=await db.collection("users").doc(user.uid).get();
    curProfile=doc.exists?doc.data():{name:"Usuario"};
    const usersSnap=await db.collection("users").get();
    allUsers=usersSnap.docs.map(d=>({uid:d.id,...d.data()}));
    $("login-screen").classList.add("hidden");
    $("app-screen").classList.remove("hidden");
    $("sb-name").textContent=curProfile.name;
    $("sb-avatar").textContent=getInitial(curProfile.name);
    await loadAll();
  }else{
    curUser=null;
    $("login-screen").classList.remove("hidden");
    $("app-screen").classList.add("hidden");
  }
});

// FIREBASE
async function fbLoad(col,filter=null){
  try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}
}
async function fbSave(col,data){
  try{const id=data._id||String(Date.now());const d={...data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(id).set(d,{merge:true});return id}catch(e){return null}
}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete()}catch(e){}}

async function loadAll(){
  const uid=curUser.uid;
  txs=(await fbLoad("transactions",{f:"uid",v:uid})).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  credits=await fbLoad("credits",{f:"uid",v:uid});
  quotes=await fbLoad("quotes",{f:"uid",v:uid});
  investments=await fbLoad("investments",{f:"uid",v:uid});
  recurring=await fbLoad("recurring",{f:"uid",v:uid});
  const d1=await fbLoad("debts",{f:"fromUid",v:uid});
  const d2=await fbLoad("debts",{f:"toUid",v:uid});
  debts=[...d1,...d2].filter((d,i,a)=>a.findIndex(x=>x._id===d._id)===i);
  render();
}

function rDash(){
  const b=bal(),i=totI(),e=totE();
  const pendDebts=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");
  const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");
  const deudaTotal=credits.reduce((s,c)=>s+c.amount*(c.totalCuotas-c.paidCount),0);
  const mesesRestantes=credits.length>0?Math.max(...credits.filter(c=>c.totalCuotas>c.paidCount).map(c=>c.totalCuotas-c.paidCount)):0;

  let h=`<div class="sg sg4"><div class="sc fade-in" style="border-left-color:#10b981"><div class="inn"><span class="lbl">BALANCE</span><p class="val" style="color:${b>=0?'#10b981':'#f43f5e'}">${fmt(b)}</p><p class="sub">${b>=0?'✓ Positivo':'✗ Negativo'}</p></div></div>`;
  h+=`<div class="sc fade-in" style="border-left-color:#10b981;animation-delay:.07s"><div class="inn"><span class="lbl">INGRESOS</span><p class="val">${fmt(i)}</p></div></div>`;
  h+=`<div class="sc fade-in" style="border-left-color:#f43f5e;animation-delay:.14s"><div class="inn"><span class="lbl">GASTOS</span><p class="val">${fmt(e)}</p></div></div>`;
  h+=`<div class="sc fade-in" style="border-left-color:#a855f7;animation-delay:.21s"><div class="inn"><span class="lbl">DEUDA CREDITOS</span><p class="val" style="color:#a855f7">${fmt(deudaTotal)}</p><p class="sub">${mesesRestantes} meses</p></div></div></div>`;

  if(pendDebts.length>0||iOwe.length>0){
    if(pendDebts.length>0){h+=`<div class="card" style="margin-bottom:14px;border-left:4px solid var(--orange)"><h3 class="card-t">🔔 Te deben</h3>`;
    pendDebts.slice(0,2).forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:#a855f7">${getInitial(getUserName(d.fromUid))}</div><div class="debt-info"><p class="name">${getUserName(d.fromUid)}</p><p class="detail">${d.desc} • ${d.date||''}</p></div></div><span class="debt-amt" style="color:var(--green)">${fmt(d.amount)}</span></div>`});
    h+=`</div>`}
    if(iOwe.length>0){h+=`<div class="card" style="border-left:4px solid var(--red)"><h3 class="card-t">⚠️ Debes pagar</h3>`;
    iOwe.slice(0,2).forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:#f43f5e">${getInitial(getUserName(d.toUid))}</div><div class="debt-info"><p class="name">${getUserName(d.toUid)}</p><p class="detail">${d.desc} • ${d.date||''}</p></div></div><button class="ib edit" onclick="confirmPayDebt('${d._id}')">✓</button></div>`});
    h+=`</div>`}
  }
  return h;
}

function rCashFlow(){
  const today=new Date().toISOString().slice(0,7);
  const months=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()+i);months.push(d.toISOString().slice(0,7))}

  const proj=months.map(m=>{
    const txM=txs.filter(t=>(t.date||"").startsWith(m));
    const recM=recurring.filter(r=>(!r.endDate||r.endDate>=m+"-01"));
    const inc=txM.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
    const exp=txM.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
    const rec=recM.reduce((s,r)=>s+(r.sharedWith?r.amount*(r.splitPercent||50)/100:r.amount),0);
    const cred=credits.filter(c=>c.paidCount<c.totalCuotas).reduce((s,c)=>s+c.amount,0);
    return{m,inc,exp,rec,cred,saldo:inc-exp-rec-cred};
  });

  let h=`<div class="card" style="margin-bottom:18px"><h3 class="card-t">📊 Proyeccion 12 meses</h3>`;
  h+=`<table class="cf-table"><tr><th style="font-size:10px">Mes</th><th style="font-size:10px">Ing</th><th style="font-size:10px">Gst Var</th><th style="font-size:10px">Gst Fij</th><th style="font-size:10px">Cred</th><th style="font-size:10px">SALDO</th></tr>`;
  proj.forEach(p=>{
    const isNow=p.m===today;
    h+=`<tr style="background:${isNow?'#0ea5e908':''}"><td style="font-size:9px">${p.m}</td><td class="pos" style="font-size:9px">${fmt(p.inc)}</td><td class="neg" style="font-size:9px">${fmt(p.exp)}</td><td class="neg" style="font-size:9px">${fmt(p.rec)}</td><td class="neg" style="font-size:9px">${fmt(p.cred)}</td><td class="saldo" style="font-size:9px;color:${p.saldo>=0?'#10b981':'#f43f5e'}">${fmt(p.saldo)}</td></tr>`;
  });
  h+=`</table>`;

  h+=`<div style="margin-top:16px"><p style="font-size:12px;font-weight:700">Saldo por mes</p><div class="chart-bars">`;
  const maxS=Math.max(...proj.map(p=>Math.abs(p.saldo)));
  proj.forEach(p=>{const ht=Math.abs(p.saldo)/maxS*100;h+=`<div class="bar-wrap"><div class="bar" style="height:${Math.max(ht,4)}%;background:${p.saldo>=0?'#10b981':'#f43f5e'}"></div><span class="bar-label">${p.m.slice(5)}</span></div>`});
  h+=`</div></div></div>`;

  const totSaldo=proj.reduce((s,p)=>s+p.saldo,0);
  const avgMth=totSaldo/12;
  const negMth=proj.filter(p=>p.saldo<0).length;
  h+=`<div class="sg sg3"><div class="sc" style="border-left-color:#10b981"><div class="inn"><span class="lbl">ACUMULADO</span><p class="val" style="color:#10b981">${fmt(totSaldo)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#0ea5e9"><div class="inn"><span class="lbl">PROMEDIO/MES</span><p class="val">${fmt(avgMth)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#f43f5e"><div class="inn"><span class="lbl">MESES CRITICOS</span><p class="val" style="color:#f43f5e">${negMth}</p></div></div></div>`;

  return h;
}

function rTx(){
  if(txs.length===0)return `<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p></div>`;
  let h=`<div style="display:flex;justify-content:space-between;margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">${txs.length} registros</p><button class="ib del" onclick="resetCol('transactions')" style="margin-left:auto">🗑</button></div>`;
  h+=`<div class="tg tg2">${txs.map((t,i)=>{const c=gc(t.cat),neg=t.amount<0;const shr=t.sharedWith?`<span class="shared-tag">🤝</span>`:'';
    return`<div class="tr fade-in" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${c.i}</span><div><p class="desc">${t.desc}${shr}</p><p class="date">${t.date||''}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(t.amount)}</p><button class="ib edit" onclick="editItem('transactions','${t._id}')">✏️</button><button class="ib del" onclick="delItem('transactions','${t._id}','${t.desc}')">🗑</button></div></div>`}).join("")}</div>`;
  return h;
}

function rDebts(){
  const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");
  const theyOwe=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");
  const history=debts.filter(d=>d.status==="paid");

  let h=`<p style="font-size:13px;color:var(--t3);margin-bottom:14px">Gastos compartidos con otros usuarios.</p>`;

  h+=`<div class="card" style="margin-bottom:14px"><h3 class="card-t">⚠️ Debo Pagar (${iOwe.length})</h3>`;
  if(iOwe.length===0)h+=`<p style="text-align:center;color:var(--t3);padding:16px">No debes nada 🎉</p>`;
  else iOwe.forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:#f43f5e">${getInitial(getUserName(d.toUid))}</div><div class="debt-info"><p class="name">A: ${getUserName(d.toUid)}</p><p class="detail">${d.desc} (${d.splitPercent||50}%)</p></div></div><div class="debt-right"><span class="debt-amt" style="color:var(--red)">${fmt(d.amount)}</span><button class="ib edit" onclick="confirmPayDebt('${d._id}')">✓</button></div></div>`});
  h+=`</div>`;

  h+=`<div class="card" style="margin-bottom:14px"><h3 class="card-t">💰 Me Deben (${theyOwe.length})</h3>`;
  if(theyOwe.length===0)h+=`<p style="text-align:center;color:var(--t3);padding:16px">Nadie te debe</p>`;
  else{const tot=theyOwe.reduce((s,d)=>s+d.amount,0);h+=`<p style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:10px">Total: ${fmt(tot)}</p>`;
    theyOwe.forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:#a855f7">${getInitial(getUserName(d.fromUid))}</div><div class="debt-info"><p class="name">De: ${getUserName(d.fromUid)}</p><p class="detail">${d.desc} (${d.splitPercent||50}%)</p></div></div><span class="debt-amt" style="color:var(--green)">${fmt(d.amount)}</span></div>`})
  }h+=`</div>`;

  if(history.length>0){h+=`<div class="card"><h3 class="card-t">✓ Pagados (${history.length})</h3>`;
    history.slice(0,5).forEach(d=>{const isFrom=d.fromUid===curUser.uid;h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:11px"><span>${isFrom?'Pagaste a':'Recibiste de'} ${getUserName(isFrom?d.toUid:d.fromUid)}</span><span class="badge paid">✓</span></div>`});
    h+=`</div>`}
  return h;
}

function rRecurring(){
  if(recurring.length===0){h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:14px;font-weight:700">Gastos Recurrentes</h3><button class="bp" style="width:auto;padding:8px 16px;font-size:13px" onclick="openModalFor('recurring')">+ Agregar</button></div>`;
    return h+`<div class="es"><div class="ei">🔄</div><p class="et">Sin gastos fijos</p></div>`}

  const grouped={};
  recurring.forEach(r=>{if(!grouped[r.category])grouped[r.category]=[];grouped[r.category].push(r)});

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:14px;font-weight:700">Gastos Fijos Mensuales</h3><button class="bp" style="width:auto;padding:8px 16px;font-size:13px" onclick="openModalFor('recurring')">+ Agregar</button></div>`;

  Object.keys(grouped).forEach(cat=>{
    const rc=grc(cat);
    const items=grouped[cat];
    const total=items.reduce((s,r)=>{if(r.sharedWith){return s+(r.amount*((r.splitPercent||50)/100))}return s+r.amount},0);

    h+=`<div class="card" style="margin-bottom:12px;border-left:4px solid var(--accent)"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><h4 style="font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px">${rc.i} ${rc.l}</h4><span style="font-size:14px;font-weight:700;color:var(--accent)">${fmt(total)}</span></div>`;

    items.forEach((r,i)=>{
      const myAmount=r.sharedWith?r.amount*(r.splitPercent/100):r.amount;
      h+=`<div style="padding:6px 0;border-top:${i>0?'1px solid #f1f5f9':'none'};display:flex;justify-content:space-between;align-items:center"><div><p style="font-size:12px;font-weight:600">${r.name}</p><p style="font-size:10px;color:var(--t3)">Dia ${r.dayOfMonth}${r.sharedWith?' ('+r.splitPercent+'% - '+getUserName(r.sharedWith)+')':''}</p></div><div style="display:flex;align-items:center;gap:4px"><p style="font-size:13px;font-weight:700">${fmt(myAmount)}</p><button class="ib edit" onclick="editItem('recurring','${r._id}')">✏️</button><button class="ib del" onclick="delItem('recurring','${r._id}','${r.name}')">🗑</button></div></div>`;
    });
    h+=`</div>`;
  });

  const totalMonthly=recurring.reduce((s,r)=>{if(r.sharedWith){return s+(r.amount*((r.splitPercent||50)/100))}return s+r.amount},0);
  h+=`<div class="sg sg3"><div class="sc" style="border-left-color:var(--orange)"><div class="inn"><span class="lbl">GASTO FIJO/MES</span><p class="val" style="color:var(--orange)">${fmt(totalMonthly)}</p></div></div></div>`;

  return h;
}

function rCred(){
  const tot=credits.reduce((s,c)=>s+c.amount*(c.totalCuotas-c.paidCount),0);
  const allPaid=credits.filter(c=>c.status==='paid').length;
  
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px"><div><p style="font-size:11px;color:var(--t3);font-weight:600">DEUDA TOTAL RESTANTE</p><p style="font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--red);margin-top:4px">${fmt(tot)}</p><p style="font-size:10px;color:var(--t3);margin-top:4px">${allPaid} pagados</p></div><button class="bp" style="width:auto;padding:8px 16px;font-size:13px" onclick="openModalFor('credits')">+ Credito</button></div>`;

  if(credits.length===0)return h+`<div class="es"><div class="ei">💳</div><p class="et">Sin creditos</p></div>`;

  credits.forEach((cr,i)=>{
    const remaining=cr.totalCuotas-cr.paidCount;
    const debtRemaining=cr.amount*remaining;
    const pct=cr.totalCuotas>0?(cr.paidCount/cr.totalCuotas*100):0;
    h+=`<div class="card fade-in" style="animation-delay:${i*.06}s;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><p style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px">${cr.icon||'📄'} ${cr.name}</p><p style="font-size:10px;color:var(--t3);margin-top:2px">${cr.detail||''}</p></div><div style="display:flex;gap:4px"><button class="ib edit" onclick="editItem('credits','${cr._id}')">✏️</button><button class="ib del" onclick="delItem('credits','${cr._id}','${cr.name}')">🗑</button></div></div>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;font-size:11px"><div style="padding:6px 8px;border-radius:8px;background:var(--bg3)"><p style="color:var(--t3);font-weight:600">CUOTA</p><p style="font-weight:700;margin-top:2px">${fmt(cr.amount)}</p></div><div style="padding:6px 8px;border-radius:8px;background:var(--bg3)"><p style="color:var(--t3);font-weight:600">PROGRESO</p><p style="font-weight:700;margin-top:2px">${cr.paidCount}/${cr.totalCuotas}</p></div><div style="padding:6px 8px;border-radius:8px;background:var(--bg3)"><p style="color:var(--t3);font-weight:600">FALTA</p><p style="font-weight:700;margin-top:2px;color:var(--red)">${fmt(debtRemaining)}</p></div></div>`;
    h+=`<div style="width:100%;height:5px;background:#f1f5f9;border-radius:2.5px;margin-top:8px;overflow:hidden"><div style="height:100%;background:linear-gradient(to right,#10b981,#0ea5e9);width:${pct}%;transition:width .3s"></div></div>`;
    if(cr.fechaPago)h+=`<p style="font-size:10px;color:var(--t3);margin-top:6px">📅 Proximo: ${cr.fechaPago}</p>`;
    if(cr.status!=='paid'&&remaining>0)h+=`<button style="width:100%;margin-top:8px;padding:8px;border-radius:10px;border:none;background:var(--green);color:#fff;font-size:12px;font-weight:700;cursor:pointer" onclick="payCredit('${cr._id}')">💰 Pagar Cuota (${remaining} falta${remaining>1?'n':''})</button>`;
    h+=`</div>`;
  });

  return h;
}

function rComp(){
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">Compara cotizaciones</p><button class="bp" style="width:auto;padding:8px 16px;font-size:13px" onclick="openModalFor('quotes')">+ Cotizacion</button></div>`;
  if(quotes.length===0)return h+`<div class="es"><div class="ei">⚖️</div><p class="et">Sin cotizaciones</p></div>`;
  const wCalc=quotes.map(q=>{const pmt=q.cuota||calcPmt(q.monto,q.tasa,q.plazo);return{...q,pmt,total:pmt*q.plazo,interest:(pmt*q.plazo)-q.monto}});
  const minT=Math.min(...wCalc.map(q=>q.total));
  wCalc.forEach((q,i)=>{const isW=q.total===minT;h+=`<div class="card fade-in" style="animation-delay:${i*.06}s;margin-bottom:12px;${isW?'border:2px solid var(--green)':''}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><p style="font-size:13px;font-weight:700">${q.banco||'Credito'}</p><p style="font-size:10px;color:var(--t3)">${q.producto||''}</p></div><div style="display:flex;gap:4px;align-items:center">${isW?'<span style="background:#10b981;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px">✓ MEJOR</span>':''}  <button class="ib edit" onclick="editItem('quotes','${q._id}')">✏️</button><button class="ib del" onclick="delItem('quotes','${q._id}','${q.banco}')">🗑</button></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:10px"><div><span style="color:var(--t3)">Monto</span><p style="font-weight:700;margin-top:1px">${fmt(q.monto)}</p></div><div><span style="color:var(--t3)">Tasa</span><p style="font-weight:700;margin-top:1px">${q.tasa}%</p></div><div><span style="color:var(--t3)">Cuota</span><p style="font-weight:700;margin-top:1px;color:var(--accent)">${fmt(q.pmt)}</p></div><div><span style="color:var(--t3)">Total</span><p style="font-weight:700;margin-top:1px;color:var(--red)">${fmt(q.total)}</p></div></div></div>`;
  });
  return h;
}

function rInv(){
  const tot=investments.reduce((s,v)=>s+v.amount,0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><p style="font-size:11px;color:var(--t3);font-weight:600">PATRIMONIO INVERTIDO</p><p style="font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--green);margin-top:4px">${fmt(tot)}</p></div><button class="bp" style="width:auto;padding:8px 16px;font-size:13px" onclick="openModalFor('investments')">+ Inversion</button></div>`;
  if(investments.length===0)return h+`<div class="es"><div class="ei">🌱</div><p class="et">Sin inversiones</p></div>`;
  investments.forEach((inv,i)=>{h+=`<div class="card fade-in" style="animation-delay:${i*.06}s;margin-bottom:12px"><div style="display:flex;justify-content:space-between"><div><p style="font-size:13px;font-weight:700">${inv.name}</p><p style="font-size:10px;color:var(--t3)">${inv.tipo}</p></div><div style="display:flex;gap:4px"><button class="ib edit" onclick="editItem('investments','${inv._id}')">✏️</button><button class="ib del" onclick="delItem('investments','${inv._id}','${inv.name}')">🗑</button></div></div><p style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--green);margin-top:6px">${fmt(inv.amount)}</p><div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;font-size:10px;color:var(--t3)">${inv.tasa?`<span>Renta: <strong>${inv.tasa}%</strong></span>`:''}${inv.entidad?`<span>En: <strong>${inv.entidad}</strong></span>`:''}${inv.plazo?`<span>Plazo: <strong>${inv.plazo}</strong></span>`:''}</div></div>`});
  return h;
}

// ════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════

function openModal(){editId=null;
  if(curView==="credits")openModalFor("credits");
  else if(curView==="recurring")openModalFor("recurring");
  else if(curView==="comparator")openModalFor("quotes");
  else if(curView==="invest")openModalFor("investments");
  else if(curView==="debts")openModalFor("transactions");
  else openModalFor("transactions");
}

function openModalFor(col){
  editCol=col;$("mo").classList.remove("hidden");
  let h="";

  if(col==="transactions"){
    const tx=editId?txs.find(t=>t._id===editId):null;
    const ft=tx?(tx.amount>0?"income":"expense"):"expense";
    formType=ft;formCat=tx?tx.cat:(ft==="expense"?"food":"salary");
    $("modal-title").textContent=editId?"Editar":"Nueva";
    h+=`<div class="tt"><button class="tb ${ft==='expense'?'ae':'off'}" onclick="sfType('expense')">Gasto</button><button class="tb ${ft==='income'?'ai':'off'}" onclick="sfType('income')">Ingreso</button></div>`;
    h+=`<input class="fi" id="m-desc" placeholder="Descripcion" value="${tx?tx.desc:''}"><input class="fi" id="m-amt" type="number" placeholder="Monto" value="${tx?Math.abs(tx.amount):''}"><input class="fi" id="m-date" type="date" value="${tx?tx.date:new Date().toISOString().slice(0,10)}">`;
    h+=`<div class="cg" id="m-cats"></div>`;
    const others=getOtherUsers();
    if(others.length>0){const sharedUid=tx?.sharedWith||"";
      h+=`<div style="padding:10px;border-radius:10px;background:#a855f712;border:1px solid #a855f720;margin-bottom:14px"><p style="font-size:11px;font-weight:700;color:#a855f7;margin-bottom:8px">🤝 Compartir con:</p><select class="fi" id="m-shared" style="margin-bottom:0"><option value="">No compartir</option>${others.map(u=>`<option value="${u.uid}" ${sharedUid===u.uid?'selected':''}>${u.name}</option>`).join("")}</select></div>`;
    }
    h+=`<button class="bp" onclick="saveTx()">${editId?'Guardar':'Guardar'}</button>`;
  }
  else if(col==="recurring"){
    const r=editId?recurring.find(c=>c._id===editId):null;
    const split=r?.splitPercent||50;
    $("modal-title").textContent=editId?"Editar":"Nuevo Gasto";
    h+=`<input class="fi" id="m-rec-name" placeholder="Nombre (ej: Luz, Agua)" value="${r?.name||''}">`;
    h+=`<select class="fi" id="m-rec-cat"><option value="">Selecciona</option>${REC_CATS.map(c=>`<option value="${c.id}" ${r?.category===c.id?'selected':''}>${c.i} ${c.l}</option>`).join("")}</select>`;
    h+=`<input class="fi" id="m-rec-amt" type="number" placeholder="Monto $" value="${r?.amount||''}"><input class="fi" id="m-rec-day" type="number" min="1" max="31" placeholder="Dia del mes" value="${r?.dayOfMonth||'1'}">`;
    const others=getOtherUsers();
    if(others.length>0){const sharedUid=r?.sharedWith||"";
      h+=`<div style="padding:10px;border-radius:10px;background:#a855f712;border:1px solid #a855f720;margin-bottom:10px"><p style="font-size:11px;font-weight:700;color:#a855f7;margin-bottom:8px">🤝 Compartir con:</p><select class="fi" id="m-rec-shared" style="margin-bottom:0"><option value="">No compartir</option>${others.map(u=>`<option value="${u.uid}" ${sharedUid===u.uid?'selected':''}>${u.name}</option>`).join("")}</select>`;
      h+=`<p style="font-size:10px;color:var(--t3);margin-top:6px">División:</p><div class="fr"><input class="fi" id="m-rec-split" type="number" min="0" max="100" placeholder="Tu %" value="${split}"><input class="fi" id="m-rec-split-other" type="number" min="0" max="100" placeholder="Su %" value="${100-split}" readonly></div></div>`;
    }
    h+=`<button class="bp" onclick="saveRecurring()">${editId?'Guardar':'Agregar'}</button>`;
  }
  else if(col==="credits"){
    const cr=editId?credits.find(c=>c._id===editId):null;
    $("modal-title").textContent=editId?"Editar":"Nuevo Credito";
    h+=`<input class="fi" id="m-name" placeholder="Nombre" value="${cr?.name||''}"><input class="fi" id="m-detail" placeholder="Detalle" value="${cr?.detail||''}"><input class="fi" id="m-amt" type="number" placeholder="Monto cuota" value="${cr?.amount||''}">`;
    h+=`<div class="fr"><input class="fi" id="m-totalC" type="number" placeholder="Total cuotas" value="${cr?.totalCuotas||''}"><input class="fi" id="m-paidC" type="number" placeholder="Pagadas" value="${cr?.paidCount||'0'}"></div>`;
    h+=`<input class="fi" id="m-fechaPago" type="date" placeholder="Proximo pago" value="${cr?.fechaPago||''}"><select class="fi" id="m-status"><option value="pending" ${cr?.status==='pending'?'selected':''}>Pendiente</option><option value="paid" ${cr?.status==='paid'?'selected':''}>Pagado</option></select>`;
    h+=`<button class="bp" onclick="saveCred()">${editId?'Guardar':'Agregar'}</button>`;
  }
  else if(col==="quotes"){
    const q=editId?quotes.find(c=>c._id===editId):null;
    $("modal-title").textContent=editId?"Editar":"Nueva";
    h+=`<input class="fi" id="m-banco" placeholder="Banco" value="${q?.banco||''}"><input class="fi" id="m-producto" placeholder="Producto" value="${q?.producto||''}"><input class="fi" id="m-monto" type="number" placeholder="Monto" value="${q?.monto||''}">`;
    h+=`<div class="fr"><input class="fi" id="m-tasa" type="number" step="0.01" placeholder="Tasa %" value="${q?.tasa||''}"><input class="fi" id="m-plazo" type="number" placeholder="Plazo (meses)" value="${q?.plazo||''}"></div>`;
    h+=`<input class="fi" id="m-cuota" type="number" placeholder="Cuota $ (opcional)" value="${q?.cuota||''}"><button class="bp" onclick="saveQuote()">${editId?'Guardar':'Agregar'}</button>`;
  }
  else if(col==="investments"){
    const inv=editId?investments.find(c=>c._id===editId):null;
    $("modal-title").textContent=editId?"Editar":"Nueva";
    h+=`<input class="fi" id="m-name" placeholder="Nombre" value="${inv?.name||''}"><select class="fi" id="m-tipo"><option value="Fondo Mutuo" ${inv?.tipo==='Fondo Mutuo'?'selected':''}>Fondo Mutuo</option><option value="DAP" ${inv?.tipo==='DAP'?'selected':''}>DAP</option><option value="APV" ${inv?.tipo==='APV'?'selected':''}>APV</option><option value="Acciones" ${inv?.tipo==='Acciones'?'selected':''}>Acciones</option><option value="Crypto" ${inv?.tipo==='Crypto'?'selected':''}>Crypto</option><option value="Otro" ${inv?.tipo==='Otro'?'selected':''}>Otro</option></select>`;
    h+=`<input class="fi" id="m-amt" type="number" placeholder="Monto" value="${inv?.amount||''}"><div class="fr"><input class="fi" id="m-tasa" type="number" step="0.1" placeholder="Renta %" value="${inv?.tasa||''}"><input class="fi" id="m-plazo" placeholder="Plazo" value="${inv?.plazo||''}"></div>`;
    h+=`<input class="fi" id="m-entidad" placeholder="Entidad" value="${inv?.entidad||''}"><button class="bp" onclick="saveInv()">${editId?'Guardar':'Agregar'}</button>`;
  }

  $("modal-body").innerHTML=h;
  if(col==="transactions")buildMCats();
  if($("m-rec-split"))$("m-rec-split").addEventListener("change",e=>{$("m-rec-split-other").value=100-parseInt(e.target.value||0)});
}

function closeModal(){$("mo").classList.add("hidden");editId=null;editCol=null}
function sfType(t){formType=t;formCat=t==="expense"?"food":"salary";const bs=$("modal-body")?.querySelectorAll(".tb");if(bs){bs[0].className="tb "+(t==="expense"?"ae":"off");bs[1].className="tb "+(t==="income"?"ai":"off")}buildMCats()}
function buildMCats(){const cats=formType==="expense"?ECAT:ICAT;const el=$("m-cats");if(!el)return;el.innerHTML=cats.map(c=>`<button class="cb" style="border-color:${formCat===c.id?'#0ea5e9':'#e2e8f0'};background:${formCat===c.id?'#0ea5e908':'transparent'};color:${formCat===c.id?'#0ea5e9':'#94a3b8'}" onclick="formCat='${c.id}';buildMCats()">${c.i} ${c.l}</button>`).join("")}

// ════════════════════════════════════════════
// SAVE
// ════════════════════════════════════════════

async function saveTx(){
  const desc=$("m-desc")?.value.trim(),amt=parseInt($("m-amt")?.value),date=$("m-date")?.value;
  if(!desc||isNaN(amt)||amt<=0)return toast("Completa campos");
  const sharedWith=$("m-shared")?.value||"";
  const realAmt=formType==="expense"?-amt:amt;
  const txAmt=sharedWith&&formType==="expense"?Math.round(realAmt/2):realAmt;
  const data={uid:curUser.uid,desc,amount:txAmt,cat:formCat,date:date||new Date().toISOString().slice(0,10),sharedWith:sharedWith||null};
  if(editId)data._id=editId;
  const id=await fbSave("transactions",data);
  if(id){
    if(editId){const idx=txs.findIndex(t=>t._id===editId);if(idx>=0)txs[idx]={_id:id,...data}}else{
      txs.unshift({_id:id,...data});
      if(sharedWith&&formType==="expense"){
        const debtData={fromUid:sharedWith,toUid:curUser.uid,amount:Math.abs(txAmt),desc,date:data.date,status:"pending",txId:id,splitPercent:50};
        const debtId=await fbSave("debts",debtData);
        if(debtId)debts.push({_id:debtId,...debtData});
      }
    }
    toast(editId?"Editado":"Guardado");closeModal();render();
  }
}

async function saveRecurring(){
  const name=$("m-rec-name")?.value.trim(),cat=$("m-rec-cat")?.value,amt=parseInt($("m-rec-amt")?.value),day=parseInt($("m-rec-day")?.value);
  if(!name||!cat||isNaN(amt)||amt<=0||isNaN(day)||day<1||day>31)return toast("Completa campos");
  const sharedWith=$("m-rec-shared")?.value||"";
  const splitPercent=sharedWith?parseInt($("m-rec-split")?.value||50):null;
  const data={uid:curUser.uid,name,category:cat,amount:amt,dayOfMonth:day,sharedWith:sharedWith||null,splitPercent};
  if(editId)data._id=editId;
  const id=await fbSave("recurring",data);
  if(id){
    if(editId){const idx=recurring.findIndex(r=>r._id===editId);if(idx>=0)recurring[idx]={_id:id,...data}}else recurring.push({_id:id,...data});
    toast(editId?"Editado":"Agregado");closeModal();render();
  }
}

async function saveCred(){
  const name=$("m-name")?.value.trim(),detail=$("m-detail")?.value.trim(),amt=parseInt($("m-amt")?.value),totalC=parseInt($("m-totalC")?.value)||0,paidC=parseInt($("m-paidC")?.value)||0,fechaPago=$("m-fechaPago")?.value||"",status=$("m-status")?.value;
  if(!name||isNaN(amt)||amt<=0)return toast("Completa campos");
  const data={uid:curUser.uid,name,detail,amount:amt,totalCuotas:totalC,paidCount:paidC,fechaPago,status};
  if(editId)data._id=editId;
  const id=await fbSave("credits",data);
  if(id){
    if(editId){const idx=credits.findIndex(c=>c._id===editId);if(idx>=0)credits[idx]={_id:id,...data}}else credits.unshift({_id:id,...data});
    toast(editId?"Editado":"Agregado");closeModal();render();
  }
}

async function saveQuote(){
  const banco=$("m-banco")?.value.trim(),producto=$("m-producto")?.value.trim(),monto=parseFloat($("m-monto")?.value),tasa=parseFloat($("m-tasa")?.value),plazo=parseInt($("m-plazo")?.value);
  const cuota=parseFloat($("m-cuota")?.value)||null;
  if(!banco||isNaN(monto)||monto<=0||isNaN(plazo)||plazo<=0)return toast("Completa campos");
  const data={uid:curUser.uid,banco,producto,monto,tasa:tasa||0,plazo,cuota};
  if(editId)data._id=editId;
  const id=await fbSave("quotes",data);
  if(id){
    if(editId){const idx=quotes.findIndex(q=>q._id===editId);if(idx>=0)quotes[idx]={_id:id,...data}}else quotes.unshift({_id:id,...data});
    toast(editId?"Editado":"Agregado");closeModal();render();
  }
}

async function saveInv(){
  const name=$("m-name")?.value.trim(),tipo=$("m-tipo")?.value,amt=parseFloat($("m-amt")?.value);
  const tasa=parseFloat($("m-tasa")?.value)||null,plazo=$("m-plazo")?.value.trim(),entidad=$("m-entidad")?.value.trim();
  if(!name||isNaN(amt)||amt<=0)return toast("Completa campos");
  const data={uid:curUser.uid,name,tipo,amount:amt,tasa,plazo,entidad};
  if(editId)data._id=editId;
  const id=await fbSave("investments",data);
  if(id){
    if(editId){const idx=investments.findIndex(v=>v._id===editId);if(idx>=0)investments[idx]={_id:id,...data}}else investments.unshift({_id:id,...data});
    toast(editId?"Editado":"Agregado");closeModal();render();
  }
}

// ════════════════════════════════════════════
// DELETE
// ════════════════════════════════════════════

function editItem(col,id){editId=id;openModalFor(col)}

function delItem(col,id,name){
  showCo("Eliminar","¿Eliminar '"+name+"'?","Eliminar",async()=>{
    await fbDel(col,id);
    if(col==="transactions")txs=txs.filter(t=>t._id!==id);
    if(col==="credits")credits=credits.filter(c=>c._id!==id);
    if(col==="quotes")quotes=quotes.filter(q=>q._id!==id);
    if(col==="investments")investments=investments.filter(v=>v._id!==id);
    if(col==="recurring")recurring=recurring.filter(r=>r._id!==id);
    toast("Eliminado");render();
  });
}

async function resetCol(col){
  showCo("Resetear","¿Eliminar TODOS los "+col+"?","OK",async()=>{
    const s=await db.collection(col).where("uid","==",curUser.uid).get();
    const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));
    await b.commit();
    if(col==="transactions")txs=[];
    toast("Reseteado");render();
  });
}

function confirmPayDebt(id){
  const d=debts.find(x=>x._id===id);if(!d)return;
  showCo("Confirmar Pago",`Pagaste ${fmt(d.amount)} por "${d.desc}"?`,"Confirmar",async()=>{
    await fbSave("debts",{_id:id,status:"paid",paidAt:new Date().toISOString()});
    const idx=debts.findIndex(x=>x._id===id);if(idx>=0)debts[idx].status="paid";
    toast("Pago confirmado");render();
  });
}

async function payCredit(id){
  const cr=credits.find(c=>c._id===id);if(!cr)return;
  showCo("Pagar Cuota",`Pagar cuota de ${cr.name} por ${fmt(cr.amount)}?`,"Pagar",async()=>{
    const paidCount=(cr.paidCount||0)+1;
    const newStatus=paidCount>=cr.totalCuotas?"paid":"pending";
    await fbSave("credits",{_id:id,paidCount,status:newStatus});
    cr.paidCount=paidCount;cr.status=newStatus;
    const tx={uid:curUser.uid,desc:"Pago cuota: "+cr.name,amount:-cr.amount,cat:"housing",date:new Date().toISOString().slice(0,10)};
    const txId=await fbSave("transactions",tx);
    if(txId)txs.unshift({_id:txId,...tx});
    toast("Cuota pagada");render();
  });
}
</script>
