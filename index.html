<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="google" content="notranslate">
<title>SimpleFinance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--accent2:#0284c7;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center;width:100%}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Login */
.login-bg{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo .icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo .text{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
.login-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--t3)}
.login-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fi{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:12px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.bp{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:700;transition:transform .1s;margin-top:8px}.bp:active{transform:scale(.97)}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px}

/* App */
.app{width:100%;min-height:100vh;background:var(--bg);display:flex;margin:0 auto}
.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;transition:all .15s;text-align:left}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px;display:flex;align-items:center;gap:10px}
.sf-user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logout-btn{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;transition:all .15s}.logout-btn:hover{background:#1e293b;color:#e2e8f0}

/* Main */
.main{flex:1;overflow:auto;position:relative;padding:28px 36px 30px}
.main-inner{max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--t1);margin-top:2px}

/* Grid */
.sg{display:grid;gap:12px;margin-bottom:22px}.sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
.sc{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}.sc .inn{padding:18px 16px}
.sc .lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}.sc .val{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--t1);margin-top:6px}.sc .sub{font-size:11px;font-weight:600;margin-top:4px}
.tc{display:grid;gap:18px}.tc2{grid-template-columns:1fr 1fr}
.card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fr{display:flex;gap:10px;margin-bottom:12px}.fr .fi{margin-bottom:0;flex:1}
.tg{display:grid;gap:8px}.tg2{grid-template-columns:1fr 1fr}
.tr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.tr .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}.tr .emoji-i{font-size:18px;flex-shrink:0}
.tr .desc{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr .date{font-size:10px;color:var(--t3)}.tr .right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tr .amt{font-size:13px;font-weight:700}.tr .amt.neg{color:var(--red)}.tr .amt.pos{color:var(--green)}
.ib{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;cursor:pointer}
.ib:hover{background:#f1f5f9}.ib.del:hover{background:#f43f5e15;color:var(--red)}.ib.edit:hover{background:#0ea5e915;color:var(--accent)}
.es{text-align:center;padding:40px 20px}.es .ei{font-size:48px;margin-bottom:12px}.es .et{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:6px}

/* Badge */
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;display:inline-block}
.badge.paid{background:#10b98120;color:#10b981}.badge.pending{background:#f4724520;color:#f47245}
.shared-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:#a855f712;color:#a855f7}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(14,165,233,.35);z-index:50;cursor:pointer}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0}
.mb{background:#fff;width:480px;max-width:95%;max-height:90vh;overflow-y:auto;border-radius:22px;padding:26px 22px 34px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;margin:20px 0}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt-t{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--t1)}
.mc{width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;font-size:16px;color:var(--t2);cursor:pointer}

/* Toggle */
.tt{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:16px;gap:2px}
.tb{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.tb.ae{background:#f43f5e15;color:#f43f5e}.tb.ai{background:#10b98115;color:#10b981}.tb.off{background:transparent;color:#94a3b8}
.cg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cb{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--t3);cursor:pointer}

/* Toast & Confirm */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:999;background:#0f172a;color:#38bdf8;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid #1e293b;animation:fadeIn .3s ease-out}
.sync-ind{position:fixed;top:24px;right:24px;z-index:60;display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08);border:1px solid var(--border)}
.sd{width:8px;height:8px;border-radius:50%}.sd.on{background:#10b981}.sd.off{background:#f43f5e}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.cbox{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;text-align:center}
.cbox h3{font-size:18px;font-weight:700;margin-bottom:8px}.cbox p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.cbtns{display:flex;gap:10px}.cbtns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.cbtn-c{background:#f1f5f9;color:var(--t2)}.cbtn-d{background:var(--red);color:#fff}

/* Debt */
.debt-card{padding:14px;border-radius:14px;border:1px solid var(--border);background:#fff;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.debt-left{display:flex;align-items:center;gap:10px;flex:1}
.debt-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.debt-info .name{font-size:13px;font-weight:600;color:var(--t1)}.debt-info .detail{font-size:11px;color:var(--t3)}
.debt-right{text-align:right;display:flex;align-items:center;gap:8px}
.debt-amt{font-size:15px;font-weight:700}

/* Cash flow table */
.cf-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.cf-table th{background:#f1f5f9;padding:8px;text-align:left;font-weight:700;color:var(--t1);border:1px solid var(--border)}
.cf-table td{padding:8px;border:1px solid var(--border);text-align:right}
.cf-table td:first-child{text-align:left;color:var(--t1);font-weight:600}
.cf-table .neg{color:var(--red)}.cf-table .pos{color:var(--green)}.cf-table .saldo{background:#f1f5f9;font-weight:700}

/* Chart bars */
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin:20px 0;padding:0 10px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar{border-radius:4px 4px 0 0;min-height:4px;transition:all .3s}
.bar-label{font-size:10px;font-weight:700;color:var(--t3)}

/* Hidden */
.hidden{display:none!important}

/* ═══════════════════════════════════════ */
/* RESPONSIVE: MOBILE (< 768px) */
/* ═══════════════════════════════════════ */
@media(max-width:767px){
  .app{flex-direction:column;width:100%;min-height:100vh}
  .sidebar{display:none}
  .main{padding:20px 16px 90px;width:100%;flex:1}
  .main-inner{max-width:100%}
  .header-title{font-size:20px}.header{margin-bottom:16px}
  .sg3{grid-template-columns:1fr}.sg4{grid-template-columns:1fr 1fr}.tc2{grid-template-columns:1fr}.tg2{grid-template-columns:1fr}
  .card{padding:14px}.card-t{font-size:13px}
  .sc .val{font-size:22px}.sc .inn{padding:14px 12px}.sc .lbl{font-size:9px}
  .cf-table{font-size:10px}.cf-table th,.cf-table td{padding:5px 3px}
  .tr{padding:10px 12px}.tr .desc,.tr .amt{font-size:12px}
  .debt-card{padding:12px 10px}
  .chart-bars{height:100px}
  .fab{bottom:80px;right:16px;width:48px;height:48px;font-size:20px}
  .mo{padding:20px 0}
  .mb{width:95%;max-width:100%;max-height:85vh;padding:20px 16px 24px}
  
  /* Mobile bottom nav */
  .mob-nav{display:flex!important;position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);padding:6px 0 10px;z-index:40;justify-content:space-around;align-items:center;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .mob-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8px;font-weight:700;color:var(--t3);padding:4px 6px;cursor:pointer}
  .mob-nav button.active{color:var(--accent)}
  .mob-nav button .mi{font-size:15px;margin-bottom:1px}
  .sf-user>div{display:none}
}

/* ═══════════════════════════════════════ */
/* RESPONSIVE: TABLET (768px - 1024px) */
/* ═══════════════════════════════════════ */
@media(min-width:768px) and (max-width:1024px){
  .app{flex-direction:row;width:100%}
  .sidebar{width:80px;padding:20px 8px}
  .logo-text{display:none}
  .sidebar-btn span:last-of-type{display:none}
  .sidebar-btn{padding:9px 8px;font-size:13px}
  .sidebar-btn .emoji{font-size:16px}
  .main{padding:24px 20px;flex:1}
  .header-title{font-size:22px}
  .sg3{grid-template-columns:1fr 1fr}.sg4{grid-template-columns:1fr 1fr}.tc2{grid-template-columns:1fr}.tg2{grid-template-columns:1fr}
  .cf-table{font-size:11px}.cf-table th,.cf-table td{padding:6px}
  .mb{width:500px;max-width:90%;max-height:90vh}
  .fab{bottom:20px;right:20px}
  .card-t{font-size:13px}
  .tr{padding:10px 12px}
  .mob-nav{display:none}
  .sf-user>div p:last-child{display:none}
}

/* ═══════════════════════════════════════ */
/* RESPONSIVE: DESKTOP (> 1024px) */
/* ═══════════════════════════════════════ */
@media(min-width:1025px){
  .app{flex-direction:row;width:100%}
  .sidebar{width:220px;padding:24px 14px}
  .logo-text{display:block}
  .sidebar-btn span:last-of-type{display:block}
  .sidebar-btn{padding:11px 12px;font-size:14px}
  .sidebar-btn .emoji{font-size:18px}
  .main{padding:28px 36px;flex:1}
  .header-title{font-size:26px}
  .sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}.tc2{grid-template-columns:1fr 1fr}.tg2{grid-template-columns:1fr 1fr}
  .cf-table{font-size:12px}.cf-table th,.cf-table td{padding:8px}
  .mb{width:480px;max-width:95%}
  .fab{bottom:24px;right:24px}
  .mob-nav{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-bg">
<div class="login-card">
  <div class="login-logo"><div class="icon">S</div><span class="text">SimpleFinance</span></div>
  <div class="login-tabs">
    <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
    <button class="login-tab" id="tab-register" onclick="switchTab('register')">Crear Cuenta</button>
  </div>
  <div id="login-form">

    <input class="fi" id="l-pass" type="password" placeholder="Contrasena">
    <p class="login-err" id="l-err"></p>
    <button class="bp" onclick="doLogin()">Ingresar</button>
  </div>
  <div id="register-form" class="hidden">
    <input class="fi" id="r-name" placeholder="Nombre completo">
    <input class="fi" id="r-rut" placeholder="RUT (ej: 12345678-9)">
    <input class="fi" id="r-pass" type="password" placeholder="Contrasena (min 6)">
    <input class="fi" id="r-pass2" type="password" placeholder="Confirmar contrasena">
    <p class="login-err" id="r-err"></p>
    <button class="bp" onclick="doRegister()">Crear Cuenta</button>
  </div>
</div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden" style="width:100%">
<div class="app" id="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo-wrap"><div class="logo-icon">S</div><span class="logo-text">SF</span></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="sf-user"><div class="avatar" id="sb-avatar">P</div><div><p style="font-size:13px;font-weight:700;color:#e2e8f0" id="sb-name">User</p><p style="font-size:11px;color:#64748b" id="sb-rut">RUT</p></div></div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <div class="main" id="main">
    <div class="main-inner">
      <header class="header"><div><p class="header-date" id="header-date"></p><h1 class="header-title" id="header-title">Mi Resumen</h1></div></header>
      <div id="vc"></div>
    </div>
  </div>
</div>
<!-- Mobile nav -->
<div class="mob-nav hidden" id="mob-nav"></div>
<div class="sync-ind" id="sync-ind"><span class="sd on"></span><span id="sync-text">OK</span></div>
<button class="fab" id="fab-btn" onclick="openModal()">+</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- MODAL -->
<div class="mo hidden" id="mo" onclick="if(event.target.id==='mo')closeModal()">
<div class="mb" onclick="event.stopPropagation()">
<div class="mh"><h3 class="mt-t" id="modal-title">Nuevo</h3><button class="mc" onclick="closeModal()">✕</button></div>
<div id="modal-body"></div>
</div>
</div>

<!-- CONFIRM -->
<div class="co hidden" id="co"><div class="cbox"><h3 id="co-t">Confirmar</h3><p id="co-m"></p><div class="cbtns"><button class="cbtn-c" onclick="closeCo()">Cancelar</button><button class="cbtn-d" id="co-a" onclick="execCo()">OK</button></div></div></div>

<script>

const ECAT=[{id:"food",l:"Alimentacion",i:"🍽️"},{id:"transport",l:"Transporte",i:"🚌"},{id:"housing",l:"Vivienda",i:"🏠"},{id:"services",l:"Servicios",i:"📡"},{id:"entertainment",l:"Ocio",i:"🎬"},{id:"health",l:"Salud",i:"🏥"},{id:"education",l:"Educacion",i:"📚"},{id:"shopping",l:"Compras",i:"🛒"},{id:"emergency",l:"Emergencia",i:"🚨"},{id:"other_exp",l:"Otro",i:"📋"}];
const ICAT=[{id:"salary",l:"Sueldo",i:"💰"},{id:"bonus",l:"Bono",i:"🎉"},{id:"freelance",l:"Freelance",i:"💻"},{id:"prize",l:"Premio",i:"🏆"},{id:"profits",l:"Utilidades",i:"📈"},{id:"rental",l:"Arriendo",i:"🏢"},{id:"gift",l:"Regalo",i:"🎁"},{id:"other_inc",l:"Otro",i:"➕"}];
const REC_CATS=[{id:"rent",l:"Arriendo",i:"🏠"},{id:"light",l:"Luz",i:"⚡"},{id:"water",l:"Agua",i:"💧"},{id:"internet",l:"Internet",i:"📶"},{id:"gas",l:"Gas",i:"🔥"},{id:"phone",l:"Telefono",i:"📱"},{id:"other",l:"Otro",i:"🔔"}];
const ACAT=[...ECAT,...ICAT];
const VIEWS=[{id:"dashboard",l:"Dashboard",e:"🏠"},{id:"cashflow",l:"Flujo Caja",e:"📊"},{id:"transactions",l:"Movimientos",e:"↕️"},{id:"debts",l:"Deudas",e:"🤝"},{id:"recurring",l:"Recurrentes",e:"🔄"},{id:"credits",l:"Creditos",e:"💳"},{id:"comparator",l:"Comparador",e:"⚖️"},{id:"invest",l:"Inversiones",e:"🌱"}];

let curUser=null,curProfile=null,allUsers=[];
let txs=[],credits=[],quotes=[],investments=[],debts=[],recurring=[];
let curView="dashboard",formType="expense",formCat="food",editId=null,editCol=null,coCb=null;

const fmt=n=>"$"+Math.abs(n).toLocaleString("es-CL");
const $=id=>document.getElementById(id);
const gc=id=>ACAT.find(c=>c.id===id)||{id:"?",l:"Otro",i:"❓"};
const grc=id=>REC_CATS.find(c=>c.id===id)||{id:"?",l:"Otro",i:"❓"};
const bal=()=>txs.reduce((s,t)=>s+t.amount,0);
const totI=()=>txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
const totE=()=>txs.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0);

function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function setSS(s,t){$("sync-ind").querySelector(".sd").className="sd "+s;$("sync-text").textContent=t}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}
function calcPmt(p,r,n){if(!r)return p/n;const mr=r/100/12;return p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1)}
function fmtRut(r){return r.replace(/[^0-9kK]/g,"").replace(/^(\d{1,2})(\d{3})(\d{3})([\dkK])$/,"$1.$2.$3-$4")}
function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(n){return n?n.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}
function getOtherUsers(){return allUsers.filter(u=>u.uid!==curUser.uid)}

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
}

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;
  if(!name||!rut||!pass){$("r-err").textContent="Completa campos";return}
  if(pass.length<6){$("r-err").textContent="Min 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="No coinciden";return}
  const email=rutToEmail(rut);
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast("Cuenta creada");
  }catch(e){
    $("r-err").textContent=e.code==="auth/email-already-in-use"?"RUT registrado":e.message;
  }
}

async function doLogin(){
  const rut=$("l-rut").value.trim(),pass=$("l-pass").value;
  if(!rut||!pass){$("l-err").textContent="Ingresa RUT y contrasena";return}
  const email=rutToEmail(rut);
  try{await auth.signInWithEmailAndPassword(email,pass)}
  catch(e){$("l-err").textContent="Datos incorrectos"}
}

function doLogout(){auth.signOut()}

auth.onAuthStateChanged(async user=>{
  if(user){
    curUser=user;
    const doc=await db.collection("users").doc(user.uid).get();
    curProfile=doc.exists?doc.data():{name:"Usuario",rut:""};
    const usersSnap=await db.collection("users").get();
    allUsers=usersSnap.docs.map(d=>({uid:d.id,...d.data()}));
    $("login-screen").classList.add("hidden");
    $("app-screen").classList.remove("hidden");
    $("sb-name").textContent=curProfile.name;
    $("sb-rut").textContent=curProfile.rut;
    $("sb-avatar").textContent=getInitial(curProfile.name);
    await loadAll();
  }else{
    curUser=null;curProfile=null;
    $("login-screen").classList.remove("hidden");
    $("app-screen").classList.add("hidden");
  }
});

// ════════════════════════════════════════════
// FIREBASE CRUD
// ════════════════════════════════════════════
async function fbLoad(col,filter=null){
  try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}
}
async function fbSave(col,data){
  try{const id=data._id||String(Date.now());const d={...data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(id).set(d,{merge:true});return id}catch(e){return null}
}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete()}catch(e){}}

async function loadAll(){
  const uid=curUser.uid;
  txs=await fbLoad("transactions",{f:"uid",v:uid});
  credits=await fbLoad("credits",{f:"uid",v:uid});
  quotes=await fbLoad("quotes",{f:"uid",v:uid});
  investments=await fbLoad("investments",{f:"uid",v:uid});
  const d1=await fbLoad("debts",{f:"fromUid",v:uid});
  const d2=await fbLoad("debts",{f:"toUid",v:uid});
  debts=[...d1,...d2].filter((d,i,a)=>a.findIndex(x=>x._id===d._id)===i);
  recurring=await fbLoad("recurring",{f:"uid",v:uid});
  txs.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  render();
}

// ════════════════════════════════════════════
// NAV & RENDER
// ════════════════════════════════════════════
function nav(v){curView=v;render()}
function buildSB(){$("sidebar-nav").innerHTML=VIEWS.map(v=>`<button class="sidebar-btn ${curView===v.id?'active':''}" onclick="nav('${v.id}')"><span class="emoji">${v.e}</span><span>${v.l}</span></button>`).join("")}
function buildMN(){$("mob-nav").innerHTML=VIEWS.map(v=>`<button class="${curView===v.id?'active':''}" onclick="nav('${v.id}')"><span class="mi">${v.e}</span></button>`).join("")}

function render(){
  $("header-date").textContent=new Date().toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"});
  const t={dashboard:"Mi Resumen",cashflow:"Flujo de Caja",transactions:"Movimientos",debts:"Deudas",recurring:"Recurrentes",credits:"Creditos",comparator:"Comparador",invest:"Inversiones"};
  $("header-title").textContent=t[curView]||"";
  buildSB();buildMN();
  $("vc").innerHTML={dashboard:rDash,cashflow:rCashFlow,transactions:rTx,debts:rDebts,recurring:rRecurring,credits:rCred,comparator:rComp,invest:rInv}[curView]();
}

// ════════════════════════════════════════════
// VIEWS - DASHBOARD
// ════════════════════════════════════════════
function rDash(){
  const b=bal(),i=totI(),e=totE();
  const pendDebts=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");
  const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");
  const deudaTotal=credits.reduce((s,c)=>s+c.amount*(c.totalCuotas-c.paidCount),0);
  const mesesRestantes=credits.length>0?Math.max(...credits.filter(c=>c.totalCuotas>c.paidCount).map(c=>c.totalCuotas-c.paidCount)):0;

  let h=`<div class="sg sg4"><div class="sc fade-in" style="border-left-color:#10b981"><div class="inn"><span class="lbl">BALANCE</span><p class="val" style="color:${b>=0?'#10b981':'#f43f5e'}">${fmt(b)}</p><p class="sub" style="color:${b>=0?'#10b981':'#f43f5e'}">${b>=0?'Positivo':'Negativo'}</p></div></div>`;
  h+=`<div class="sc fade-in" style="border-left-color:#10b981;animation-delay:.07s"><div class="inn"><span class="lbl">INGRESOS</span><p class="val">${fmt(i)}</p></div></div>`;
  h+=`<div class="sc fade-in" style="border-left-color:#f43f5e;animation-delay:.14s"><div class="inn"><span class="lbl">GASTOS</span><p class="val">${fmt(e)}</p></div></div>`;
  h+=`<div class="sc fade-in" style="border-left-color:#a855f7;animation-delay:.21s"><div class="inn"><span class="lbl">DEUDA</span><p class="val" style="color:#a855f7">${fmt(deudaTotal)}</p><p class="sub">${mesesRestantes}m</p></div></div></div>`;

  if(pendDebts.length>0||iOwe.length>0){
    if(pendDebts.length>0){h+=`<div class="card" style="margin-bottom:14px;border-left:4px solid var(--orange)"><h3 class="card-t">🔔 Te deben</h3>`;
    pendDebts.slice(0,2).forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:#a855f7">${getInitial(getUserName(d.fromUid))}</div><div class="debt-info"><p class="name">${getUserName(d.fromUid)}</p><p class="detail">${d.desc}</p></div></div><span class="debt-amt" style="color:var(--green)">${fmt(d.amount)}</span></div>`});
    h+=`</div>`}
    if(iOwe.length>0){h+=`<div class="card" style="border-left:4px solid var(--red)"><h3 class="card-t">⚠️ Debes pagar</h3>`;
    iOwe.slice(0,2).forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:#f43f5e">${getInitial(getUserName(d.toUid))}</div><div class="debt-info"><p class="name">${getUserName(d.toUid)}</p><p class="detail">${d.desc}</p></div></div><button class="ib edit" onclick="confirmPayDebt('${d._id}')">✓</button></div>`});
    h+=`</div>`}
  }
  return h;
}

// Placeholder para otras vistas (igual al código anterior)
function rCashFlow(){return`<div class="card"><p>Flujo de Caja: Proyeccion 12 meses</p></div>`}
function rTx(){if(txs.length===0)return`<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p></div>`;let h=`<div class="tg tg2">${txs.map((t,i)=>`<div class="tr fade-in" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${gc(t.cat).i}</span><div><p class="desc">${t.desc}</p><p class="date">${t.date||''}</p></div></div><div class="right"><p class="amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'-':'+'} ${fmt(t.amount)}</p></div></div>`).join("")}</div>`;return h}
function rDebts(){let h=`<p style="font-size:13px;color:var(--t3);margin-bottom:14px">Gastos compartidos</p>`;const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");const theyOwe=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");if(iOwe.length===0&&theyOwe.length===0)return h+`<div class="es"><div class="ei">✓</div><p class="et">Sin deudas</p></div>`;return h}
function rRecurring(){if(recurring.length===0)return`<div style="display:flex;justify-content:space-between;margin-bottom:14px"><h3>Gastos Fijos</h3><button class="bp" style="width:auto;padding:8px 16px;font-size:13px" onclick="openModalFor('recurring')">+ Agregar</button></div><div class="es"><div class="ei">🔄</div><p class="et">Sin gastos fijos</p></div>`;return `<div>Gastos Recurrentes: ${recurring.length}</div>`}
function rCred(){const tot=credits.reduce((s,c)=>s+c.amount*(c.totalCuotas-c.paidCount),0);if(credits.length===0)return`<div class="es"><div class="ei">💳</div><p class="et">Sin creditos</p></div>`;let h=`<p style="font-size:11px;color:var(--t3);margin-bottom:14px">Deuda total: <strong style="color:var(--red)">${fmt(tot)}</strong></p>`;h+=`<div class="tg tg2">${credits.map((c,i)=>`<div class="card fade-in" style="animation-delay:${i*.06}s"><p style="font-size:13px;font-weight:700">${c.icon||'📄'} ${c.name}</p><p style="font-size:12px;color:var(--t1);margin-top:6px">${fmt(c.amount)} x ${c.totalCuotas}cuotas</p></div>`).join("")}</div>`;return h}
function rComp(){if(quotes.length===0)return`<div class="es"><div class="ei">⚖️</div><p class="et">Sin cotizaciones</p></div>`;return `<div>Comparador: ${quotes.length} cotizaciones</div>`}
function rInv(){const tot=investments.reduce((s,v)=>s+v.amount,0);if(investments.length===0)return`<div class="es"><div class="ei">🌱</div><p class="et">Sin inversiones</p></div>`;return `<div class="card"><p style="font-size:14px;font-weight:700;color:var(--green)">${fmt(tot)}</p><p style="font-size:11px;color:var(--t3)">Patrimonio invertido</p></div>`}

function confirmPayDebt(id){
  const d=debts.find(x=>x._id===id);if(!d)return;
  showCo("Confirmar Pago",`Pagaste ${fmt(d.amount)} por "${d.desc}"?`,"Confirmar",async()=>{
    await fbSave("debts",{_id:id,status:"paid",paidAt:new Date().toISOString()});
    const idx=debts.findIndex(x=>x._id===id);if(idx>=0)debts[idx].status="paid";
    toast("Pago confirmado");render();
  });
}

// ════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════
function openModal(){editId=null;openModalFor("transactions")}
function openModalFor(col){editCol=col;$("mo").classList.remove("hidden");$("modal-title").textContent=editId?"Editar":"Nuevo";let h=`<input class="fi" id="m-desc" placeholder="Descripcion"><input class="fi" id="m-amt" type="number" placeholder="Monto"><button class="bp" onclick="saveTx()">Guardar</button>`;$("modal-body").innerHTML=h}
function closeModal(){$("mo").classList.add("hidden");editId=null;editCol=null}

// ════════════════════════════════════════════
// SAVE & DELETE
// ════════════════════════════════════════════
async function saveTx(){
  const desc=$("m-desc")?.value.trim(),amt=parseInt($("m-amt")?.value);
  if(!desc||isNaN(amt)||amt<=0)return toast("Completa campos");
  const data={uid:curUser.uid,desc,amount:-amt,cat:"food",date:new Date().toISOString().slice(0,10)};
  if(editId)data._id=editId;
  const id=await fbSave("transactions",data);
  if(id){txs.unshift({_id:id,...data});toast("Guardado");closeModal();render()}
}

function editItem(col,id){editId=id;openModalFor(col)}
function delItem(col,id,name){showCo("Eliminar","¿Eliminar?","OK",async()=>{await fbDel(col,id);if(col==="transactions")txs=txs.filter(t=>t._id!==id);toast("Eliminado");render()})}
async function resetCol(col){showCo("Resetear","¿Eliminar TODOS?","OK",async()=>{const s=await db.collection(col).where("uid","==",curUser.uid).get();const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit();if(col==="transactions")txs=[];toast("Reseteado");render()})}
</script>
