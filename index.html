<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>SimpleFinance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--accent2:#0284c7;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}input:focus,select:focus,textarea:focus{outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes growUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.fade-in{animation:fadeIn .4s ease-out both}.hidden{display:none!important}

/* Login */
.login-bg{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo .icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo .text{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--t1)}
.login-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--t3)}
.login-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fi{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:12px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.bp{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:700;transition:transform .1s;margin-top:8px}.bp:active{transform:scale(.97)}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px}

/* App layout */
.app{width:100%;max-width:1200px;min-height:100vh;background:var(--bg);display:flex;margin:0 auto}
.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;width:220px;padding:24px 14px}
.sidebar .logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;transition:all .15s;text-align:left}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px}
.sf-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logout-btn{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;transition:all .15s}.logout-btn:hover{background:#1e293b;color:#e2e8f0}

/* Main */
.main{flex:1;overflow:auto;position:relative;padding:28px 36px 30px}
.main-inner{max-width:900px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--t1);margin-top:2px}

/* Cards & Grid */
.sg{display:grid;gap:12px;margin-bottom:22px}.sg3{grid-template-columns:1fr 1fr 1fr}
.sc{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}.sc .inn{padding:18px 16px}
.sc .lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}.sc .val{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--t1);margin-top:6px}.sc .sub{font-size:11px;font-weight:600;margin-top:4px}
.tc{display:grid;gap:18px}.tc2{grid-template-columns:1fr 1fr}
.card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fr{display:flex;gap:10px;margin-bottom:12px}.fr .fi{margin-bottom:0}
.bd{padding:8px 16px;border-radius:10px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:12px;font-weight:700;transition:all .15s}.bd:hover{background:var(--red);color:#fff}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;display:inline-block}
.badge.paid{background:#10b98120;color:#10b981}.badge.pending{background:#f4724520;color:#f47245}.badge.upcoming{background:#818cf820;color:#818cf8}
.tg{display:grid;gap:8px}.tg2{grid-template-columns:1fr 1fr}
.tr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.tr .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}.tr .emoji-i{font-size:18px;flex-shrink:0}
.tr .desc{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr .date{font-size:10px;color:var(--t3)}.tr .right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tr .amt{font-size:13px;font-weight:700}.tr .amt.neg{color:var(--red)}.tr .amt.pos{color:var(--green)}
.ib{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ib:hover{background:#f1f5f9}.ib.del:hover{background:#f43f5e15;color:var(--red)}.ib.edit:hover{background:#0ea5e915;color:var(--accent)}
.es{text-align:center;padding:40px 20px}.es .ei{font-size:48px;margin-bottom:12px}.es .et{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:6px}.es .esub{font-size:13px;color:var(--t3);line-height:1.6}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(14,165,233,.35);z-index:50}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center}
.mb{background:#fff;width:440px;max-width:95%;max-height:90vh;overflow-y:auto;border-radius:22px;padding:26px 22px 34px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt-t{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--t1)}
.mc{width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;font-size:16px;color:var(--t2)}

/* Toggle */
.tt{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:16px;gap:2px}
.tb{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:700}
.tb.ae{background:#f43f5e15;color:#f43f5e}.tb.ai{background:#10b98115;color:#10b981}.tb.off{background:transparent;color:#94a3b8}
.cg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cb{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--t3)}

/* Toast & Confirm */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:999;background:#0f172a;color:#38bdf8;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid #1e293b;animation:fadeIn .3s ease-out}
.sync-ind{position:fixed;top:24px;right:24px;z-index:60;display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08);border:1px solid var(--border)}
.sd{width:8px;height:8px;border-radius:50%}.sd.on{background:#10b981}.sd.off{background:#f43f5e}.sd.sync{background:#f59e0b}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.cbox{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;text-align:center}
.cbox h3{font-size:18px;font-weight:700;margin-bottom:8px}.cbox p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.cbtns{display:flex;gap:10px}.cbtns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none}
.cbtn-c{background:#f1f5f9;color:var(--t2)}.cbtn-d{background:var(--red);color:#fff}

/* Tips */
.tip-card{padding:14px;border-radius:12px;border:1px solid;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.tip-icon{font-size:20px;flex-shrink:0}.tip-text h4{font-size:13px;font-weight:700;margin-bottom:2px}.tip-text p{font-size:12px;line-height:1.5;color:var(--t2)}

/* Debt card */
.debt-card{padding:14px;border-radius:14px;border:1px solid var(--border);background:#fff;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.debt-left{display:flex;align-items:center;gap:10px;flex:1}
.debt-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.debt-info .name{font-size:13px;font-weight:600;color:var(--t1)}.debt-info .detail{font-size:11px;color:var(--t3)}
.debt-right{text-align:right;display:flex;align-items:center;gap:8px}
.debt-amt{font-size:15px;font-weight:700}
.pay-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:700;background:var(--green);color:#fff;transition:transform .1s}.pay-btn:active{transform:scale(.95)}

/* Shared tag */
.shared-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:#a855f712;color:#a855f7;margin-left:6px}

/* Credit card */
.cr-card{padding:16px;border-radius:16px;border:1px solid var(--border);background:#fff;margin-bottom:12px}
.cr-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cr-name{font-size:15px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.cr-detail{font-size:11px;color:var(--t3);margin-top:2px}
.cr-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cr-m{padding:8px 10px;border-radius:10px;background:var(--bg3)}.cr-m .cr-ml{font-size:10px;color:var(--t3);font-weight:600}.cr-m .cr-mv{font-size:14px;font-weight:700;color:var(--t1);margin-top:2px}
.cr-pay-btn{width:100%;margin-top:12px;padding:10px;border-radius:10px;border:none;background:var(--green);color:#fff;font-size:13px;font-weight:700;transition:transform .1s}.cr-pay-btn:active{transform:scale(.95)}

/* Comparator */
.qt-card{padding:16px;border-radius:14px;border:1px solid var(--border);background:#fff;margin-bottom:12px}
.qt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qt-bank{font-size:14px;font-weight:700;color:var(--t1)}
.qt-metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px}.qt-metric:last-child{border-bottom:none}
.qt-ml{color:var(--t3)}.qt-mv{font-weight:700;color:var(--t1)}
.qt-winner{border-color:var(--green)!important;background:linear-gradient(135deg,#10b98106,#0ea5e904)!important}
.qt-winner-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#10b98118;color:#10b981}
.verdict{padding:18px;border-radius:16px;background:linear-gradient(135deg,#0ea5e908,#10b98108);border:1px solid #0ea5e920;margin-top:16px}
.verdict h4{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px}.verdict p{font-size:13px;color:var(--t2);line-height:1.6}

/* Investment */
.inv-card{padding:18px;border-radius:16px;border:1px solid var(--border);background:#fff;margin-bottom:12px}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .app{flex-direction:column}
  .main{padding:20px 16px 100px}
  .sg3{grid-template-columns:1fr}.tc2{grid-template-columns:1fr}.tg2{grid-template-columns:1fr}
  .cr-metrics{grid-template-columns:1fr 1fr}
  .mob-nav{display:flex!important}
}

/* Mobile bottom nav */
.mob-nav{display:none;position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);padding:8px 4px 16px;z-index:50;justify-content:space-around;box-shadow:0 -2px 16px rgba(0,0,0,.06)}
.mob-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--t3);padding:4px 8px}
.mob-nav button.active{color:var(--accent)}
.mob-nav button .mi{font-size:18px}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen" class="login-bg">
<div class="login-card">
  <div class="login-logo"><div class="icon">S</div><span class="text">SimpleFinance</span></div>
  <div class="login-tabs">
    <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
    <button class="login-tab" id="tab-register" onclick="switchTab('register')">Crear Cuenta</button>

    <button class="bp" onclick="doLogin()">Ingresar</button>
  </div>
  <div id="register-form" class="hidden">
    <input class="fi" id="r-name" placeholder="Nombre completo">
    <input class="fi" id="r-rut" placeholder="RUT (ej: 12345678-9)">
    <input class="fi" id="r-pass" type="password" placeholder="Contrasena (min 6 caracteres)">
    <input class="fi" id="r-pass2" type="password" placeholder="Confirmar contrasena">
    <p class="login-err" id="r-err"></p>
    <button class="bp" onclick="doRegister()">Crear Cuenta</button>
  </div>
</div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app-screen" class="hidden" style="width:100%">
<div class="app" id="app">
  <nav class="sidebar" id="sidebar">

    <div class="sidebar-footer">
      <div class="sf-user"><div class="avatar" id="sb-avatar">P</div><div><p style="font-size:13px;font-weight:700;color:#e2e8f0" id="sb-name">Usuario</p><p style="font-size:11px;color:#64748b" id="sb-rut">RUT</p></div></div>
      <button class="logout-btn" onclick="doLogout()">Cerrar Sesion</button>
    </div>
  </nav>
  <div class="main" id="main">
    <div class="main-inner">
      <header class="header"><div><p class="header-date" id="header-date"></p><h1 class="header-title" id="header-title">Mi Resumen</h1></div></header>
      <div id="vc"></div>
    </div>
  </div>
</div>
<div class="sync-ind" id="sync-ind"><span class="sd on"></span><span id="sync-text">Conectado</span></div>
<button class="fab" id="fab-btn" onclick="openModal()">+</button>

<!-- Mobile nav -->
<div class="mob-nav" id="mob-nav"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<!-- Modal -->
<div class="mo hidden" id="mo" onclick="closeModal()">
<div class="mb" onclick="event.stopPropagation()">
<div class="mh"><h3 class="mt-t" id="modal-title">Nuevo</h3><button class="mc" onclick="closeModal()">&#x2715;</button></div>
<div id="modal-body"></div>
</div>
</div>

{i:"📊",t:"Registra todo",d:"Los gastos hormiga suman +$100.000/mes.",bg:"#f59e0b08",bc:"#f59e0b20"},
{i:"❌",t:"Evita deuda rotativa",d:"Paga el total de la tarjeta siempre.",bg:"#f43f5e08",bc:"#f43f5e20"},
{i:"📈",t:"Interes compuesto",d:"$100K/mes al 8% = $18M en 10 anos.",bg:"#06b6d408",bc:"#06b6d420"},
];
const VIEWS=[{id:"dashboard",l:"Dashboard",e:"🏠",ni:"⬡",nl:"Inicio"},{id:"transactions",l:"Movimientos",e:"↕️",ni:"↕",nl:"Movimientos"},{id:"credits",l:"Creditos",e:"💳",ni:"◎",nl:"Creditos"},{id:"debts",l:"Deudas",e:"🤝",ni:"🤝",nl:"Deudas"},{id:"comparator",l:"Comparador",e:"⚖️",ni:"⚖",nl:"Comparar"},{id:"invest",l:"Inversiones",e:"🌱",ni:"△",nl:"Inversiones"}];

// STATE

let curUser=null,curProfile=null,allUsers=[];
let txs=[],credits=[],quotes=[],investments=[],debts=[];
let curView="dashboard",formType="expense",formCat="food",editId=null,editCol=null,coCb=null;

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
const fmt=n=>"$"+Math.abs(n).toLocaleString("es-CL");
const $=id=>document.getElementById(id);
const gc=id=>ACAT.find(c=>c.id===id)||{id:"?",l:"Otro",i:"❓",c:"#94a3b8"};
const bal=()=>txs.reduce((s,t)=>s+t.amount,0);
const totI=()=>txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
const totE=()=>txs.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0);
function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function setSS(s,t){$("sync-ind").querySelector(".sd").className="sd "+s;$("sync-text").textContent=t}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}
function calcPmt(p,r,n){if(!r)return p/n;const mr=r/100/12;return p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1)}
function fmtRut(r){return r.replace(/[^0-9kK]/g,"").replace(/^(\d{1,2})(\d{3})(\d{3})([\dkK])$/,"$1.$2.$3-$4")}
function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(name){return name?name.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}
function getOtherUsers(){return allUsers.filter(u=>u.uid!==curUser.uid)}

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
}

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;
  if(!name||!rut||!pass){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contrasena min 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contrasenas no coinciden";return}
  const email=rutToEmail(rut);
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast("Cuenta creada");
  }catch(e){
    if(e.code==="auth/email-already-in-use")$("r-err").textContent="Este RUT ya esta registrado";
    else $("r-err").textContent=e.message;
  }
}

async function doLogin(){
  const rut=$("l-rut").value.trim(),pass=$("l-pass").value;
  if(!rut||!pass){$("l-err").textContent="Ingresa RUT y contrasena";return}
  const email=rutToEmail(rut);
  try{await auth.signInWithEmailAndPassword(email,pass)}
  catch(e){$("l-err").textContent="RUT o contrasena incorrectos"}
}

function doLogout(){auth.signOut()}

auth.onAuthStateChanged(async user=>{
  if(user){
    curUser=user;
    const doc=await db.collection("users").doc(user.uid).get();
    curProfile=doc.exists?doc.data():{name:"Usuario",rut:""};
    // Load all users for shared expenses
    const usersSnap=await db.collection("users").get();
    allUsers=usersSnap.docs.map(d=>({uid:d.id,...d.data()}));
    $("login-screen").classList.add("hidden");
    $("app-screen").classList.remove("hidden");
    $("sb-name").textContent=curProfile.name;
    $("sb-rut").textContent=curProfile.rut;
    $("sb-avatar").textContent=getInitial(curProfile.name);
    await loadAll();
  }else{
    curUser=null;curProfile=null;
    $("login-screen").classList.remove("hidden");
    $("app-screen").classList.add("hidden");
  }
});

// ════════════════════════════════════════════
// FIREBASE CRUD
// ════════════════════════════════════════════
async function fbLoad(col,filter=null){
  try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){console.error(e);return[]}
}
async function fbSave(col,data){
  setSS("sync","Guardando...");
  try{const id=data._id||String(Date.now());const d={...data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(id).set(d,{merge:true});setSS("on","Guardado");setTimeout(()=>setSS("on","Conectado"),1200);return id}catch(e){console.error(e);setSS("off","Error");return null}
}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete();setSS("on","OK")}catch(e){console.error(e)}}

async function loadAll(){
  setSS("sync","Cargando...");
  const uid=curUser.uid;
  txs=await fbLoad("transactions",{f:"uid",v:uid});
  credits=await fbLoad("credits",{f:"uid",v:uid});
  quotes=await fbLoad("quotes",{f:"uid",v:uid});
  investments=await fbLoad("investments",{f:"uid",v:uid});
  // Debts: where I owe or someone owes me
  const d1=await fbLoad("debts",{f:"fromUid",v:uid});
  const d2=await fbLoad("debts",{f:"toUid",v:uid});
  debts=[...d1,...d2].filter((d,i,a)=>a.findIndex(x=>x._id===d._id)===i);
  txs.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  setSS("on","Conectado");
  render();
}

  buildSB();buildMN();

}

function rDash(){
  const b=bal(),i=totI(),e=totE();
  const pendDebts=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");
  const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");
  const stats=[{l:"BALANCE",v:fmt(b),c:b>=0?"#10b981":"#f43f5e",s:b>=0?"Positivo":"Negativo",ic:"💰"},{l:"INGRESOS",v:fmt(i),c:"#10b981",s:"Total acumulado",ic:"📈"},{l:"GASTOS",v:fmt(e),c:"#f43f5e",s:"Total acumulado",ic:"📉"}];
  let h=`<div class="sg sg3">${stats.map((s,i)=>`<div class="sc fade-in" style="border-left-color:${s.c};animation-delay:${i*.07}s"><div class="inn"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="lbl">${s.l}</span><span style="font-size:18px">${s.ic}</span></div><p class="val">${s.v}</p><p class="sub" style="color:${s.c}">${s.s}</p></div></div>`).join("")}</div>`;

  // Pending debts notification
  if(pendDebts.length>0){
    h+=`<div class="card" style="margin-bottom:18px;border-left:4px solid var(--orange)"><h3 class="card-t">🔔 Te deben dinero</h3>`;
    pendDebts.slice(0,3).forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:linear-gradient(135deg,#a855f7,#8b5cf6)">${getInitial(getUserName(d.fromUid))}</div><div class="debt-info"><p class="name">${getUserName(d.fromUid)}</p><p class="detail">${d.desc}</p></div></div><div class="debt-right"><span class="debt-amt" style="color:var(--green)">${fmt(d.amount)}</span></div></div>`});
    h+=`<button style="background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;margin-top:4px" onclick="nav('debts')">Ver todas →</button></div>`;
  }
  if(iOwe.length>0){
    h+=`<div class="card" style="margin-bottom:18px;border-left:4px solid var(--red)"><h3 class="card-t">⚠️ Debes pagar</h3>`;
    iOwe.slice(0,3).forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:linear-gradient(135deg,#f43f5e,#e11d48)">${getInitial(getUserName(d.toUid))}</div><div class="debt-info"><p class="name">${getUserName(d.toUid)}</p><p class="detail">${d.desc}</p></div></div><div class="debt-right"><span class="debt-amt" style="color:var(--red)">${fmt(d.amount)}</span><button class="pay-btn" onclick="confirmPayDebt('${d._id}')">Pagar</button></div></div>`});
    h+=`</div>`;
  }

  // Tips
  h+=`<div class="card" style="margin-bottom:18px"><h3 class="card-t">💡 Consejos</h3>${TIPS.slice(0,3).map(t=>`<div class="tip-card" style="background:${t.bg};border-color:${t.bc}"><span class="tip-icon">${t.i}</span><div class="tip-text"><h4>${t.t}</h4><p>${t.d}</p></div></div>`).join("")}</div>`;

  // Recent txs
  h+=`<div style="margin-top:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><p style="font-size:13px;font-weight:700">Ultimos movimientos</p><button style="background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer" onclick="nav('transactions')">Ver todos →</button></div>`;
  if(txs.length===0)h+=`<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p></div>`;
  else h+=`<div class="tg tg2">${txs.slice(0,4).map((t,i)=>txRow(t,i)).join("")}</div>`;
  h+=`</div>`;
  return h;
}

// ════════════════════════════════════════════
// TRANSACTIONS
// ════════════════════════════════════════════
function rTx(){
  if(txs.length===0)return`<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p><p class="esub">Presiona + para registrar</p></div>`;
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">${txs.length} registros</p><button class="bd" onclick="resetCol('transactions')">🗑 Resetear</button></div>`;
  h+=`<div class="tg tg2">${txs.map((t,i)=>txRow(t,i,true)).join("")}</div>`;
  return h;
}
function txRow(tx,i,showCat=false){
  const c=gc(tx.cat),neg=tx.amount<0;
  const shared=tx.sharedWith?`<span class="shared-tag">Compartido</span>`:'';
  return`<div class="tr fade-in" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${c.i}</span><div><p class="desc">${tx.desc}${shared}</p><p class="date">${showCat?c.l+' - ':''}${tx.date||''}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.amount)}</p><button class="ib edit" onclick="editItem('transactions','${tx._id}')">✏️</button><button class="ib del" onclick="delItem('transactions','${tx._id}','${tx.desc}')">🗑</button></div></div>`;
}

// ════════════════════════════════════════════
// CREDITS (with payment)
// ════════════════════════════════════════════
function rCred(){
  const tot=credits.reduce((s,c)=>s+c.amount,0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><p style="font-size:13px;color:var(--t3)">Total cuotas: <strong style="color:var(--orange)">${fmt(tot)}</strong></p><button class="bp" style="width:auto;padding:10px 20px;font-size:13px" onclick="openModalFor('credits')">+ Agregar Credito</button></div>`;
  if(credits.length===0)return h+`<div class="es"><div class="ei">💳</div><p class="et">Sin creditos</p></div>`;
  credits.forEach((cr,i)=>{
    const paidCount=cr.paidCount||0;const totalCuotas=cr.totalCuotas||0;const remaining=totalCuotas-paidCount;
    h+=`<div class="cr-card fade-in" style="animation-delay:${i*.06}s"><div class="cr-header"><div><p class="cr-name"><span style="font-size:22px">${cr.icon||'📄'}</span> ${cr.name}</p><p class="cr-detail">${cr.detail||''}</p></div><div style="display:flex;gap:4px"><button class="ib edit" onclick="editItem('credits','${cr._id}')">✏️</button><button class="ib del" onclick="delItem('credits','${cr._id}','${cr.name}')">🗑</button></div></div>`;
    h+=`<div class="cr-metrics"><div class="cr-m"><p class="cr-ml">CUOTA MENSUAL</p><p class="cr-mv">${fmt(cr.amount)}</p></div><div class="cr-m"><p class="cr-ml">ESTADO</p><p class="cr-mv"><span class="badge ${cr.status||'pending'}">${cr.status==='paid'?'PAGADO':cr.status==='upcoming'?'PROXIMO':'PENDIENTE'}</span></p></div>`;
    if(totalCuotas>0)h+=`<div class="cr-m"><p class="cr-ml">CUOTAS</p><p class="cr-mv">${paidCount}/${totalCuotas}</p></div>`;
    if(cr.fechaPago)h+=`<div class="cr-m"><p class="cr-ml">FECHA PAGO</p><p class="cr-mv">${cr.fechaPago}</p></div>`;
    h+=`</div>`;
    if(cr.status!=='paid'&&totalCuotas>0&&remaining>0){
      h+=`<button class="cr-pay-btn" onclick="payCredit('${cr._id}')">💰 Pagar Cuota (quedan ${remaining})</button>`;
    }
    h+=`</div>`;
  });
  return h;
}

async function payCredit(id){
  const cr=credits.find(c=>c._id===id);if(!cr)return;
  showCo("Pagar Cuota",`Registrar pago de cuota de ${cr.name} por ${fmt(cr.amount)}?`,"Pagar",async()=>{
    const paidCount=(cr.paidCount||0)+1;
    const totalCuotas=cr.totalCuotas||0;
    const newStatus=paidCount>=totalCuotas?"paid":"pending";
    await fbSave("credits",{_id:id,paidCount,status:newStatus});
    cr.paidCount=paidCount;cr.status=newStatus;
    // Register as expense
    const tx={uid:curUser.uid,desc:"Pago cuota: "+cr.name,amount:-cr.amount,cat:"housing",date:new Date().toISOString().slice(0,10)};
    const txId=await fbSave("transactions",tx);
    if(txId)txs.unshift({_id:txId,...tx});
    toast("Cuota pagada: "+cr.name);render();
  });
}

// ════════════════════════════════════════════
// DEBTS (shared expenses)
// ════════════════════════════════════════════
function rDebts(){
  const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");
  const theyOwe=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");
  const history=debts.filter(d=>d.status==="paid");

  let h=`<p style="font-size:13px;color:var(--t3);margin-bottom:18px">Administra gastos compartidos con otros usuarios.</p>`;

  // What I owe
  h+=`<div class="card" style="margin-bottom:18px"><h3 class="card-t">⚠️ Debo Pagar (${iOwe.length})</h3>`;
  if(iOwe.length===0)h+=`<p style="font-size:13px;color:var(--t3);text-align:center;padding:16px">No debes nada 🎉</p>`;
  else iOwe.forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:linear-gradient(135deg,#f43f5e,#e11d48)">${getInitial(getUserName(d.toUid))}</div><div class="debt-info"><p class="name">A: ${getUserName(d.toUid)}</p><p class="detail">${d.desc} - ${d.date||''}</p></div></div><div class="debt-right"><span class="debt-amt" style="color:var(--red)">${fmt(d.amount)}</span><button class="pay-btn" onclick="confirmPayDebt('${d._id}')">Confirmar Pago</button></div></div>`});
  h+=`</div>`;

  // What they owe me
  h+=`<div class="card" style="margin-bottom:18px"><h3 class="card-t">💰 Me Deben (${theyOwe.length})</h3>`;
  if(theyOwe.length===0)h+=`<p style="font-size:13px;color:var(--t3);text-align:center;padding:16px">Nadie te debe</p>`;
  else{const totOwed=theyOwe.reduce((s,d)=>s+d.amount,0);
  h+=`<p style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:10px">Total: ${fmt(totOwed)}</p>`;
  theyOwe.forEach(d=>{h+=`<div class="debt-card"><div class="debt-left"><div class="debt-avatar" style="background:linear-gradient(135deg,#a855f7,#8b5cf6)">${getInitial(getUserName(d.fromUid))}</div><div class="debt-info"><p class="name">De: ${getUserName(d.fromUid)}</p><p class="detail">${d.desc} - ${d.date||''}</p></div></div><div class="debt-right"><span class="debt-amt" style="color:var(--green)">${fmt(d.amount)}</span><span class="badge pending">PENDIENTE</span></div></div>`})}
  h+=`</div>`;

  // History
  if(history.length>0){
    h+=`<div class="card"><h3 class="card-t">📜 Historial (${history.length})</h3>`;
    history.slice(0,5).forEach(d=>{
      const isFrom=d.fromUid===curUser.uid;
      h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px"><span style="color:var(--t3)">${isFrom?'Pagaste a':'Recibiste de'} ${getUserName(isFrom?d.toUid:d.fromUid)}: ${d.desc}</span><span class="badge paid">PAGADO</span></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function confirmPayDebt(id){
  const d=debts.find(x=>x._id===id);if(!d)return;
  showCo("Confirmar Pago",`Confirmar que pagaste ${fmt(d.amount)} a ${getUserName(d.toUid)} por "${d.desc}"?`,"Confirmar Pago",async()=>{
    await fbSave("debts",{_id:id,status:"paid",paidAt:new Date().toISOString()});
    const idx=debts.findIndex(x=>x._id===id);if(idx>=0)debts[idx].status="paid";
    toast("Pago confirmado");render();
  });
}

// ════════════════════════════════════════════
// COMPARATOR
// ════════════════════════════════════════════
function rComp(){
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><p style="font-size:13px;color:var(--t3)">Compara cotizaciones de credito</p><button class="bp" style="width:auto;padding:10px 20px;font-size:13px" onclick="openModalFor('quotes')">+ Cotizacion</button></div>`;
  if(quotes.length===0)return h+`<div class="es"><div class="ei">⚖️</div><p class="et">Sin cotizaciones</p><p class="esub">Agrega al menos 2 para comparar</p></div>`;

  const wCalc=quotes.map(q=>{const pmt=q.cuota||calcPmt(q.monto,q.tasa,q.plazo);const total=pmt*q.plazo;return{...q,pmt,total,interest:total-q.monto}});
  const minT=Math.min(...wCalc.map(q=>q.total));

  wCalc.forEach((q,i)=>{
    const isW=q.total===minT&&quotes.length>1;
    h+=`<div class="qt-card ${isW?'qt-winner':''} fade-in" style="animation-delay:${i*.06}s"><div class="qt-header"><div><span class="qt-bank">${q.banco||'Credito '+(i+1)}</span>${q.producto?`<span style="font-size:11px;color:var(--t3);margin-left:8px">${q.producto}</span>`:''}</div><div style="display:flex;align-items:center;gap:6px">${isW?'<span class="qt-winner-badge">✓ MEJOR</span>':''}<button class="ib edit" onclick="editItem('quotes','${q._id}')">✏️</button><button class="ib del" onclick="delItem('quotes','${q._id}','${q.banco}')">🗑</button></div></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Monto</span><span class="qt-mv">${fmt(q.monto)}</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Tasa anual</span><span class="qt-mv">${q.tasa}%</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Plazo</span><span class="qt-mv">${q.plazo} meses</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Cuota mensual</span><span class="qt-mv" style="color:var(--accent)">${fmt(q.pmt)}</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Total intereses</span><span class="qt-mv" style="color:var(--orange)">${fmt(q.interest)}</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Costo total</span><span class="qt-mv" style="font-size:16px;color:${isW?'var(--green)':'var(--red)'}">${fmt(q.total)}</span></div>`;
    if(q.seguro)h+=`<div class="qt-metric"><span class="qt-ml">Seguro</span><span class="qt-mv">${fmt(q.seguro)}/mes</span></div>`;
    if(q.notas)h+=`<p style="font-size:11px;color:var(--t3);margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9">📝 ${q.notas}</p>`;
    h+=`</div>`;
  });

  if(quotes.length>=2){const best=wCalc.find(q=>q.total===minT);const worst=wCalc.find(q=>q.total===Math.max(...wCalc.map(x=>x.total)));
  h+=`<div class="verdict"><h4>💡 Analisis</h4><p><strong>${best.banco||'Mejor opcion'}</strong> te ahorra <strong style="color:var(--green)">${fmt(worst.total-best.total)}</strong> vs la alternativa mas cara.</p></div>`}
  return h;
}

// ════════════════════════════════════════════
// INVESTMENTS
// ════════════════════════════════════════════
function rInv(){
  const tot=investments.reduce((s,v)=>s+v.amount,0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><p style="font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1px">PATRIMONIO INVERTIDO</p><p style="font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--green);margin-top:4px">${fmt(tot)}</p></div><button class="bp" style="width:auto;padding:10px 20px;font-size:13px" onclick="openModalFor('investments')">+ Inversion</button></div>`;
  if(investments.length===0)return h+`<div class="es"><div class="ei">🌱</div><p class="et">Sin inversiones</p></div>`;
  investments.forEach((inv,i)=>{
    h+=`<div class="inv-card fade-in" style="animation-delay:${i*.06}s"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><p style="font-size:15px;font-weight:700">${inv.name}</p><p style="font-size:11px;color:var(--t3)">${inv.tipo||''}</p></div><div style="display:flex;gap:4px"><button class="ib edit" onclick="editItem('investments','${inv._id}')">✏️</button><button class="ib del" onclick="delItem('investments','${inv._id}','${inv.name}')">🗑</button></div></div>`;
    h+=`<p style="font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--green);margin:8px 0">${fmt(inv.amount)}</p>`;
    h+=`<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--t3)">`;
    if(inv.tasa)h+=`<span>Renta: <strong style="color:var(--t1)">${inv.tasa}%</strong></span>`;
    if(inv.plazo)h+=`<span>Plazo: <strong style="color:var(--t1)">${inv.plazo}</strong></span>`;
    if(inv.entidad)h+=`<span>En: <strong style="color:var(--t1)">${inv.entidad}</strong></span>`;
    h+=`</div></div>`;
  });
  return h;
}

// ════════════════════════════════════════════
// MODAL SYSTEM
// ════════════════════════════════════════════
function openModal(){editId=null;
  if(curView==="credits")return openModalFor("credits");
  if(curView==="comparator")return openModalFor("quotes");
  if(curView==="invest")return openModalFor("investments");
  if(curView==="debts")return openModalFor("transactions");
  openModalFor("transactions");
}

function openModalFor(col){
  editCol=col;$("mo").classList.remove("hidden");
  let h="";

  if(col==="transactions"){
    const tx=editId?txs.find(t=>t._id===editId):null;
    const ft=tx?(tx.amount>0?"income":"expense"):"expense";
    formType=ft;formCat=tx?tx.cat:(ft==="expense"?"food":"salary");
    $("modal-title").textContent=editId?"Editar Transaccion":"Nueva Transaccion";
    h+=`<div class="tt"><button class="tb ${ft==='expense'?'ae':'off'}" onclick="sfType('expense')">Gasto</button><button class="tb ${ft==='income'?'ai':'off'}" onclick="sfType('income')">Ingreso</button></div>`;
    h+=`<input class="fi" id="m-desc" placeholder="Descripcion" value="${tx?tx.desc:''}">`;
    h+=`<input class="fi" id="m-amt" type="number" placeholder="Monto $" value="${tx?Math.abs(tx.amount):''}">`;
    h+=`<input class="fi" id="m-date" type="date" value="${tx?tx.date:new Date().toISOString().slice(0,10)}">`;
    h+=`<div class="cg" id="m-cats"></div>`;

    // Shared expense option
    const others=getOtherUsers();
    if(others.length>0){
      const sharedUid=tx?.sharedWith||"";
      h+=`<div style="padding:12px;border-radius:12px;background:#a855f708;border:1px solid #a855f720;margin-bottom:16px"><p style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px">🤝 Compartir gasto con:</p>`;
      h+=`<select class="fi" id="m-shared" style="margin-bottom:0"><option value="">No compartir</option>${others.map(u=>`<option value="${u.uid}" ${sharedUid===u.uid?'selected':''}>${u.name} (${u.rut})</option>`).join("")}</select>`;
      h+=`<p style="font-size:11px;color:var(--t3);margin-top:6px">Se dividira 50/50 y le aparecera como deuda pendiente.</p></div>`;
    }
    h+=`<button class="bp" onclick="saveTx()">${editId?'Guardar':'Guardar Transaccion'}</button>`;
  }
  else if(col==="credits"){
    const cr=editId?credits.find(c=>c._id===editId):null;
    $("modal-title").textContent=editId?"Editar Credito":"Nuevo Credito";
    h+=`<input class="fi" id="m-name" placeholder="Nombre" value="${cr?cr.name:''}">`;
    h+=`<input class="fi" id="m-detail" placeholder="Detalle" value="${cr?.detail||''}">`;
    h+=`<input class="fi" id="m-amt" type="number" placeholder="Monto cuota $" value="${cr?cr.amount:''}">`;
    h+=`<div class="fr"><input class="fi" id="m-totalC" type="number" placeholder="Total cuotas" value="${cr?.totalCuotas||''}"><input class="fi" id="m-paidC" type="number" placeholder="Cuotas pagadas" value="${cr?.paidCount||'0'}"></div>`;
    h+=`<input class="fi" id="m-fechaPago" type="date" placeholder="Fecha proximo pago" value="${cr?.fechaPago||''}">`;
    h+=`<div class="fr"><select class="fi" id="m-status"><option value="pending" ${cr?.status==='pending'?'selected':''}>Pendiente</option><option value="paid" ${cr?.status==='paid'?'selected':''}>Pagado</option><option value="upcoming" ${cr?.status==='upcoming'?'selected':''}>Proximo</option></select>`;
    h+=`<select class="fi" id="m-icon"><option value="🏠" ${cr?.icon==='🏠'?'selected':''}>🏠 Vivienda</option><option value="🚗" ${cr?.icon==='🚗'?'selected':''}>🚗 Auto</option><option value="📶" ${cr?.icon==='📶'?'selected':''}>📶 Internet</option><option value="💳" ${cr?.icon==='💳'?'selected':''}>💳 Tarjeta</option><option value="📱" ${cr?.icon==='📱'?'selected':''}>📱 Telefono</option><option value="⚡" ${cr?.icon==='⚡'?'selected':''}>⚡ Luz</option><option value="💧" ${cr?.icon==='💧'?'selected':''}>💧 Agua</option><option value="🎓" ${cr?.icon==='🎓'?'selected':''}>🎓 Educacion</option><option value="📄" ${cr?.icon==='📄'||!cr?'selected':''}>📄 Otro</option></select></div>`;
    h+=`<button class="bp" onclick="saveCred()">${editId?'Guardar':'Agregar Credito'}</button>`;
  }
  else if(col==="quotes"){
    const q=editId?quotes.find(c=>c._id===editId):null;
    $("modal-title").textContent=editId?"Editar Cotizacion":"Nueva Cotizacion";
    h+=`<input class="fi" id="m-banco" placeholder="Banco o entidad" value="${q?.banco||''}">`;
    h+=`<input class="fi" id="m-producto" placeholder="Producto (ej: Consumo, Hipotecario)" value="${q?.producto||''}">`;
    h+=`<input class="fi" id="m-monto" type="number" placeholder="Monto credito $" value="${q?.monto||''}">`;
    h+=`<div class="fr"><input class="fi" id="m-tasa" type="number" step="0.01" placeholder="Tasa anual %" value="${q?.tasa||''}"><input class="fi" id="m-plazo" type="number" placeholder="Plazo (meses)" value="${q?.plazo||''}"></div>`;
    h+=`<input class="fi" id="m-cuota" type="number" placeholder="Cuota mensual $ (si te la dieron)" value="${q?.cuota||''}">`;
    h+=`<input class="fi" id="m-seguro" type="number" placeholder="Seguro $/mes (opcional)" value="${q?.seguro||''}">`;
    h+=`<textarea class="fi" id="m-notas" placeholder="Notas, comisiones, condiciones" style="height:60px;resize:vertical">${q?.notas||''}</textarea>`;
    h+=`<button class="bp" onclick="saveQuote()">${editId?'Guardar':'Agregar Cotizacion'}</button>`;
  }
  else if(col==="investments"){
    const inv=editId?investments.find(c=>c._id===editId):null;
    $("modal-title").textContent=editId?"Editar Inversion":"Nueva Inversion";
    h+=`<input class="fi" id="m-name" placeholder="Nombre" value="${inv?.name||''}">`;
    h+=`<select class="fi" id="m-tipo"><option value="Fondo Mutuo" ${inv?.tipo==='Fondo Mutuo'?'selected':''}>Fondo Mutuo</option><option value="Deposito a Plazo" ${inv?.tipo==='Deposito a Plazo'?'selected':''}>Deposito a Plazo</option><option value="APV" ${inv?.tipo==='APV'?'selected':''}>APV</option><option value="Acciones" ${inv?.tipo==='Acciones'?'selected':''}>Acciones</option><option value="Crypto" ${inv?.tipo==='Crypto'?'selected':''}>Crypto</option><option value="Cuenta 2 AFP" ${inv?.tipo==='Cuenta 2 AFP'?'selected':''}>Cuenta 2 AFP</option><option value="Propiedad" ${inv?.tipo==='Propiedad'?'selected':''}>Propiedad</option><option value="Otro" ${inv?.tipo==='Otro'?'selected':''}>Otro</option></select>`;
    h+=`<input class="fi" id="m-amt" type="number" placeholder="Monto $" value="${inv?.amount||''}">`;
    h+=`<div class="fr"><input class="fi" id="m-tasa" type="number" step="0.1" placeholder="Rent. anual %" value="${inv?.tasa||''}"><input class="fi" id="m-plazo2" placeholder="Plazo" value="${inv?.plazo||''}"></div>`;
    h+=`<input class="fi" id="m-entidad" placeholder="Entidad" value="${inv?.entidad||''}">`;
    h+=`<textarea class="fi" id="m-notas" placeholder="Notas" style="height:60px;resize:vertical">${inv?.notas||''}</textarea>`;
    h+=`<button class="bp" onclick="saveInv()">${editId?'Guardar':'Agregar Inversion'}</button>`;
  }

  $("modal-body").innerHTML=h;
  if(col==="transactions")buildMCats();
}

function closeModal(){$("mo").classList.add("hidden");editId=null;editCol=null}
function sfType(t){formType=t;formCat=t==="expense"?"food":"salary";const bs=$("modal-body")?.querySelectorAll(".tb");if(bs&&bs[0])bs[0].className="tb "+(t==="expense"?"ae":"off");if(bs&&bs[1])bs[1].className="tb "+(t==="income"?"ai":"off");buildMCats()}
function buildMCats(){const cats=formType==="expense"?ECAT:ICAT;const el=$("m-cats");if(!el)return;el.innerHTML=cats.map(c=>`<button class="cb" style="border-color:${formCat===c.id?c.c:'#e2e8f0'};background:${formCat===c.id?c.c+'12':'transparent'};color:${formCat===c.id?c.c:'#94a3b8'}" onclick="formCat='${c.id}';buildMCats()">${c.i} ${c.l}</button>`).join("")}

// ════════════════════════════════════════════
// SAVE FUNCTIONS
// ════════════════════════════════════════════
async function saveTx(){
  const desc=$("m-desc")?.value.trim(),amt=parseInt($("m-amt")?.value),date=$("m-date")?.value;
  if(!desc||isNaN(amt)||amt<=0)return toast("Completa los campos");
  const sharedWith=$("m-shared")?.value||"";
  const realAmt=formType==="expense"?-amt:amt;
  const txAmt=sharedWith&&formType==="expense"?Math.round(realAmt/2):realAmt;

  const data={uid:curUser.uid,desc,amount:txAmt,cat:formCat,date:date||new Date().toISOString().slice(0,10),sharedWith:sharedWith||null};
  if(editId)data._id=editId;
  const id=await fbSave("transactions",data);
  if(id){
    if(editId){const idx=txs.findIndex(t=>t._id===editId);if(idx>=0)txs[idx]={_id:editId,...data}}
    else txs.unshift({_id:id,...data});

    // Create debt for shared expense
    if(sharedWith&&!editId&&formType==="expense"){
      const debtData={fromUid:sharedWith,toUid:curUser.uid,amount:Math.abs(txAmt),desc,date:data.date,status:"pending",txId:id};
      const debtId=await fbSave("debts",debtData);
      if(debtId)debts.push({_id:debtId,...debtData});
    }

    toast(editId?"Editado":"Guardado: "+desc);closeModal();render();
  }
}

async function saveCred(){
  const name=$("m-name")?.value.trim(),detail=$("m-detail")?.value.trim(),amt=parseInt($("m-amt")?.value),status=$("m-status")?.value,icon=$("m-icon")?.value;
  const totalCuotas=parseInt($("m-totalC")?.value)||0,paidCount=parseInt($("m-paidC")?.value)||0,fechaPago=$("m-fechaPago")?.value||"";
  if(!name||isNaN(amt)||amt<=0)return toast("Completa nombre y monto");
  const data={uid:curUser.uid,name,detail,amount:amt,status,icon,totalCuotas,paidCount,fechaPago};
  if(editId)data._id=editId;
  const id=await fbSave("credits",data);
  if(id){if(editId){const idx=credits.findIndex(c=>c._id===editId);if(idx>=0)credits[idx]={_id:editId,...data}}else credits.unshift({_id:id,...data});
  toast(editId?"Editado":"Agregado");closeModal();render()}
}

async function saveQuote(){
  const banco=$("m-banco")?.value.trim(),producto=$("m-producto")?.value.trim(),monto=parseFloat($("m-monto")?.value),tasa=parseFloat($("m-tasa")?.value),plazo=parseInt($("m-plazo")?.value);
  const cuota=parseFloat($("m-cuota")?.value)||null,seguro=parseFloat($("m-seguro")?.value)||null,notas=$("m-notas")?.value.trim();
  if(!banco||isNaN(monto)||monto<=0||isNaN(plazo)||plazo<=0)return toast("Completa campos requeridos");
  const data={uid:curUser.uid,banco,producto,monto,tasa:tasa||0,plazo,cuota,seguro,notas};
  if(editId)data._id=editId;
  const id=await fbSave("quotes",data);
  if(id){if(editId){const idx=quotes.findIndex(q=>q._id===editId);if(idx>=0)quotes[idx]={_id:editId,...data}}else quotes.unshift({_id:id,...data});
  toast(editId?"Editado":"Agregado");closeModal();render()}
}

async function saveInv(){
  const name=$("m-name")?.value.trim(),tipo=$("m-tipo")?.value,amt=parseFloat($("m-amt")?.value);
  const tasa=parseFloat($("m-tasa")?.value)||null,plazo=$("m-plazo2")?.value.trim(),entidad=$("m-entidad")?.value.trim(),notas=$("m-notas")?.value.trim();
  if(!name||isNaN(amt)||amt<=0)return toast("Completa nombre y monto");
  const data={uid:curUser.uid,name,tipo,amount:amt,tasa,plazo,entidad,notas};
  if(editId)data._id=editId;
  const id=await fbSave("investments",data);
  if(id){if(editId){const idx=investments.findIndex(v=>v._id===editId);if(idx>=0)investments[idx]={_id:editId,...data}}else investments.unshift({_id:id,...data});
  toast(editId?"Editado":"Agregado");closeModal();render()}
}

// ════════════════════════════════════════════
// EDIT / DELETE / RESET
// ════════════════════════════════════════════
function editItem(col,id){editId=id;openModalFor(col)}
function delItem(col,id,name){showCo("Eliminar","Eliminar '"+name+"'?","Eliminar",async()=>{
  await fbDel(col,id);
  if(col==="transactions")txs=txs.filter(t=>t._id!==id);
  if(col==="credits")credits=credits.filter(c=>c._id!==id);
  if(col==="quotes")quotes=quotes.filter(q=>q._id!==id);
  if(col==="investments")investments=investments.filter(v=>v._id!==id);
  toast("Eliminado");render();
})}
async function resetCol(col){showCo("Resetear","Eliminar TODOS los registros?","Resetear",async()=>{
  const s=await db.collection(col).where("uid","==",curUser.uid).get();const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit();
  if(col==="transactions")txs=[];if(col==="credits")credits=[];if(col==="quotes")quotes=[];if(col==="investments")investments=[];
  toast("Reseteado");render();
})}
