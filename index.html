<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimpleFinance — Gestión Financiera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --bg2: #ffffff;
  --bg3: #f8fafc;
  --t1: #0f172a;
  --t2: #334155;
  --t3: #94a3b8;
  --accent: #0ea5e9;
  --accent2: #0284c7;
  --red: #f43f5e;
  --green: #10b981;
  --orange: #f47245;
  --purple: #a855f7;
  --border: #e2e8f0;
  --sidebar: #0f172a;
  --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #1e293b;
  color: var(--t1);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; }
input:focus, select:focus { outline: none; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { opacity:0; transform:translateY(100%); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
@keyframes growUp { from { transform:scaleY(0); } to { transform:scaleY(1); } }

.fade-in { animation: fadeIn .4s ease-out both; }

/* Device Switcher */
.device-bar {
  width: 100%; padding: 10px 0; display: flex; justify-content: center; gap: 8px;
  background: #0f172a; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 200;
}
.device-btn {
  padding: 8px 20px; border-radius: 10px; border: none; display: flex; align-items: center;
  gap: 8px; font-size: 13px; font-weight: 700; transition: all .2s;
}
.device-btn.active { background: var(--accent); color: #fff; }
.device-btn:not(.active) { background: #1e293b; color: #94a3b8; }
.device-btn .size { font-size: 10px; opacity: .6; }

/* Frame */
.frame {
  margin: 20px auto; border-radius: 16px; border: 3px solid #334155;
  overflow: hidden; background: var(--bg); position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,.4); display: flex; transition: width .4s ease, border-radius .3s;
}
.frame.mobile { width: 390px; border-radius: 32px; }
.frame.tablet { width: 820px; border-radius: 20px; }
.frame.desktop { width: 1200px; }

/* Sidebar */
.sidebar {
  background: var(--sidebar); color: #e2e8f0; display: flex; flex-direction: column;
  flex-shrink: 0; transition: width .3s;
}
.sidebar.desktop { width: 220px; padding: 24px 14px; }
.sidebar.tablet { width: 68px; padding: 16px 8px; }
.sidebar .logo-wrap {
  display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
}
.sidebar.tablet .logo-wrap { justify-content: center; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #0ea5e9, #06b6d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 800; color: #fff;
}
.logo-text { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 700; color: #f1f5f9; }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-btn {
  display: flex; align-items: center; gap: 10px; padding: 11px 12px;
  border-radius: 11px; border: none; width: 100%; font-size: 14px; font-weight: 500;
  background: transparent; color: #94a3b8; transition: all .15s;
}
.sidebar.tablet .sidebar-btn { justify-content: center; padding: 11px 0; }
.sidebar-btn.active { background: rgba(14,165,233,.15); color: #38bdf8; font-weight: 700; }
.sidebar-btn .emoji { font-size: 18px; }
.sidebar-footer {
  border-top: 1px solid #1e293b; padding-top: 14px; display: flex; align-items: center; gap: 10px;
}
.sidebar.tablet .sidebar-footer { justify-content: center; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #0ea5e9, #06b6d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff;
}

/* Main content */
.main { flex: 1; overflow: auto; position: relative; }
.main-inner { margin: 0 auto; }
.main.mobile .main-inner { padding: 20px 16px 110px; }
.main.tablet .main-inner { padding: 24px 20px 30px; }
.main.desktop .main-inner { padding: 28px 36px 30px; max-width: 960px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.header-date { font-size: 11px; color: var(--t3); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
.header-title { font-family: 'Fraunces', serif; font-weight: 700; color: var(--t1); margin-top: 2px; }
.mobile .header-title { font-size: 22px; }
.tablet .header-title, .desktop .header-title { font-size: 26px; }

/* Cards */
.stat-grid { display: grid; gap: 12px; margin-bottom: 22px; }
.stat-grid.single { grid-template-columns: 1fr; }
.stat-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
.stat-card {
  background: #fff; border-radius: var(--r); box-shadow: 0 1px 4px rgba(0,0,0,.05);
  border-left: 4px solid var(--accent);
}
.stat-card .inner { padding: 18px 16px; }
.stat-card .label { font-size: 10px; color: var(--t3); font-weight: 700; letter-spacing: 1.5px; }
.stat-card .value { font-family: 'Fraunces', serif; font-weight: 700; color: var(--t1); margin-top: 6px; }
.mobile .stat-card .value { font-size: 24px; }
.tablet .stat-card .value, .desktop .stat-card .value { font-size: 28px; }
.stat-card .sub { font-size: 11px; font-weight: 600; margin-top: 4px; }

/* Two-col */
.two-col { display: grid; gap: 18px; }
.two-col.single { grid-template-columns: 1fr; }
.two-col.dual { grid-template-columns: 1fr 1fr; }

/* Section card */
.section-card {
  background: #fff; padding: 18px; border-radius: var(--r);
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.section-title { font-size: 14px; font-weight: 700; color: var(--t1); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* Credit rows */
.credit-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; margin-bottom: 8px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border);
}
.credit-row .left { display: flex; align-items: center; gap: 10px; }
.credit-row .emoji { font-size: 20px; }
.credit-row .name { font-size: 13px; font-weight: 600; color: var(--t1); }
.credit-row .detail { font-size: 11px; color: var(--t3); }
.credit-row .amount { font-size: 14px; font-weight: 700; color: var(--t1); }
.badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .5px;
  display: inline-block; margin-top: 2px;
}
.badge.paid { background: #10b98120; color: #10b981; }
.badge.pending { background: #f4724520; color: #f47245; }
.badge.upcoming { background: #818cf820; color: #818cf8; }

/* Form */
.form-input {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg3);
  font-size: 14px; color: var(--t1); margin-bottom: 10px;
}
.form-row { display: flex; gap: 10px; margin-bottom: 12px; }
.form-row .form-input { margin-bottom: 0; }
.btn-primary {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  color: #fff; font-size: 14px; font-weight: 700; transition: transform .1s;
}
.btn-primary:active { transform: scale(.97); }

/* Advisor */
.advisor {
  padding: 20px; border-radius: 18px;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  color: #fff; position: relative; overflow: hidden;
}
.advisor .glow {
  position: absolute; top: -40px; right: -40px; width: 120px; height: 120px;
  background: rgba(255,255,255,.08); border-radius: 50%; filter: blur(20px);
}
.advisor h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; position: relative; }
.advisor p { font-size: 13px; line-height: 1.7; opacity: .9; position: relative; }
.advisor .btn-advisor {
  margin-top: 14px; padding: 9px 18px; border-radius: 10px;
  background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3);
  color: #fff; font-size: 13px; font-weight: 600; position: relative;
}

/* Chart */
.chart-wrap { display: flex; align-items: flex-end; gap: 6px; }
.chart-bar { border-radius: 4px; transform-origin: bottom; }
.chart-label { font-size: 10px; color: var(--t3); font-weight: 600; }
.chart-legend { display: flex; gap: 10px; font-size: 10px; color: var(--t3); }
.chart-dot { width: 7px; height: 7px; border-radius: 2px; display: inline-block; }

/* Donut */
.donut-wrap { display: flex; align-items: center; justify-content: center; gap: 24px; }
.donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.donut-center .label { font-size: 10px; color: var(--t3); }
.donut-center .val { font-size: 14px; font-weight: 700; color: var(--t1); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
.legend-label { font-size: 11px; color: var(--t2); }
.legend-val { font-size: 11px; font-weight: 700; color: var(--t1); margin-left: auto; }

/* Tx rows */
.tx-grid { display: grid; gap: 8px; }
.tx-grid.single { grid-template-columns: 1fr; }
.tx-grid.dual { grid-template-columns: 1fr 1fr; }
.tx-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-radius: 12px; background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.04); border: 1px solid var(--border);
}
.tx-row .left { display: flex; align-items: center; gap: 10px; }
.tx-row .emoji { font-size: 18px; }
.tx-row .desc { font-size: 13px; font-weight: 600; color: var(--t1); }
.tx-row .date { font-size: 10px; color: var(--t3); }
.tx-row .amt { font-size: 13px; font-weight: 700; }
.tx-row .amt.negative { color: var(--red); }
.tx-row .amt.positive { color: var(--green); }

/* Bottom nav */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; width: 100%;
  background: linear-gradient(to top, #f0f4f8 70%, transparent);
  padding: 10px 12px 16px; z-index: 50;
}
.bottom-nav-inner {
  display: flex; justify-content: space-around; align-items: center;
  background: #fff; border-radius: 18px; padding: 8px 4px;
  box-shadow: 0 -2px 16px rgba(0,0,0,.06); border: 1px solid var(--border);
}
.nav-btn {
  background: none; border: none; display: flex; flex-direction: column;
  align-items: center; gap: 2px; padding: 6px 10px; transition: color .2s;
}
.nav-btn .icon { font-size: 17px; }
.nav-btn .label { font-size: 9px; font-weight: 700; }
.nav-btn.active { color: var(--accent); }
.nav-btn:not(.active) { color: var(--t3); }

/* FAB */
.fab {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  border: 3px solid var(--bg); color: #fff; font-size: 22px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(14,165,233,.3);
}
.fab.mobile-fab { margin-top: -22px; }
.fab.corner-fab {
  position: absolute; bottom: 22px; right: 22px; z-index: 50;
  width: 52px; height: 52px; border-radius: 14px; border: none;
}

/* Modal overlay */
.modal-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; display: flex; justify-content: center;
}
.modal-overlay.mobile { align-items: flex-end; }
.modal-overlay:not(.mobile) { align-items: center; }
.modal-box { background: #fff; padding: 26px 22px 34px; box-shadow: 0 -4px 40px rgba(0,0,0,.12); }
.modal-box.mobile { width: 100%; border-radius: 22px 22px 0 0; animation: slideUp .3s ease-out; }
.modal-box:not(.mobile) { width: 400px; border-radius: 22px; animation: popIn .25s ease-out; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--t1); }
.modal-close {
  width: 34px; height: 34px; border-radius: 10px; background: #f1f5f9;
  border: none; font-size: 16px; color: var(--t2);
}
.type-toggle { display: flex; background: #f1f5f9; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.type-btn {
  flex: 1; padding: 10px 0; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 700;
}
.type-btn.active-expense { background: #f43f5e15; color: #f43f5e; }
.type-btn.active-income { background: #10b98115; color: #10b981; }
.type-btn.inactive { background: transparent; color: #94a3b8; }
.cat-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.cat-btn {
  padding: 7px 12px; border-radius: 10px; font-size: 11px; font-weight: 600;
}

/* Toast */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 999;
  background: #0f172a; color: #38bdf8; padding: 12px 24px; border-radius: 14px;
  font-size: 13px; font-weight: 600; box-shadow: 0 8px 30px rgba(0,0,0,.3);
  border: 1px solid #1e293b; animation: fadeIn .3s ease-out;
}

/* Invest */
.invest-hero {
  padding: 24px; border-radius: 20px; text-align: center; margin-bottom: 22px;
  background: linear-gradient(135deg, #10b98115, #0ea5e910);
  border: 1px solid #10b98128;
}
.invest-hero .label { font-size: 11px; color: var(--t3); letter-spacing: 1.5px; font-weight: 700; }
.invest-hero .val { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700; color: #10b981; margin-top: 6px; }
.invest-hero .sub { font-size: 13px; color: #10b981; margin-top: 4px; }
.insight-box {
  margin-top: 14px; padding: 12px; border-radius: 10px;
  background: #10b98110; border: 1px solid #10b98120;
}
.insight-box p { font-size: 12px; color: #10b981; font-weight: 600; }
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 8px; background: var(--bg3);
  border: 1px solid var(--border); font-size: 11px; color: var(--t2); font-weight: 600;
}

/* hidden util */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══ DEVICE SWITCHER ═══ -->
<div class="device-bar">
  <button class="device-btn active" data-device="mobile" onclick="setDevice('mobile')">
    <span>📱</span> Mobile <span class="size">(390px)</span>
  </button>
  <button class="device-btn" data-device="tablet" onclick="setDevice('tablet')">
    <span>📟</span> Tablet <span class="size">(820px)</span>
  </button>
  <button class="device-btn" data-device="desktop" onclick="setDevice('desktop')">
    <span>🖥️</span> Desktop <span class="size">(1200px)</span>
  </button>
</div>

<!-- ═══ FRAME ═══ -->
<div class="frame mobile" id="frame">

  <!-- ═══ SIDEBAR ═══ -->
  <nav class="sidebar hidden" id="sidebar">
    <div class="logo-wrap">
      <div class="logo-icon">S</div>
      <span class="logo-text" id="logo-text">SimpleFinance</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer" id="sidebar-footer">
      <div class="avatar">P</div>
      <div id="sidebar-user">
        <p style="font-size:13px;font-weight:700;color:#e2e8f0">Piero</p>
        <p style="font-size:11px;color:#64748b">Premium</p>
      </div>
    </div>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <div class="main mobile" id="main">
    <div id="toast" class="toast hidden"></div>
    <div class="main-inner" id="main-inner">
      <!-- Header -->
      <header class="header">
        <div>
          <p class="header-date" id="header-date"></p>
          <h1 class="header-title" id="header-title">Mi Resumen</h1>
        </div>
        <div class="avatar" id="header-avatar">P</div>
      </header>

      <!-- Views rendered here -->
      <div id="view-container"></div>
    </div>

    <!-- Bottom Nav (mobile) -->
    <nav class="bottom-nav" id="bottom-nav">
      <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
    </nav>

    <!-- FAB (tablet/desktop) -->
    <button class="fab corner-fab hidden" id="corner-fab" onclick="openModal()">+</button>
  </div>

  <!-- ═══ MODAL ═══ -->
  <div class="modal-overlay mobile hidden" id="modal-overlay" onclick="closeModal()">
    <div class="modal-box mobile" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">Nueva Transacción</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="type-toggle">
        <button class="type-btn active-expense" id="btn-expense" onclick="setFormType('expense')">Gasto</button>
        <button class="type-btn inactive" id="btn-income" onclick="setFormType('income')">Ingreso</button>
      </div>
      <input class="form-input" id="modal-desc" placeholder="Descripción">
      <input class="form-input" id="modal-amt" type="number" placeholder="Monto $">
      <div class="cat-grid" id="modal-cats"></div>
      <button class="btn-primary" onclick="submitModal()">Guardar Transacción</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
const CATS = [
  {id:"daily",label:"Gasto Diario",icon:"🛒",c:"#0ea5e9"},
  {id:"food",label:"Alimentación",icon:"🍽️",c:"#f43f5e"},
  {id:"transport",label:"Transporte",icon:"🚌",c:"#a855f7"},
  {id:"entertainment",label:"Ocio",icon:"🎬",c:"#ec4899"},
  {id:"services",label:"Servicios",icon:"📡",c:"#06b6d4"},
  {id:"investment",label:"Inversión",icon:"📈",c:"#10b981"},
  {id:"emergency",label:"Emergencia",icon:"🚨",c:"#f59e0b"},
];
const CREDITS = [
  {name:"Crédito Hipotecario",detail:"Cuota 45/120 · Vence 15 Mayo",amount:540000,icon:"🏠",st:"pending"},
  {name:"Plan Internet + Móvil",detail:"Cargo automático",amount:35900,icon:"📶",st:"paid"},
  {name:"Seguro Automotriz",detail:"Semestral · Vence 20 Jun",amount:189000,icon:"🚗",st:"upcoming"},
  {name:"Tarjeta de Crédito",detail:"Min. $85.000 · Vence 10 Mayo",amount:342000,icon:"💳",st:"pending"},
];
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun"];
const MDATA = [
  {i:2800000,e:2100000},{i:2800000,e:2350000},{i:3100000,e:2200000},
  {i:2800000,e:2600000},{i:2900000,e:1900000},{i:3200000,e:2400000},
];
const PATRIMONY = [
  {label:"Caja y Ahorro",value:30,c:"#0ea5e9"},
  {label:"Renta Fija",value:25,c:"#a855f7"},
  {label:"Renta Variable",value:30,c:"#10b981"},
  {label:"Otros",value:15,c:"#94a3b8"},
];

let transactions = [
  {id:1,desc:"Supermercado Líder",amount:-67500,cat:"food",date:"2026-05-03"},
  {id:2,desc:"Sueldo Mayo",amount:2800000,cat:"daily",date:"2026-05-01"},
  {id:3,desc:"Netflix + Spotify",amount:-18900,cat:"entertainment",date:"2026-05-01"},
  {id:4,desc:"Bencina",amount:-42000,cat:"transport",date:"2026-04-30"},
  {id:5,desc:"Depósito APV",amount:-350000,cat:"investment",date:"2026-04-28"},
];

let currentDevice = "mobile";
let currentView = "dashboard";
let formType = "expense";
let formCat = "daily";

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const fmt = n => "$" + Math.abs(n).toLocaleString("es-CL");
const $ = id => document.getElementById(id);
const getCat = id => CATS.find(c => c.id === id) || CATS[0];
const isMobile = () => currentDevice === "mobile";
const isTablet = () => currentDevice === "tablet";
const isDesktop = () => currentDevice === "desktop";
const isDual = () => isDesktop() || isTablet();

function getBalance() {
  return 4250000 + transactions.reduce((s,t) => s + t.amount, 0) - 2800000;
}
function getTotalExp() {
  return transactions.filter(t => t.amount < 0).reduce((s,t) => s + t.amount, 0);
}
function getTotalInc() {
  return transactions.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
}

function showToast(msg) {
  const t = $("toast");
  t.textContent = "✓ " + msg;
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 2400);
}

// ═══════════════════════════════════════════
//  DEVICE SWITCHING
// ═══════════════════════════════════════════
function setDevice(d) {
  currentDevice = d;
  const frame = $("frame");
  frame.className = "frame " + d;

  // Device buttons
  document.querySelectorAll(".device-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.device === d);
  });

  // Sidebar
  const sb = $("sidebar");
  if (isMobile()) {
    sb.classList.add("hidden");
  } else {
    sb.classList.remove("hidden");
    sb.className = "sidebar " + d;
  }
  $("logo-text").classList.toggle("hidden", isTablet());
  $("sidebar-user").classList.toggle("hidden", isTablet());

  // Main
  const main = $("main");
  main.className = "main " + d;

  // Header avatar
  $("header-avatar").classList.toggle("hidden", !isMobile());

  // Bottom nav
  $("bottom-nav").classList.toggle("hidden", !isMobile());

  // Corner FAB
  $("corner-fab").classList.toggle("hidden", isMobile());

  // Modal class
  const mo = $("modal-overlay");
  mo.className = mo.className.replace(/mobile|tablet|desktop/g, "").trim();
  mo.classList.add(d);
  const mb = mo.querySelector(".modal-box");
  mb.className = "modal-box " + d;

  renderView();
}

function renderTxRow(tx, i, showCat = false) {
  const cat = getCat(tx.cat);
  const isNeg = tx.amount < 0;
  return `
    <div class="tx-row fade-in" style="animation-delay:${i*.04}s">
      <div class="left">
        <span class="emoji">${cat.icon}</span>
        <div>
          <p class="desc">${tx.desc}</p>
          <p class="date">${showCat ? cat.label + ' · ' : ''}${tx.date}</p>
        </div>
      </div>
      <p class="amt ${isNeg?'negative':'positive'}">${isNeg?'-':'+'} ${fmt(tx.amount)}</p>
    </div>`;
}

function buildBarChart(data, height, accent) {
  const mx = Math.max(...data.map(d => Math.max(d.i, d.e)));
  let html = `<div class="chart-wrap" style="height:${height}px">`;
  data.forEach((d, idx) => {
    const hI = (d.i / mx) * 100;
    const hE = (d.e / mx) * 100;
    html += `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="display:flex;gap:3px;align-items:flex-end;height:${height-20}px">
          <div class="chart-bar" style="width:14px;border-radius:4px;background:linear-gradient(to top,${accent},${accent}aa);height:${hI}%;animation:growUp .5s ${idx*.07}s ease-out both"></div>
          <div class="chart-bar" style="width:14px;border-radius:4px;background:rgba(203,213,225,.18);height:${hE}%;animation:growUp .5s ${idx*.07+.04}s ease-out both"></div>
        </div>
        <span class="chart-label">${MONTHS[idx]}</span>
      </div>`;
  });
  html += `</div>`;
  return html;
}

function buildDonut(segments, size) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  const r = size * 0.385, c = 2 * Math.PI * r;
  const cx = size / 2, cy = size / 2;
  let cum = 0;
  let circles = "";
  segments.forEach((seg, i) => {
    const pct = seg.value / total;
    circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.c}" stroke-width="${size*0.108}"
      stroke-dasharray="${c*pct} ${c*(1-pct)}"
      stroke-dashoffset="${-c*cum/total}"
      style="animation:fadeIn .5s ${i*.12}s ease-out both"/>`;
    cum += seg.value;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">${circles}</svg>`;
}

function openModal() {
  const mo = $("modal-overlay");
  mo.classList.remove("hidden");
  buildModalCats();
}
function closeModal() {
  $("modal-overlay").classList.add("hidden");
}

function setFormType(t) {
  formType = t;
  $("btn-expense").className = "type-btn " + (t === "expense" ? "active-expense" : "inactive");
  $("btn-income").className = "type-btn " + (t === "income" ? "active-income" : "inactive");
}

function buildModalCats() {
  $("modal-cats").innerHTML = CATS.map(cat => `
    <button class="cat-btn" id="mcat-${cat.id}"
      style="border:1.5px solid ${formCat===cat.id?cat.c:'#e2e8f0'};background:${formCat===cat.id?cat.c+'12':'transparent'};color:${formCat===cat.id?cat.c:'#94a3b8'}"
      onclick="selectCat('${cat.id}')">
      ${cat.icon} ${cat.label}
    </button>
  `).join("");
}

function selectCat(id) {
  formCat = id;
  buildModalCats();
}

function submitModal() {
  const desc = $("modal-desc").value.trim();
  const amt = parseInt($("modal-amt").value);
  if (!desc || isNaN(amt) || amt <= 0) return;

  const tx = {
    id: Date.now(),
    desc,
    amount: formType === "expense" ? -amt : amt,
    cat: formCat,
    date: new Date().toISOString().slice(0, 10),
  };
  transactions.unshift(tx);

  // Firebase sync (descomentar cuando tengas credenciales)
  // saveToFirebase(tx);

  $("modal-desc").value = "";
  $("modal-amt").value = "";
  closeModal();
  showToast(formType === "expense" ? `Gasto: ${desc}` : `Ingreso: ${desc}`);
  renderView();
}

function quickSubmit() {
  const desc = $("quick-desc")?.value?.trim();
  const amt = parseInt($("quick-amt")?.value);
  const cat = $("quick-cat")?.value || "daily";
  if (!desc || isNaN(amt) || amt <= 0) return;

  const tx = {
    id: Date.now(),
    desc,
    amount: -amt,
    cat,
    date: new Date().toISOString().slice(0, 10),
  };
  transactions.unshift(tx);

  // Firebase sync
  // saveToFirebase(tx);

  showToast(`Gasto: ${desc}`);
  renderView();
}
