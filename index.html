<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>SimpleFinance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--accent2:#0284c7;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}input:focus,select:focus{outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes growUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}

.fade-in{animation:fadeIn .4s ease-out both}
.hidden{display:none!important}

.device-bar{width:100%;padding:10px 0;display:flex;justify-content:center;gap:8px;background:#0f172a;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:200}
.device-btn{padding:8px 20px;border-radius:10px;border:none;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;transition:all .2s}
.device-btn.active{background:var(--accent);color:#fff}.device-btn:not(.active){background:#1e293b;color:#94a3b8}
.device-btn .size{font-size:10px;opacity:.6}

.frame{margin:20px auto;border-radius:16px;border:3px solid #334155;overflow:hidden;background:var(--bg);position:relative;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;transition:width .4s ease,border-radius .3s}
.frame.mobile{width:390px;border-radius:32px}.frame.tablet{width:820px;border-radius:20px}.frame.desktop{width:1200px}

.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
.sidebar.desktop{width:220px;padding:24px 14px}.sidebar.tablet{width:68px;padding:16px 8px}
.sidebar .logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.sidebar.tablet .logo-wrap{justify-content:center}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;transition:all .15s}
.sidebar.tablet .sidebar-btn{justify-content:center;padding:11px 0}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px;display:flex;align-items:center;gap:10px}
.sidebar.tablet .sidebar-footer{justify-content:center}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}

.main{flex:1;overflow:auto;position:relative}
.main-inner{margin:0 auto}
.main.mobile .main-inner{padding:20px 16px 110px}
.main.tablet .main-inner{padding:24px 20px 30px}
.main.desktop .main-inner{padding:28px 36px 30px;max-width:960px}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-weight:700;color:var(--t1);margin-top:2px}
.mobile .header-title{font-size:22px}.tablet .header-title,.desktop .header-title{font-size:26px}

.stat-grid{display:grid;gap:12px;margin-bottom:22px}
.stat-grid.single{grid-template-columns:1fr}.stat-grid.triple{grid-template-columns:1fr 1fr 1fr}
.stat-card{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}
.stat-card .inner{padding:18px 16px}
.stat-card .label{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}
.stat-card .value{font-family:'Fraunces',serif;font-weight:700;color:var(--t1);margin-top:6px}
.mobile .stat-card .value{font-size:24px}.tablet .stat-card .value,.desktop .stat-card .value{font-size:28px}
.stat-card .sub{font-size:11px;font-weight:600;margin-top:4px}

.two-col{display:grid;gap:18px}.two-col.single{grid-template-columns:1fr}.two-col.dual{grid-template-columns:1fr 1fr}
.section-card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}

.credit-row{display:flex;justify-content:space-between;align-items:center;padding:12px;margin-bottom:8px;border-radius:12px;background:var(--bg3);border:1px solid var(--border)}
.credit-row .left{display:flex;align-items:center;gap:10px}
.credit-row .emoji{font-size:20px}.credit-row .name{font-size:13px;font-weight:600;color:var(--t1)}
.credit-row .detail{font-size:11px;color:var(--t3)}.credit-row .amount{font-size:14px;font-weight:700;color:var(--t1)}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;display:inline-block;margin-top:2px}
.badge.paid{background:#10b98120;color:#10b981}.badge.pending{background:#f4724520;color:#f47245}.badge.upcoming{background:#818cf820;color:#818cf8}

.form-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:10px}
.form-row{display:flex;gap:10px;margin-bottom:12px}.form-row .form-input{margin-bottom:0}
.btn-primary{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:14px;font-weight:700;transition:transform .1s}
.btn-primary:active{transform:scale(.97)}
.btn-danger{width:100%;padding:11px;border-radius:12px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:13px;font-weight:700;transition:all .15s;margin-top:10px}
.btn-danger:hover{background:var(--red);color:#fff}

.advisor{padding:20px;border-radius:18px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;position:relative;overflow:hidden}
.advisor .glow{position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%;filter:blur(20px)}
.advisor h3{font-size:15px;font-weight:700;margin-bottom:8px;position:relative}
.advisor p{font-size:13px;line-height:1.7;opacity:.9;position:relative}
.advisor .btn-advisor{margin-top:14px;padding:9px 18px;border-radius:10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:13px;font-weight:600;position:relative}

.chart-wrap{display:flex;align-items:flex-end;gap:6px}.chart-bar{border-radius:4px;transform-origin:bottom}
.chart-label{font-size:10px;color:var(--t3);font-weight:600}
.chart-legend{display:flex;gap:10px;font-size:10px;color:var(--t3)}
.chart-dot{width:7px;height:7px;border-radius:2px;display:inline-block}

.donut-wrap{display:flex;align-items:center;justify-content:center;gap:24px}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .label{font-size:10px;color:var(--t3)}.donut-center .val{font-size:14px;font-weight:700;color:var(--t1)}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.legend-label{font-size:11px;color:var(--t2)}.legend-val{font-size:11px;font-weight:700;color:var(--t1);margin-left:auto}

.tx-grid{display:grid;gap:8px}.tx-grid.single{grid-template-columns:1fr}.tx-grid.dual{grid-template-columns:1fr 1fr}
.tx-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border);position:relative}
.tx-row .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tx-row .emoji{font-size:18px;flex-shrink:0}
.tx-row .desc{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-row .date{font-size:10px;color:var(--t3)}
.tx-row .right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tx-row .amt{font-size:13px;font-weight:700}.tx-row .amt.negative{color:var(--red)}.tx-row .amt.positive{color:var(--green)}
.tx-delete{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tx-delete:hover{background:#f43f5e15;color:var(--red)}

.bottom-nav{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top,#f0f4f8 70%,transparent);padding:10px 12px 16px;z-index:50}
.bottom-nav-inner{display:flex;justify-content:space-around;align-items:center;background:#fff;border-radius:18px;padding:8px 4px;box-shadow:0 -2px 16px rgba(0,0,0,.06);border:1px solid var(--border)}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;transition:color .2s}
.nav-btn .icon{font-size:17px}.nav-btn .label{font-size:9px;font-weight:700}
.nav-btn.active{color:var(--accent)}.nav-btn:not(.active){color:var(--t3)}

.fab{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:3px solid var(--bg);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(14,165,233,.3)}
.fab.mobile-fab{margin-top:-22px}
.fab.corner-fab{position:absolute;bottom:22px;right:22px;z-index:50;width:52px;height:52px;border-radius:14px;border:none}

.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;justify-content:center}
.modal-overlay.mobile{align-items:flex-end}.modal-overlay:not(.mobile){align-items:center}
.modal-box{background:#fff;padding:26px 22px 34px;box-shadow:0 -4px 40px rgba(0,0,0,.12)}
.modal-box.mobile{width:100%;border-radius:22px 22px 0 0;animation:slideUp .3s ease-out}
.modal-box:not(.mobile){width:400px;border-radius:22px;animation:popIn .25s ease-out}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--t1)}
.modal-close{width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;font-size:16px;color:var(--t2)}
.type-toggle{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:16px}
.type-btn{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:700}
.type-btn.active-expense{background:#f43f5e15;color:#f43f5e}.type-btn.active-income{background:#10b98115;color:#10b981}
.type-btn.inactive{background:transparent;color:#94a3b8}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cat-btn{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:600}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:999;background:#0f172a;color:#38bdf8;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid #1e293b;animation:fadeIn .3s ease-out}

.invest-hero{padding:24px;border-radius:20px;text-align:center;margin-bottom:22px;background:linear-gradient(135deg,#10b98115,#0ea5e910);border:1px solid #10b98128}
.invest-hero .label{font-size:11px;color:var(--t3);letter-spacing:1.5px;font-weight:700}
.invest-hero .val{font-family:'Fraunces',serif;font-size:36px;font-weight:700;color:#10b981;margin-top:6px}
.invest-hero .sub{font-size:13px;color:#10b981;margin-top:4px}
.insight-box{margin-top:14px;padding:12px;border-radius:10px;background:#10b98110;border:1px solid #10b98120}
.insight-box p{font-size:12px;color:#10b981;font-weight:600}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:11px;color:var(--t2);font-weight:600}

/* Comparator */
.comp-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:20px;gap:2px}
.comp-tab{flex:1;padding:10px 8px;border-radius:10px;border:none;font-size:12px;font-weight:700;background:transparent;color:var(--t3);transition:all .2s;text-align:center}
.comp-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.comp-form-group{margin-bottom:14px}
.comp-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block}
.comp-input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1)}
.comp-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.comp-row{display:flex;gap:10px}.comp-row .comp-form-group{flex:1}
.comp-btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;color:#fff;transition:transform .1s;margin-top:6px}
.comp-btn:active{transform:scale(.97)}
.comp-btn.primary{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
.comp-btn.reset{background:transparent;border:1.5px solid var(--border);color:var(--t3);font-size:13px;padding:10px;margin-top:8px}
.comp-result{margin-top:20px;animation:fadeIn .4s ease-out}
.comp-result-card{padding:20px;border-radius:18px;margin-bottom:14px;border:1.5px solid var(--border);background:#fff}
.comp-result-card.winner{border-color:var(--green);background:linear-gradient(135deg,#10b98108,#0ea5e905)}
.comp-result-card.loser{border-color:var(--border);opacity:.75}
.comp-result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.comp-result-title{font-size:15px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.comp-winner-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#10b98118;color:#10b981;letter-spacing:.5px}
.comp-metric{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9}
.comp-metric:last-child{border-bottom:none}
.comp-metric-label{font-size:12px;color:var(--t3);font-weight:500}
.comp-metric-value{font-size:14px;font-weight:700;color:var(--t1)}
.comp-verdict{padding:18px;border-radius:16px;background:linear-gradient(135deg,#0ea5e908,#10b98108);border:1px solid #0ea5e920;margin-top:16px}
.comp-verdict h4{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.comp-verdict p{font-size:13px;color:var(--t2);line-height:1.6}
.comp-bar-container{height:8px;border-radius:4px;background:#f1f5f9;margin-top:6px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:4px;transition:width .6s ease-out}

.sync-indicator{position:absolute;top:8px;right:12px;z-index:60;display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08);border:1px solid var(--border)}
.sync-dot{width:8px;height:8px;border-radius:50%}.sync-dot.online{background:#10b981}.sync-dot.offline{background:#f43f5e}.sync-dot.syncing{background:#f59e0b}

.empty-state{text-align:center;padding:40px 20px}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state .title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:6px}
.empty-state .sub{font-size:13px;color:var(--t3);line-height:1.6}

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;text-align:center}
.confirm-box h3{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none}
.confirm-cancel{background:#f1f5f9;color:var(--t2)}.confirm-delete{background:var(--red);color:#fff}

@media(max-width:500px){
  .device-bar{display:none}
  .frame{width:100%!important;margin:0!important;border:none!important;border-radius:0!important;min-height:100vh}
  .frame .sidebar{display:none!important}.main{width:100%}
}
</style>
</head>
<body>

<div class="device-bar">
  <button class="device-btn active" data-device="mobile" onclick="setDevice('mobile')"><span>📱</span> Mobile <span class="size">(390px)</span></button>
  <button class="device-btn" data-device="tablet" onclick="setDevice('tablet')"><span>📟</span> Tablet <span class="size">(820px)</span></button>
  <button class="device-btn" data-device="desktop" onclick="setDevice('desktop')"><span>🖥️</span> Desktop <span class="size">(1200px)</span></button>
</div>

<div class="frame mobile" id="frame">
  <nav class="sidebar hidden" id="sidebar">
    <div class="logo-wrap"><div class="logo-icon">S</div><span class="logo-text" id="logo-text">SimpleFinance</span></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer" id="sidebar-footer">
      <div class="avatar">P</div>
      <div id="sidebar-user"><p style="font-size:13px;font-weight:700;color:#e2e8f0">Piero</p><p style="font-size:11px;color:#64748b">Premium</p></div>
    </div>
  </nav>

  <div class="main mobile" id="main">
    <div class="sync-indicator" id="sync-indicator"><span class="sync-dot online"></span><span id="sync-text">Conectando...</span></div>
    <div id="toast" class="toast hidden"></div>
    <div class="main-inner" id="main-inner">
      <header class="header">
        <div><p class="header-date" id="header-date"></p><h1 class="header-title" id="header-title">Mi Resumen</h1></div>
        <div class="avatar" id="header-avatar">P</div>
      </header>
      <div id="view-container"></div>
    </div>
    <nav class="bottom-nav" id="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav-inner"></div></nav>
    <button class="fab corner-fab hidden" id="corner-fab" onclick="openModal()">+</button>
  </div>

  <div class="modal-overlay mobile hidden" id="modal-overlay" onclick="closeModal()">
    <div class="modal-box mobile" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">Nueva Transaccion</h3>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="type-toggle">
        <button class="type-btn active-expense" id="btn-expense" onclick="setFormType('expense')">Gasto</button>
        <button class="type-btn inactive" id="btn-income" onclick="setFormType('income')">Ingreso</button>
      </div>
      <input class="form-input" id="modal-desc" placeholder="Descripcion">
      <input class="form-input" id="modal-amt" type="number" placeholder="Monto $">
      <div class="cat-grid" id="modal-cats"></div>
      <button class="btn-primary" onclick="submitModal()">Guardar Transaccion</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">Confirmar</h3>
    <p id="confirm-msg">Esta accion no se puede deshacer.</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="confirm-delete" id="confirm-action" onclick="executeConfirm()">Eliminar</button>
    </div>
  </div>
</div>

async function loadFromFirebase(){
  setSyncStatus("syncing","Sincronizando...");
  try{
    const snap=await db.collection("transactions").orderBy("date","desc").get();
    transactions=snap.docs.map(d=>{const data=d.data();return{id:data.id||d.id,desc:data.desc,amount:data.amount,cat:data.cat,date:data.date}});
    setSyncStatus("online","Conectado");
    renderView();
  }catch(e){
    console.error("Firebase load error:",e);
    setSyncStatus("offline","Sin conexion");
    renderView();
  }
}

async function saveToFirebase(tx){
  setSyncStatus("syncing","Guardando...");
  try{
    await db.collection("transactions").doc(String(tx.id)).set({...tx,_createdAt:firebase.firestore.FieldValue.serverTimestamp(),_updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setSyncStatus("online","Guardado");
    setTimeout(()=>setSyncStatus("online","Conectado"),1500);
  }catch(e){console.error("Save error:",e);setSyncStatus("offline","Error")}
}

async function deleteFromFirebase(id){
  setSyncStatus("syncing","Eliminando...");
  try{
    await db.collection("transactions").doc(String(id)).delete();
    setSyncStatus("online","Eliminado");
    setTimeout(()=>setSyncStatus("online","Conectado"),1500);
  }catch(e){console.error("Delete error:",e);setSyncStatus("offline","Error")}
}

async function resetAllFirebase(){
  setSyncStatus("syncing","Reseteando...");
  try{
    const snap=await db.collection("transactions").get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    transactions=[];
    setSyncStatus("online","Reseteado");
    setTimeout(()=>setSyncStatus("online","Conectado"),1500);
    showToast("Todos los datos han sido eliminados");
    renderView();
  }catch(e){console.error("Reset error:",e);setSyncStatus("offline","Error al resetear")}
}

function listenTransactions(){
  db.collection("transactions").orderBy("date","desc").onSnapshot(snap=>{
    transactions=snap.docs.map(d=>{const data=d.data();return{id:data.id||d.id,desc:data.desc,amount:data.amount,cat:data.cat,date:data.date}});

function buildBarChart(data,height,accent){
  const mx=Math.max(...data.map(d=>Math.max(d.i,d.e)));
  let h=`<div class="chart-wrap" style="height:${height}px">`;
  data.forEach((d,idx)=>{h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="display:flex;gap:3px;align-items:flex-end;height:${height-20}px"><div class="chart-bar" style="width:14px;background:linear-gradient(to top,${accent},${accent}aa);height:${(d.i/mx)*100}%;animation:growUp .5s ${idx*.07}s ease-out both"></div><div class="chart-bar" style="width:14px;background:rgba(203,213,225,.18);height:${(d.e/mx)*100}%;animation:growUp .5s ${idx*.07+.04}s ease-out both"></div></div><span class="chart-label">${MONTHS[idx]}</span></div>`});
  return h+`</div>`;
}

function buildDonut(segments,size){
  const total=segments.reduce((s,x)=>s+x.value,0);const r=size*.385,c=2*Math.PI*r;let cum=0,circles="";
  segments.forEach((seg,i)=>{const pct=seg.value/total;circles+=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${seg.c}" stroke-width="${size*.108}" stroke-dasharray="${c*pct} ${c*(1-pct)}" stroke-dashoffset="${-c*cum/total}" style="animation:fadeIn .5s ${i*.12}s ease-out both"/>`;cum+=seg.value});
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">${circles}</svg>`;
}

// ============================================
// COMPARATOR
// ============================================
let compMode="credit_vs_cash"; // credit_vs_cash | compare_credits | evaluate_invest
let compResult=null;

function setCompMode(m){compMode=m;compResult=null;renderView()}

function calcMonthlyPayment(principal,annualRate,months){
  if(annualRate===0)return principal/months;
  const r=annualRate/100/12;
  return principal*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1);
}

function runComparison(){
  if(compMode==="credit_vs_cash"){
    const price=parseFloat($("comp-price")?.value)||0;
    const rate=parseFloat($("comp-rate")?.value)||0;
    const months=parseInt($("comp-months")?.value)||0;
    const investRate=parseFloat($("comp-invest-rate")?.value)||0;
    if(price<=0||months<=0){showToast("Completa los campos");return}

    const monthly=calcMonthlyPayment(price,rate,months);
    const totalCredit=monthly*months;
    const interestPaid=totalCredit-price;

    // Opportunity cost: if you pay cash, you lose potential investment returns
    const monthlyInvRate=investRate/100/12;
    let investGrowth=0;
    if(monthlyInvRate>0){
      // FV of lump sum invested for N months
      investGrowth=price*Math.pow(1+monthlyInvRate,months)-price;
    }

    // If credit: you keep the money and invest it, paying monthly
    let investWithCredit=0;
    if(monthlyInvRate>0){
      // FV of lump sum minus monthly payments withdrawn
      let balance=price;
      for(let i=0;i<months;i++){
        balance=balance*(1+monthlyInvRate)-monthly;
        if(balance<0){balance=0;break}
      }
      investWithCredit=balance;
    }

    const cashTotalCost=price+investGrowth; // real cost = price + lost returns
    const creditTotalCost=totalCredit-investWithCredit;
    const winner=creditTotalCost<cashTotalCost?"credit":"cash";

    compResult={
      type:"credit_vs_cash",
      price,rate,months,monthly,totalCredit,interestPaid,
      investGrowth,investWithCredit,cashTotalCost,creditTotalCost,winner
    };
    renderView();
  }
  else if(compMode==="compare_credits"){
    const price=parseFloat($("comp-cc-price")?.value)||0;
    const rateA=parseFloat($("comp-cc-rateA")?.value)||0;
    const monthsA=parseInt($("comp-cc-monthsA")?.value)||0;
    const rateB=parseFloat($("comp-cc-rateB")?.value)||0;
    const monthsB=parseInt($("comp-cc-monthsB")?.value)||0;
    if(price<=0||monthsA<=0||monthsB<=0){showToast("Completa los campos");return}

    const monthlyA=calcMonthlyPayment(price,rateA,monthsA);
    const totalA=monthlyA*monthsA;const intA=totalA-price;
    const monthlyB=calcMonthlyPayment(price,rateB,monthsB);
    const totalB=monthlyB*monthsB;const intB=totalB-price;
    const winner=totalA<=totalB?"A":"B";

    compResult={
      type:"compare_credits",price,
      a:{rate:rateA,months:monthsA,monthly:monthlyA,total:totalA,interest:intA},
      b:{rate:rateB,months:monthsB,monthly:monthlyB,total:totalB,interest:intB},
      winner,savings:Math.abs(totalA-totalB)
    };
    renderView();
  }
  else if(compMode==="evaluate_invest"){
    const capital=parseFloat($("comp-ei-capital")?.value)||0;
    const rateA=parseFloat($("comp-ei-rateA")?.value)||0;
    const rateB=parseFloat($("comp-ei-rateB")?.value)||0;
    const years=parseInt($("comp-ei-years")?.value)||0;
    if(capital<=0||years<=0){showToast("Completa los campos");return}

    const months=years*12;
    const fvA=capital*Math.pow(1+rateA/100/12,months);
    const fvB=capital*Math.pow(1+rateB/100/12,months);
    const retA=fvA-capital;const retB=fvB-capital;
    const winner=fvA>=fvB?"A":"B";

    compResult={
      type:"evaluate_invest",capital,years,
      a:{rate:rateA,fv:fvA,ret:retA,retPct:(retA/capital*100)},
      b:{rate:rateB,fv:fvB,ret:retB,retPct:(retB/capital*100)},
      winner,diff:Math.abs(fvA-fvB)
    };
    renderView();
  }
}

function renderComparator(){
  const dual=isDual();
  let h=`<p style="font-size:13px;color:var(--t3);margin-bottom:16px;line-height:1.6">Compara opciones financieras para tomar la mejor decision con datos reales.</p>`;

  // Tabs
  h+=`<div class="comp-tabs">
    <button class="comp-tab ${compMode==='credit_vs_cash'?'active':''}" onclick="setCompMode('credit_vs_cash')">\uD83D\uDCB3 Credito vs Contado</button>
    <button class="comp-tab ${compMode==='compare_credits'?'active':''}" onclick="setCompMode('compare_credits')">\u2696\uFE0F Comparar Creditos</button>
    <button class="comp-tab ${compMode==='evaluate_invest'?'active':''}" onclick="setCompMode('evaluate_invest')">\uD83D\uDCC8 Comparar Inversiones</button>
  </div>`;

  h+=`<div class="two-col ${dual?'dual':'single'}">`;

  // Form column
  h+=`<div class="section-card">`;

  if(compMode==="credit_vs_cash"){
    h+=`<h3 class="section-title"><span>\uD83D\uDCB3</span> Credito vs Pago al Contado</h3>`;
    h+=`<div class="comp-form-group"><label class="comp-label">Precio del bien / servicio ($)</label><input class="comp-input" id="comp-price" type="number" placeholder="Ej: 5.000.000" value="${compResult?.price||''}"></div>`;
    h+=`<div class="comp-row"><div class="comp-form-group"><label class="comp-label">Tasa anual credito (%)</label><input class="comp-input" id="comp-rate" type="number" step="0.1" placeholder="Ej: 12" value="${compResult?.rate||''}"></div>`;
    h+=`<div class="comp-form-group"><label class="comp-label">Plazo (meses)</label><input class="comp-input" id="comp-months" type="number" placeholder="Ej: 36" value="${compResult?.months||''}"></div></div>`;
    h+=`<div class="comp-form-group"><label class="comp-label">Si inviertes el dinero, tasa anual (%)</label><input class="comp-input" id="comp-invest-rate" type="number" step="0.1" placeholder="Ej: 8 (dejar 0 si no aplica)" value="${compResult?.investRate||'0'}"></div>`;
  }
  else if(compMode==="compare_credits"){
    h+=`<h3 class="section-title"><span>\u2696\uFE0F</span> Comparar dos Creditos</h3>`;
    h+=`<div class="comp-form-group"><label class="comp-label">Monto del credito ($)</label><input class="comp-input" id="comp-cc-price" type="number" placeholder="Ej: 10.000.000" value="${compResult?.price||''}"></div>`;
    h+=`<div style="padding:10px 14px;background:#0ea5e908;border-radius:12px;border:1px solid #0ea5e920;margin-bottom:14px"><p style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px">\uD83C\uDFE6 Credito A</p>`;
    h+=`<div class="comp-row"><div class="comp-form-group" style="margin-bottom:0"><label class="comp-label">Tasa anual (%)</label><input class="comp-input" id="comp-cc-rateA" type="number" step="0.1" placeholder="Ej: 10" value="${compResult?.a?.rate||''}"></div>`;
    h+=`<div class="comp-form-group" style="margin-bottom:0"><label class="comp-label">Plazo (meses)</label><input class="comp-input" id="comp-cc-monthsA" type="number" placeholder="Ej: 24" value="${compResult?.a?.months||''}"></div></div></div>`;
    h+=`<div style="padding:10px 14px;background:#a855f708;border-radius:12px;border:1px solid #a855f720;margin-bottom:14px"><p style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px">\uD83C\uDFE6 Credito B</p>`;
    h+=`<div class="comp-row"><div class="comp-form-group" style="margin-bottom:0"><label class="comp-label">Tasa anual (%)</label><input class="comp-input" id="comp-cc-rateB" type="number" step="0.1" placeholder="Ej: 15" value="${compResult?.b?.rate||''}"></div>`;
    h+=`<div class="comp-form-group" style="margin-bottom:0"><label class="comp-label">Plazo (meses)</label><input class="comp-input" id="comp-cc-monthsB" type="number" placeholder="Ej: 36" value="${compResult?.b?.months||''}"></div></div></div>`;
  }
  else if(compMode==="evaluate_invest"){
    h+=`<h3 class="section-title"><span>\uD83D\uDCC8</span> Comparar Inversiones</h3>`;
    h+=`<div class="comp-form-group"><label class="comp-label">Capital a invertir ($)</label><input class="comp-input" id="comp-ei-capital" type="number" placeholder="Ej: 3.000.000" value="${compResult?.capital||''}"></div>`;
    h+=`<div class="comp-form-group"><label class="comp-label">Horizonte (anhos)</label><input class="comp-input" id="comp-ei-years" type="number" placeholder="Ej: 5" value="${compResult?.years||''}"></div>`;
    h+=`<div style="padding:10px 14px;background:#10b98108;border-radius:12px;border:1px solid #10b98120;margin-bottom:14px"><p style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px">\uD83D\uDFE2 Inversion A</p>`;
    h+=`<div class="comp-form-group" style="margin-bottom:0"><label class="comp-label">Rentabilidad anual (%)</label><input class="comp-input" id="comp-ei-rateA" type="number" step="0.1" placeholder="Ej: 6" value="${compResult?.a?.rate||''}"></div></div>`;
    h+=`<div style="padding:10px 14px;background:#f59e0b08;border-radius:12px;border:1px solid #f59e0b20;margin-bottom:14px"><p style="font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:8px">\uD83D\uDFE1 Inversion B</p>`;
    h+=`<div class="comp-form-group" style="margin-bottom:0"><label class="comp-label">Rentabilidad anual (%)</label><input class="comp-input" id="comp-ei-rateB" type="number" step="0.1" placeholder="Ej: 12" value="${compResult?.b?.rate||''}"></div></div>`;
  }

  h+=`<button class="comp-btn primary" onclick="runComparison()">\u2696\uFE0F Comparar Ahora</button>`;
  if(compResult){h+=`<button class="comp-btn reset" onclick="compResult=null;renderView()">Limpiar resultados</button>`}
  h+=`</div>`;

  // Results column
  h+=`<div>`;
  if(!compResult){
    h+=`<div class="section-card" style="text-align:center;padding:40px 20px"><p style="font-size:40px;margin-bottom:12px">\u2696\uFE0F</p><p style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px">Ingresa los datos</p><p style="font-size:13px;color:var(--t3);line-height:1.6">Completa el formulario y presiona Comparar para ver el analisis detallado con la mejor opcion.</p></div>`;
  }
  else if(compResult.type==="credit_vs_cash"){
    const r=compResult;
    // Cash card
    h+=`<div class="comp-result-card ${r.winner==='cash'?'winner':'loser'} fade-in">`;
    h+=`<div class="comp-result-header"><span class="comp-result-title">\uD83D\uDCB5 Pago al Contado</span>${r.winner==='cash'?'<span class="comp-winner-badge">\u2713 MEJOR OPCION</span>':''}</div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Precio</span><span class="comp-metric-value">${fmt(r.price)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Rendimiento perdido</span><span class="comp-metric-value" style="color:var(--orange)">${fmt(r.investGrowth)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Costo real total</span><span class="comp-metric-value" style="color:var(--red)">${fmt(r.cashTotalCost)}</span></div>`;
    h+=`</div>`;

    // Credit card
    h+=`<div class="comp-result-card ${r.winner==='credit'?'winner':'loser'} fade-in" style="animation-delay:.1s">`;
    h+=`<div class="comp-result-header"><span class="comp-result-title">\uD83D\uDCB3 Credito</span>${r.winner==='credit'?'<span class="comp-winner-badge">\u2713 MEJOR OPCION</span>':''}</div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Cuota mensual</span><span class="comp-metric-value">${fmt(r.monthly)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Total a pagar</span><span class="comp-metric-value">${fmt(r.totalCredit)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Intereses pagados</span><span class="comp-metric-value" style="color:var(--orange)">${fmt(r.interestPaid)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Ganancia invirtiendo el capital</span><span class="comp-metric-value" style="color:var(--green)">${fmt(r.investWithCredit)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Costo real total</span><span class="comp-metric-value" style="color:var(--red)">${fmt(r.creditTotalCost)}</span></div>`;
    h+=`</div>`;

    // Verdict
    const saved=Math.abs(r.cashTotalCost-r.creditTotalCost);
    h+=`<div class="comp-verdict fade-in" style="animation-delay:.2s"><h4>\uD83D\uDCA1 Veredicto</h4>`;
    if(r.winner==="cash"){
      h+=`<p>Pagar al <strong>contado</strong> te ahorra <strong style="color:var(--green)">${fmt(saved)}</strong> en total. ${r.investGrowth>0?'Aunque pierdes rendimientos potenciales, el interes del credito supera lo que ganarias invirtiendo.':'Sin considerar inversiones, evitas pagar intereses.'}</p>`;
    }else{
      h+=`<p>Tomar el <strong>credito</strong> e invertir el capital te ahorra <strong style="color:var(--green)">${fmt(saved)}</strong>. Tus rendimientos de inversion superan los intereses del credito.</p>`;
    }
    h+=`</div>`;
  }
  else if(compResult.type==="compare_credits"){
    const r=compResult;const a=r.a;const b=r.b;
    const maxTotal=Math.max(a.total,b.total);

    h+=`<div class="comp-result-card ${r.winner==='A'?'winner':'loser'} fade-in">`;
    h+=`<div class="comp-result-header"><span class="comp-result-title">\uD83C\uDFE6 Credito A</span>${r.winner==='A'?'<span class="comp-winner-badge">\u2713 MEJOR OPCION</span>':''}</div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Tasa anual</span><span class="comp-metric-value">${a.rate}%</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Plazo</span><span class="comp-metric-value">${a.months} meses</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Cuota mensual</span><span class="comp-metric-value">${fmt(a.monthly)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Intereses totales</span><span class="comp-metric-value" style="color:var(--orange)">${fmt(a.interest)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Total a pagar</span><span class="comp-metric-value" style="font-size:16px">${fmt(a.total)}</span></div>`;
    h+=`<div class="comp-bar-container"><div class="comp-bar-fill" style="width:${(a.total/maxTotal*100)}%;background:${r.winner==='A'?'var(--green)':'var(--orange)'}"></div></div>`;
    h+=`</div>`;

    h+=`<div class="comp-result-card ${r.winner==='B'?'winner':'loser'} fade-in" style="animation-delay:.1s">`;
    h+=`<div class="comp-result-header"><span class="comp-result-title">\uD83C\uDFE6 Credito B</span>${r.winner==='B'?'<span class="comp-winner-badge">\u2713 MEJOR OPCION</span>':''}</div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Tasa anual</span><span class="comp-metric-value">${b.rate}%</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Plazo</span><span class="comp-metric-value">${b.months} meses</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Cuota mensual</span><span class="comp-metric-value">${fmt(b.monthly)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Intereses totales</span><span class="comp-metric-value" style="color:var(--orange)">${fmt(b.interest)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Total a pagar</span><span class="comp-metric-value" style="font-size:16px">${fmt(b.total)}</span></div>`;
    h+=`<div class="comp-bar-container"><div class="comp-bar-fill" style="width:${(b.total/maxTotal*100)}%;background:${r.winner==='B'?'var(--green)':'var(--orange)'}"></div></div>`;
    h+=`</div>`;

    h+=`<div class="comp-verdict fade-in" style="animation-delay:.2s"><h4>\uD83D\uDCA1 Veredicto</h4>`;
    h+=`<p>El <strong>Credito ${r.winner}</strong> es mejor opcion. Te ahorras <strong style="color:var(--green)">${fmt(r.savings)}</strong> en intereses y costo total.`;
    if(r.winner==='A'&&a.monthly>b.monthly){h+=` Ojo: la cuota mensual es mas alta ($${Math.round(a.monthly).toLocaleString('es-CL')} vs $${Math.round(b.monthly).toLocaleString('es-CL')}), pero pagas menos en total.`}
    if(r.winner==='B'&&b.monthly>a.monthly){h+=` Ojo: la cuota mensual es mas alta ($${Math.round(b.monthly).toLocaleString('es-CL')} vs $${Math.round(a.monthly).toLocaleString('es-CL')}), pero pagas menos en total.`}
    h+=`</p></div>`;
  }
  else if(compResult.type==="evaluate_invest"){
    const r=compResult;const a=r.a;const b=r.b;
    const maxFv=Math.max(a.fv,b.fv);

    h+=`<div class="comp-result-card ${r.winner==='A'?'winner':'loser'} fade-in">`;
    h+=`<div class="comp-result-header"><span class="comp-result-title">\uD83D\uDFE2 Inversion A</span>${r.winner==='A'?'<span class="comp-winner-badge">\u2713 MEJOR OPCION</span>':''}</div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Tasa anual</span><span class="comp-metric-value">${a.rate}%</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Valor final</span><span class="comp-metric-value" style="color:var(--green);font-size:16px">${fmt(a.fv)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Ganancia</span><span class="comp-metric-value" style="color:var(--green)">${fmt(a.ret)} (${a.retPct.toFixed(1)}%)</span></div>`;
    h+=`<div class="comp-bar-container"><div class="comp-bar-fill" style="width:${(a.fv/maxFv*100)}%;background:var(--green)"></div></div>`;
    h+=`</div>`;

    h+=`<div class="comp-result-card ${r.winner==='B'?'winner':'loser'} fade-in" style="animation-delay:.1s">`;
    h+=`<div class="comp-result-header"><span class="comp-result-title">\uD83D\uDFE1 Inversion B</span>${r.winner==='B'?'<span class="comp-winner-badge">\u2713 MEJOR OPCION</span>':''}</div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Tasa anual</span><span class="comp-metric-value">${b.rate}%</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Valor final</span><span class="comp-metric-value" style="color:var(--green);font-size:16px">${fmt(b.fv)}</span></div>`;
    h+=`<div class="comp-metric"><span class="comp-metric-label">Ganancia</span><span class="comp-metric-value" style="color:var(--green)">${fmt(b.ret)} (${b.retPct.toFixed(1)}%)</span></div>`;
    h+=`<div class="comp-bar-container"><div class="comp-bar-fill" style="width:${(b.fv/maxFv*100)}%;background:#f59e0b"></div></div>`;
    h+=`</div>`;

    h+=`<div class="comp-verdict fade-in" style="animation-delay:.2s"><h4>\uD83D\uDCA1 Veredicto</h4>`;
    h+=`<p>La <strong>Inversion ${r.winner}</strong> genera <strong style="color:var(--green)">${fmt(r.diff)}</strong> mas en ${r.years} anho${r.years!==1?'s':''}. `;
    const winRate=r.winner==='A'?a.rate:b.rate;const loseRate=r.winner==='A'?b.rate:a.rate;
    h+=`Con una diferencia de ${(winRate-loseRate).toFixed(1)} puntos porcentuales anuales, el interes compuesto amplifica la ventaja significativamente en el tiempo.</p></div>`;
  }

  h+=`</div></div>`;
  return h;
}

// ============================================
// MODAL
// ============================================
let quickType="expense";

function openModal(){$("modal-overlay").classList.remove("hidden");setFormType("expense");formCat="food";buildModalCats()}
function closeModal(){$("modal-overlay").classList.add("hidden")}

function setFormType(t){
  formType=t;
  formCat=t==="expense"?"food":"salary";
  $("btn-expense").className="type-btn "+(t==="expense"?"active-expense":"inactive");
  $("btn-income").className="type-btn "+(t==="income"?"active-income":"inactive");
  buildModalCats();
}

function buildModalCats(){
  const cats=formType==="expense"?EXPENSE_CATS:INCOME_CATS;
  $("modal-cats").innerHTML=cats.map(cat=>`<button class="cat-btn" style="border:1.5px solid ${formCat===cat.id?cat.c:'#e2e8f0'};background:${formCat===cat.id?cat.c+'12':'transparent'};color:${formCat===cat.id?cat.c:'#94a3b8'}" onclick="selectCat('${cat.id}')">${cat.icon} ${cat.label}</button>`).join("");
}

function selectCat(id){formCat=id;buildModalCats()}

function submitModal(){
  const desc=$("modal-desc").value.trim();const amt=parseInt($("modal-amt").value);
  if(!desc||isNaN(amt)||amt<=0)return;
  const tx={id:Date.now(),desc,amount:formType==="expense"?-amt:amt,cat:formCat,date:new Date().toISOString().slice(0,10)};
  transactions.unshift(tx);saveToFirebase(tx);
  $("modal-desc").value="";$("modal-amt").value="";closeModal();
  showToast(formType==="expense"?"Gasto: "+desc:"Ingreso: "+desc);renderView();
}

// Quick form type toggle
function setQuickType(t){
  quickType=t;
  const expBtn=$("quick-type-exp");const incBtn=$("quick-type-inc");const sel=$("quick-cat");
  if(expBtn){expBtn.className="type-btn "+(t==="expense"?"active-expense":"inactive")}
  if(incBtn){incBtn.className="type-btn "+(t==="income"?"active-income":"inactive")}
  if(sel){
    const cats=t==="expense"?EXPENSE_CATS:INCOME_CATS;
    sel.innerHTML=cats.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join("");
  }
}

function quickSubmit(){
  const descEl=$("quick-desc");const amtEl=$("quick-amt");const catEl=$("quick-cat");
  if(!descEl||!amtEl)return;
  const desc=descEl.value.trim();const amt=parseInt(amtEl.value);const cat=catEl?catEl.value:(quickType==="expense"?"food":"salary");
  if(!desc||isNaN(amt)||amt<=0)return;
  const tx={id:Date.now(),desc,amount:quickType==="expense"?-amt:amt,cat,date:new Date().toISOString().slice(0,10)};
  transactions.unshift(tx);saveToFirebase(tx);
  showToast(quickType==="expense"?"Gasto: "+desc:"Ingreso: "+desc);renderView();
}

// ============================================
// INIT
// ============================================
renderView();
loadFromFirebase();
listenTransactions();
