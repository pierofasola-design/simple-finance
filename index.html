const isM=()=>curDev==="mobile",isT=()=>curDev==="tablet",isD=()=>curDev==="desktop",isW=()=>isD()||isT();
const bal=()=>txs.reduce((s,t)=>s+t.amount,0);
const totI=()=>txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
const totE=()=>txs.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0);

function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function setSS(s,t){$("sync-ind").querySelector(".sd").className="sd "+s;$("sync-text").textContent=t}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}

function calcPmt(p,r,n){if(r===0)return p/n;const mr=r/100/12;return p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1)}

async function fbLoad(col){
  try{const s=await db.collection(col).orderBy("_ts","desc").get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){console.error(e);return[]}
}
async function fbSave(col,data){
  setSS("sync","Guardando...");
  try{const id=data._id||String(Date.now());delete data._id;await db.collection(col).doc(id).set({...data,_ts:firebase.firestore.FieldValue.serverTimestamp()});setSS("on","Guardado");setTimeout(()=>setSS("on","Conectado"),1200);return id}catch(e){console.error(e);setSS("off","Error");return null}
}
async function fbDel(col,id){
  setSS("sync","Eliminando...");
  try{await db.collection(col).doc(id).delete();setSS("on","Eliminado");setTimeout(()=>setSS("on","Conectado"),1200)}catch(e){console.error(e);setSS("off","Error")}
}
async function fbDelAll(col){
  const s=await db.collection(col).get();const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit();
}

async function loadAll(){
  setSS("sync","Cargando...");
  txs=await fbLoad("transactions");
  credits=await fbLoad("credits");
  quotes=await fbLoad("quotes");
  investments=await fbLoad("investments");
  setSS("on","Conectado");
  render();
}

  h+=`</div>`;
  // Investments summary
  h+=`<div class="card"><h3 class="card-t">🌱 Inversiones</h3>`;
  if(investments.length===0){h+=`<p style="font-size:13px;color:var(--t3);text-align:center;padding:20px">Sin inversiones registradas</p>`}

// ─── TRANSACTIONS ───
function rTx(){
  if(txs.length===0)return`<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p><p class="esub">Presiona + para registrar tu primera transaccion</p></div>`;

  h+=`<div class="tg ${isW()?'s2':'s1'}">${txs.map((t,i)=>txRow(t,i,true)).join("")}</div>`;
  return h;
}
function txRow(tx,i,showCat=false){
  const c=gc(tx.cat),neg=tx.amount<0;
  return`<div class="tr fade-in" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji">${c.i}</span><div><p class="desc">${tx.desc}</p><p class="date">${showCat?c.l+' - ':''}${tx.date||''}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.amount)}</p><button class="ib edit" onclick="editItem('transactions','${tx._id}')">✏️</button><button class="ib del" onclick="delItem('transactions','${tx._id}','${tx.desc}')">🗑</button></div></div>`;
}

  });

// ─── COMPARATOR ───
function rComp(){
  let h=`<p style="font-size:13px;color:var(--t3);margin-bottom:16px">Agrega cotizaciones de credito para compararlas y encontrar la mejor opcion.</p>`;
  h+=`<button class="bp" style="margin-bottom:18px" onclick="openModalFor('quotes')">+ Agregar Cotizacion de Credito</button>`;

  if(quotes.length===0)return h+`<div class="es"><div class="ei">⚖️</div><p class="et">Sin cotizaciones</p><p class="esub">Agrega al menos 2 cotizaciones para compararlas</p></div>`;

  // Find winner (lowest total cost)
  const withCalc=quotes.map(q=>{const pmt=q.cuota||calcPmt(q.monto,q.tasa,q.plazo);const total=pmt*q.plazo;const interest=total-q.monto;return{...q,pmt,total,interest}});
  const minTotal=Math.min(...withCalc.map(q=>q.total));

  h+=`<div class="tg s1">`;
  withCalc.forEach((q,i)=>{
    const isWin=q.total===minTotal&&quotes.length>1;
    h+=`<div class="qt-card ${isWin?'qt-winner':''} fade-in" style="animation-delay:${i*.06}s">`;
    h+=`<div class="qt-header"><div><span class="qt-bank">${q.banco||'Credito '+(i+1)}</span>${q.producto?`<span style="font-size:11px;color:var(--t3);margin-left:8px">${q.producto}</span>`:''}</div><div style="display:flex;align-items:center;gap:6px">${isWin?'<span class="qt-winner-badge">✓ MEJOR</span>':''}<button class="ib edit" onclick="editItem('quotes','${q._id}')">✏️</button><button class="ib del" onclick="delItem('quotes','${q._id}','${q.banco||"cotizacion"}')">🗑</button></div></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Monto</span><span class="qt-mv">${fmt(q.monto)}</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Tasa anual</span><span class="qt-mv">${q.tasa}%</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Plazo</span><span class="qt-mv">${q.plazo} meses</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Cuota mensual</span><span class="qt-mv" style="color:var(--accent)">${fmt(q.pmt)}</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Total intereses</span><span class="qt-mv" style="color:var(--orange)">${fmt(q.interest)}</span></div>`;
    h+=`<div class="qt-metric"><span class="qt-ml">Costo total</span><span class="qt-mv" style="font-size:16px;color:${isWin?'var(--green)':'var(--red)'}">${fmt(q.total)}</span></div>`;
    if(q.seguro)h+=`<div class="qt-metric"><span class="qt-ml">Seguro desgravamen</span><span class="qt-mv">${fmt(q.seguro)}/mes</span></div>`;
    if(q.notas)h+=`<p style="font-size:11px;color:var(--t3);margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9">📝 ${q.notas}</p>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  if(quotes.length>=2){
    const best=withCalc.find(q=>q.total===minTotal);
    const worst=withCalc.find(q=>q.total===Math.max(...withCalc.map(q=>q.total)));
    const saved=worst.total-best.total;
    h+=`<div class="verdict"><h4>💡 Analisis</h4><p><strong>${best.banco||'La mejor opcion'}</strong> te ahorra <strong style="color:var(--green)">${fmt(saved)}</strong> comparado con la alternativa mas cara. `;
    if(best.pmt>worst.pmt)h+=`Aunque la cuota es mas alta (${fmt(best.pmt)} vs ${fmt(worst.pmt)}), el menor plazo o tasa resulta en un ahorro significativo en el total.`;
    h+=`</p></div>`;
  }
  return h;
}

// ─── INVESTMENTS ───

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><p style="font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1px">PATRIMONIO INVERTIDO</p><p style="font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--green);margin-top:4px">${fmt(totInv)}</p></div><button class="bp" style="width:auto;padding:10px 20px;font-size:13px" onclick="openModalFor('investments')">+ Agregar Inversion</button></div>`;

  if(investments.length===0)return h+`<div class="es"><div class="ei">🌱</div><p class="et">Sin inversiones</p><p class="esub">Registra tus inversiones para hacer seguimiento de tu patrimonio</p></div>`;

  h+=`<div class="tg ${isW()?'s2':'s1'}">`;
  investments.forEach((inv,i)=>{
    h+=`<div class="inv-card fade-in" style="animation-delay:${i*.06}s"><div class="inv-header"><div><span class="inv-name">${inv.name}</span><br><span class="inv-type">${inv.tipo||'Inversion'}</span></div><div style="display:flex;gap:4px"><button class="ib edit" onclick="editItem('investments','${inv._id}')">✏️</button><button class="ib del" onclick="delItem('investments','${inv._id}','${inv.name}')">🗑</button></div></div>`;
    h+=`<p class="inv-val">${fmt(inv.amount)}</p>`;
    h+=`<div class="inv-metrics">`;
    if(inv.tasa)h+=`<span class="inv-m">Renta: <strong>${inv.tasa}% anual</strong></span>`;
    if(inv.plazo)h+=`<span class="inv-m">Plazo: <strong>${inv.plazo}</strong></span>`;
    if(inv.entidad)h+=`<span class="inv-m">En: <strong>${inv.entidad}</strong></span>`;
    h+=`</div>`;
    if(inv.notas)h+=`<p style="font-size:11px;color:var(--t3);margin-top:8px">📝 ${inv.notas}</p>`;
    h+=`</div>`;
  });
  h+=`</div>`;return h;
}

    h+=`<input class="fi" id="m-producto" placeholder="Producto (ej: Credito Consumo)" value="${q?q.producto||'':''}">`;
    h+=`<input class="fi" id="m-monto" type="number" placeholder="Monto del credito $" value="${q?q.monto:''}">`;
    h+=`<div class="fr"><input class="fi" id="m-tasa" type="number" step="0.01" placeholder="Tasa anual %" value="${q?q.tasa:''}"><input class="fi" id="m-plazo" type="number" placeholder="Plazo (meses)" value="${q?q.plazo:''}"></div>`;
    h+=`<input class="fi" id="m-cuota" type="number" placeholder="Cuota mensual $ (opcional, si te la dieron)" value="${q?.cuota||''}">`;
    h+=`<input class="fi" id="m-seguro" type="number" placeholder="Seguro desgravamen $/mes (opcional)" value="${q?.seguro||''}">`;
    h+=`<textarea class="fi" id="m-notas" placeholder="Notas adicionales (comisiones, condiciones, etc)" style="height:70px;resize:vertical">${q?.notas||''}</textarea>`;
    h+=`<button class="bp" onclick="saveQuote()">${editId?'Guardar Cambios':'Agregar Cotizacion'}</button>`;
  }
  else if(col==="investments"){
    $("modal-title").textContent=editId?"Editar Inversion":"Nueva Inversion";
    const inv=editId?investments.find(c=>c._id===editId):null;
    h+=`<input class="fi" id="m-name" placeholder="Nombre (ej: Fondo Mutuo A)" value="${inv?inv.name:''}">`;
    h+=`<select class="fi" id="m-tipo"><option value="Fondo Mutuo" ${inv?.tipo==='Fondo Mutuo'?'selected':''}>Fondo Mutuo</option><option value="Deposito a Plazo" ${inv?.tipo==='Deposito a Plazo'?'selected':''}>Deposito a Plazo</option><option value="APV" ${inv?.tipo==='APV'?'selected':''}>APV</option><option value="Acciones" ${inv?.tipo==='Acciones'?'selected':''}>Acciones</option><option value="Crypto" ${inv?.tipo==='Crypto'?'selected':''}>Crypto</option><option value="Cuenta 2 AFP" ${inv?.tipo==='Cuenta 2 AFP'?'selected':''}>Cuenta 2 AFP</option><option value="Propiedad" ${inv?.tipo==='Propiedad'?'selected':''}>Propiedad</option><option value="Otro" ${inv?.tipo==='Otro'?'selected':''}>Otro</option></select>`;
    h+=`<input class="fi" id="m-amt" type="number" placeholder="Monto invertido $" value="${inv?inv.amount:''}">`;
    h+=`<div class="fr"><input class="fi" id="m-tasa" type="number" step="0.1" placeholder="Rent. anual % (est.)" value="${inv?.tasa||''}"><input class="fi" id="m-plazo2" placeholder="Plazo (ej: 1 ano)" value="${inv?.plazo||''}"></div>`;
    h+=`<input class="fi" id="m-entidad" placeholder="Entidad (ej: Fintual, BCI)" value="${inv?.entidad||''}">`;
    h+=`<textarea class="fi" id="m-notas" placeholder="Notas" style="height:60px;resize:vertical">${inv?.notas||''}</textarea>`;
    h+=`<button class="bp" onclick="saveInv()">${editId?'Guardar Cambios':'Agregar Inversion'}</button>`;
  }

  $("modal-body").innerHTML=h;
  if(col==="transactions")buildMCats();
}

function closeModal(){$("mo").classList.add("hidden");editId=null;editCol=null}

// Tx categories
function sfType(t){formType=t;formCat=t==="expense"?"food":"salary";
  const btns=$("modal-body").querySelectorAll(".tb");if(btns[0])btns[0].className="tb "+(t==="expense"?"ae":"off");if(btns[1])btns[1].className="tb "+(t==="income"?"ai":"off");buildMCats()}
function buildMCats(){const cats=formType==="expense"?ECAT:ICAT;const el=$("m-cats");if(!el)return;el.innerHTML=cats.map(c=>`<button class="cb" style="border-color:${formCat===c.id?c.c:'#e2e8f0'};background:${formCat===c.id?c.c+'12':'transparent'};color:${formCat===c.id?c.c:'#94a3b8'}" onclick="formCat='${c.id}';buildMCats()">${c.i} ${c.l}</button>`).join("")}

// ════════════════════════════════════════════
// SAVE FUNCTIONS
// ════════════════════════════════════════════
async function saveTx(){
  const desc=$("m-desc")?.value.trim(),amt=parseInt($("m-amt")?.value),date=$("m-date")?.value;
  if(!desc||isNaN(amt)||amt<=0)return toast("Completa los campos");
  const data={desc,amount:formType==="expense"?-amt:amt,cat:formCat,date:date||new Date().toISOString().slice(0,10)};
  if(editId)data._id=editId;
  const id=await fbSave("transactions",data);
  if(id){if(editId){const idx=txs.findIndex(t=>t._id===editId);if(idx>=0)txs[idx]={_id:editId,...data}}else txs.unshift({_id:id,...data});
  toast(editId?"Editado":"Guardado: "+desc);closeModal();render()}
}

async function saveCred(){
  const name=$("m-name")?.value.trim(),detail=$("m-detail")?.value.trim(),amt=parseInt($("m-amt")?.value),status=$("m-status")?.value,icon=$("m-icon")?.value;
  if(!name||isNaN(amt)||amt<=0)return toast("Completa nombre y monto");
  const data={name,detail,amount:amt,status,icon};
  if(editId)data._id=editId;
  const id=await fbSave("credits",data);
  if(id){if(editId){const idx=credits.findIndex(c=>c._id===editId);if(idx>=0)credits[idx]={_id:editId,...data}}else credits.unshift({_id:id,...data});
  toast(editId?"Editado":"Agregado: "+name);closeModal();render()}
}

async function saveQuote(){
  const banco=$("m-banco")?.value.trim(),producto=$("m-producto")?.value.trim(),monto=parseFloat($("m-monto")?.value),tasa=parseFloat($("m-tasa")?.value),plazo=parseInt($("m-plazo")?.value);
  const cuota=parseFloat($("m-cuota")?.value)||0,seguro=parseFloat($("m-seguro")?.value)||0,notas=$("m-notas")?.value.trim();
  if(!banco||isNaN(monto)||monto<=0||isNaN(tasa)||isNaN(plazo)||plazo<=0)return toast("Completa banco, monto, tasa y plazo");
  const data={banco,producto,monto,tasa,plazo,cuota:cuota||null,seguro:seguro||null,notas};
  if(editId)data._id=editId;
  const id=await fbSave("quotes",data);
  if(id){if(editId){const idx=quotes.findIndex(q=>q._id===editId);if(idx>=0)quotes[idx]={_id:editId,...data}}else quotes.unshift({_id:id,...data});
  toast(editId?"Editado":"Agregado: "+banco);closeModal();render()}
}

async function saveInv(){
  const name=$("m-name")?.value.trim(),tipo=$("m-tipo")?.value,amt=parseFloat($("m-amt")?.value),tasa=parseFloat($("m-tasa")?.value)||null,plazo=$("m-plazo2")?.value.trim(),entidad=$("m-entidad")?.value.trim(),notas=$("m-notas")?.value.trim();
  if(!name||isNaN(amt)||amt<=0)return toast("Completa nombre y monto");
  const data={name,tipo,amount:amt,tasa,plazo,entidad,notas};
  if(editId)data._id=editId;
  const id=await fbSave("investments",data);
  if(id){if(editId){const idx=investments.findIndex(v=>v._id===editId);if(idx>=0)investments[idx]={_id:editId,...data}}else investments.unshift({_id:id,...data});
  toast(editId?"Editado":"Agregado: "+name);closeModal();render()}
}

// ════════════════════════════════════════════
// EDIT / DELETE
// ════════════════════════════════════════════
function editItem(col,id){editId=id;editCol=col;openModalFor(col)}

function delItem(col,id,name){
  showCo("Eliminar","Eliminar '"+name+"'? No se puede deshacer.","Eliminar",async()=>{
    await fbDel(col,id);
    if(col==="transactions")txs=txs.filter(t=>t._id!==id);
    if(col==="credits")credits=credits.filter(c=>c._id!==id);
    if(col==="quotes")quotes=quotes.filter(q=>q._id!==id);
    if(col==="investments")investments=investments.filter(v=>v._id!==id);
    toast("Eliminado");render();
  });
}

function resetCol(col,varName){
  showCo("Resetear todo","Se eliminaran TODOS los registros de esta seccion. No se puede deshacer.","Resetear",async()=>{
    await fbDelAll(col);
    if(varName==="txs")txs=[];if(varName==="credits")credits=[];if(varName==="quotes")quotes=[];if(varName==="investments")investments=[];
    toast("Datos eliminados");render();
  });
}

// ════════════════════════════════════════════
render();
loadAll();
