<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SimpleFinance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
// ===== PANEL DE ADMINISTRADOR =====
function navAdmin(view){
  adminView=view;
  const titles={users:"👥 Usuarios",invitations:"📧 Invitaciones",audit:"📋 Auditoría"};
  $("header-title").textContent=titles[view]||"Admin";
  const renders={users:rAdminUsers,invitations:rAdminInvitations,audit:rAdminAudit};
  if(renders[view])$("vc").innerHTML=renders[view]();
}

function rAdminUsers(){
  let h="<div class='card'><h3 class='card-t'>👥 Usuarios Registrados</h3>";
  h+="<p style='font-size:11px;color:var(--t3);margin-bottom:12px'>Total: "+allUsers.length+" usuarios</p>";
  h+=allUsers.map(u=>"<div style='padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px'><div style='display:flex;justify-content:space-between;align-items:flex-start'><div style='flex:1'><p style='font-weight:700;color:var(--t1)'>"+u.name+"</p><p style='font-size:11px;color:var(--t3)'>RUT: "+u.rut+"</p><p style='font-size:10px;color:"+(u.role==="admin"?"#f59e0b":"#94a3b8")+"'>"+(u.role==="admin"?"👨‍💼 ADMIN":"👤 Usuario")+"</p></div><div style='display:flex;gap:6px;flex-direction:column'><button class='bp' style='padding:6px 12px;font-size:10px;width:120px;margin:0' onclick=\"simulateLoginUser('"+u.rut+"','"+u.name+"')\">👁️ Ver como</button></div></div></div>").join("");
  h+="</div>";
  return h;
}

function simulateLoginUser(rut,name){
  showCo("Ver datos de "+name,"¿Ver transacciones y datos de "+name+"?","Ver",async function(){
    // Obtener todas las transacciones del usuario
    const userTxs=txs.filter(t=>t.uid===allUsers.find(u=>u.rut===rut)?.uid);
    const userDebts=debts.filter(d=>d.fromUid===allUsers.find(u=>u.rut===rut)?.uid);
    
    let h="<button class='bp' style='margin-bottom:12px;width:auto' onclick=\"navAdmin('users')\">← Volver</button>";
    h+="<div class='card'><h3 class='card-t'>📊 Datos de "+name+"</h3>";
    h+="<div style='padding:12px;background:#f8fafc;border-radius:10px;margin-bottom:12px'>";
    h+="<p style='font-size:11px;color:var(--t3);margin-bottom:4px'><strong>RUT:</strong> "+rut+"</p>";
    h+="<p style='font-size:11px;color:var(--t3);margin-bottom:4px'><strong>Email Login:</strong> "+rut.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local</p>";
    h+="<p style='font-size:11px;color:var(--t3);margin-bottom:4px'><strong>Total Transacciones:</strong> "+userTxs.length+"</p>";
    
    if(userTxs.length>0){
      const totalGastos=userTxs.filter(t=>t.tipo==="egreso").reduce((s,t)=>s+t.monto,0);
      const totalIngresos=userTxs.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);
      h+="<p style='font-size:11px;color:var(--red);margin-bottom:4px'><strong>Gastos totales:</strong> "+fmt(totalGastos)+"</p>";
      h+="<p style='font-size:11px;color:var(--green)'>Ingresos totales: "+fmt(totalIngresos)+"</p>";
    }
    h+="</div>";
    
    if(userTxs.length>0){
      h+="<div class='card'><h3 class='card-t'>📜 Últimas 10 Transacciones</h3>";
      h+="<div style='padding:12px;background:#f8fafc;border-radius:10px;font-size:10px'>";
      h+=userTxs.slice(0,10).map(tx=>"<div style='padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between'><div><span style='font-weight:600'>"+tx.fecha+"</span> - "+tx.descripcion+"</div><span style='color:"+(tx.tipo==="egreso"?"#f43f5e":"#10b981")+"';font-weight:700'>"+fmt(tx.monto)+"</span></div>").join("");
      h+="</div></div>";
    }else{
      h+="<div class='card'><p style='color:var(--t3);text-align:center;padding:20px'>Sin transacciones registradas</p></div>";
    }
    
    h+="<div class='card'><h3 class='card-t'>🤝 Deudas Compartidas</h3>";
    if(userDebts.length>0){
      h+="<div style='padding:12px;background:#f8fafc;border-radius:10px;font-size:10px'>";
      h+=userDebts.map(d=>"<div style='padding:8px;border-bottom:1px solid var(--border)'>"+d.descripcion+" - "+fmt(d.amount)+" (Estado: "+(d.status==="paid"?"✓ Pagado":"⏳ Pendiente")+")</div>").join("");
      h+="</div>";
    }else{
      h+="<p style='color:var(--t3);text-align:center;padding:20px'>Sin deudas compartidas</p>";
    }
    h+="</div>";
    $("vc").innerHTML=h;
  });
}

function rAdminInvitations(){
  const code="SF-"+Math.random().toString(36).substr(2,8).toUpperCase();
  let h="<div class='card'><h3 class='card-t'>📧 Invitaciones</h3>";
  h+="<p style='font-size:11px;color:var(--t3);margin-bottom:12px'>Código para invitar usuarios:</p>";
  h+="<input type='text' id='invCode' value='"+code+"' readonly style='width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-family:monospace'>";
  h+="<button class='bp' style='width:100%' onclick='copyInvCode()'>📋 Copiar Código</button>";
  h+="</div>";
  return h;
}

function rAdminAudit(){
  let h="<div class='card'><h3 class='card-t'>📋 Auditoría del Sistema</h3>";
  h+="<div style='padding:12px;background:#f8fafc;border-radius:10px'>";
  h+="<p style='font-size:11px;color:var(--t3);margin-bottom:8px'><strong>📊 Estadísticas:</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Total de usuarios: <strong>"+allUsers.length+"</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Total de transacciones: <strong>"+txs.length+"</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Deudas pendientes: <strong>"+debts.filter(d=>d.status==="pending").length+"</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Datos por sincronizar: <strong>"+syncQueue.length+"</strong></p>";
  h+="</div>";
  h+="</div>";
  return h;
}

function copyInvCode(){
  const code=$("invCode").value;
  navigator.clipboard.writeText(code);
  toast("✓ Código copiado al portapapeles");
}

</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;width:100%}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo .icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo .text{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
.login-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--t3)}
.login-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fi{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:12px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1);outline:none}
.bp{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}.bp:disabled{opacity:.5;cursor:not-allowed}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px}
.app{width:100%;min-height:100vh;background:var(--bg);display:flex}
.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;width:220px;padding:24px 14px}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;cursor:pointer;transition:all .15s;text-align:left}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px;display:flex;align-items:center;gap:10px}
.sf-user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logout-btn{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}.logout-btn:hover{background:#1e293b;color:#e2e8f0}
.main{flex:1;overflow:auto;padding:28px 36px 30px;width:100%}
.main-inner{max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--t1);margin-top:2px}
.sg{display:grid;gap:12px;margin-bottom:22px}.sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
.sc{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}.sc .inn{padding:18px 16px}
.sc .lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}.sc .val{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--t1);margin-top:6px}.sc .sub{font-size:11px;font-weight:600;margin-top:4px}
.card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.tr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border);margin-bottom:8px}
.tr .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}.tr .emoji-i{font-size:18px;flex-shrink:0}
.tr .desc{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr .date{font-size:10px;color:var(--t3)}.tr .right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tr .amt{font-size:13px;font-weight:700}.tr .amt.neg{color:var(--red)}.tr .amt.pos{color:var(--green)}
.ib{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.ib:hover{background:#f1f5f9}.ib.del:hover{background:#f43f5e15;color:var(--red)}.ib.edit:hover{background:#0ea5e915;color:var(--accent)}
.es{text-align:center;padding:40px 20px}.es .ei{font-size:48px;margin-bottom:12px}.es .et{font-size:16px;font-weight:700;color:var(--t1)}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(14,165,233,.35);z-index:50;cursor:pointer;transition:all .2s}
.fab:hover{transform:scale(1.05)}.fab:active{transform:scale(.95)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0}
.mb{background:#fff;width:520px;max-width:95%;max-height:90vh;overflow-y:auto;border-radius:22px;padding:26px 22px 34px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;margin:20px 0}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt-t{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--t1)}
.mc{width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;font-size:16px;color:var(--t2);cursor:pointer}
.section{margin-bottom:18px;padding:14px;border-radius:12px;background:#f8fafc;border:1px solid var(--border)}
.section-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.select-group{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;max-height:300px;overflow-y:auto}
.select-option{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s}
.select-option:last-child{border-bottom:none}.select-option:hover{background:#f1f5f9}.select-option.active{background:#0ea5e908;border-left:3px solid var(--accent)}
.select-option .opt-icon{font-size:16px}.select-option .opt-name{font-size:12px;font-weight:600;color:var(--t1)}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:999;background:#0f172a;color:#38bdf8;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid #1e293b;animation:fadeIn .3s ease-out}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.cbox{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;text-align:center}
.cbox h3{font-size:18px;font-weight:700;margin-bottom:8px}.cbox p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.cbtns{display:flex;gap:10px}.cbtns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.cbtn-c{background:#f1f5f9;color:var(--t2)}.cbtn-d{background:var(--red);color:#fff}
.tipo-btn{padding:12px;border-radius:12px;border:2px solid;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;flex:1}
.tipo-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.tipo-btn:not(.active){border-color:var(--border);color:var(--t2);background:transparent}
.hidden{display:none!important}
@media(max-width:767px){
  .app{flex-direction:column}.sidebar{display:none;width:auto;padding:0}.main{padding:16px 12px 90px}
  .sg3{grid-template-columns:1fr}.sg4{grid-template-columns:1fr 1fr}
  .mb{width:95%;max-width:100%;max-height:85vh;padding:16px 12px 24px}
  .fab{bottom:75px;right:12px;width:48px;height:48px;font-size:20px}
  .mob-nav{display:flex!important;position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);padding:6px 0 8px;z-index:40;justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .mob-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;font-weight:700;color:var(--t3);padding:4px 6px;cursor:pointer}
  .mob-nav button.active{color:var(--accent)}.mob-nav button .mi{font-size:14px}
  .header-title{font-size:18px}
}
@media(min-width:768px) and (max-width:1024px){
  .sidebar{width:80px;padding:16px 8px}.logo-text{display:none}.sidebar-btn span:last-of-type{display:none}
  .main{padding:20px 16px;flex:1}.mb{width:500px;max-width:90%}.mob-nav{display:none}
}
@media(min-width:1025px){
  .sidebar{width:220px;padding:24px 14px}.logo-text{display:block}.sidebar-btn span:last-of-type{display:block}
  .sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
  .mb{width:520px;max-width:95%}.mob-nav{display:none}
}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen" class="login-bg">
<div class="login-card">
  <div class="login-logo"><div class="icon">S</div><span class="text">SimpleFinance</span></div>
  <div class="login-tabs">
    <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
    <button class="login-tab" id="tab-register" onclick="switchTab('register')">Crear</button>
  </div>
  <div id="login-form">
    <input class="fi" id="l-rut" placeholder="RUT (ej: 12345678-9)" oninput="validateLoginForm()">
    <input class="fi" id="l-pass" type="password" placeholder="Contraseña" oninput="validateLoginForm()">
    <p class="login-err" id="l-err"></p>
    <button class="bp" id="login-btn" onclick="doLogin()" disabled>Ingresar</button>
  </div>
  <div id="register-form" class="hidden">
    <input class="fi" id="r-name" placeholder="Nombre completo" oninput="validateRegisterForm()">
    <input class="fi" id="r-rut" placeholder="RUT (ej: 12345678-9)" oninput="validateRegisterForm()">
    <input class="fi" id="r-pass" type="password" placeholder="Contraseña (min 6)" oninput="validateRegisterForm()">
    <input class="fi" id="r-pass2" type="password" placeholder="Confirmar" oninput="validateRegisterForm()">
    <p class="login-err" id="r-err"></p>
    <button class="bp" id="register-btn" onclick="doRegister()" disabled>Crear Cuenta</button>
  </div>
</div>
</div>
<!-- APP -->
<div id="app-screen" class="hidden" style="width:100%">
<div class="app" id="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo-wrap"><div class="logo-icon">S</div><span class="logo-text">SF</span></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div style="border-top:1px solid #1e293b;padding-top:12px;margin-bottom:12px" id="admin-section" class="hidden">
      <button class="sidebar-btn" onclick="navAdmin('users')" style="margin-bottom:4px">👥 Usuarios</button>
      <button class="sidebar-btn" onclick="navAdmin('invitations')" style="margin-bottom:4px">📧 Invitaciones</button>
      <button class="sidebar-btn" onclick="navAdmin('audit')" style="margin-bottom:4px">📋 Auditoría</button>
    </div>
    <div class="sidebar-footer">
      <div style="background:#1e293b;border-radius:8px;padding:12px;margin-bottom:12px;border:1px solid #334155">
        <p style="font-size:10px;font-weight:700;color:#e2e8f0;margin-bottom:8px;text-transform:uppercase">🔄 SINCRONIZACIÓN</p>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <div id="sync-indicator" style="width:10px;height:10px;border-radius:50%;background:#10b981;animation:pulse 2s infinite"></div>
          <span style="font-size:11px;color:var(--t3)" id="sync-status">Conectado</span>
        </div>
        <p style="font-size:10px;color:var(--t3);margin-bottom:8px">Pendientes: <span id="sync-pending" style="font-weight:700;color:#0ea5e9">0</span></p>
        <div id="sync-progress" style="width:100%;height:4px;background:#0f172a;border-radius:4px;overflow:hidden;margin-bottom:8px">

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;const btn=$("register-btn");
  if(!name||!rut||!pass||!pass2){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contraseña minimo 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contraseñas no coinciden";return}
  btn.disabled=true;btn.textContent="Creando...";$("r-err").textContent="";
  try{
    const cred=await auth.createUserWithEmailAndPassword(rutToEmail(rut),pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection("categories").doc(cred.user.uid).set({...DEFAULT_CATEGORIES});
    toast("Cuenta creada");switchTab("login");
    btn.disabled=false;btn.textContent="Crear Cuenta";
  }catch(e){
    $("r-err").textContent=e.code==="auth/email-already-in-use"?"RUT ya registrado":e.message;

async function doLogin(){

async function fbLoad(col,filter=null){try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}}
async function fbSave(col,data){
  try{
    const id=data._id;
    const d={...data};
    delete d._id;
    d._ts=firebase.firestore.FieldValue.serverTimestamp();
    if(id){
      await db.collection(col).doc(id).set(d,{merge:true});
    }else{
      const ref=await db.collection(col).add(d);
      return ref.id;
    }
    return id;
  }catch(e){
    console.error("fbSave error:",e);
    return null;
  }
}

function addToSyncQueue(op){syncQueue.push({...op,timestamp:Date.now(),id:String(Date.now())+Math.random()});updateSyncUI();saveSyncQueueToLocalStorage();}

function updateSyncUI(){const p=syncQueue.length;const i=$("sync-indicator");const st=$("sync-status");const pe=$("sync-pending");const sb=$("sync-btn");if(pe)pe.textContent=p;if(p>0){if(i)i.style.background="#f59e0b";if(st)st.textContent="Pendiente";if(sb)sb.style.background="#f59e0b";}else{if(i)i.style.background="#10b981";if(st)st.textContent="Sincronizado";if(sb)sb.style.background="#0ea5e9";}}
async function triggerSync(){if(isSyncing||syncQueue.length===0){if(syncQueue.length===0)toast("✓ Sincronizado");return;} await performSync();}
async function performSync(){if(isSyncing||!syncQueue.length)return;isSyncing=true;const sb=$("sync-btn");if(sb)sb.disabled=true;const t=syncQueue.length;let c=0;for(let i=0;i<syncQueue.length;i++){const op=syncQueue[i];const b=$("sync-bar");if(b)b.style.width=(c/t*100)+"%";try{if(op.type==="save"){const id=op.data._id||String(Date.now());const d={...op.data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();if(op.data._id){await db.collection(op.col).doc(id).set(d,{merge:true});}else{const r=await db.collection(op.col).add(d);}}else if(op.type==="del"){await db.collection(op.col).doc(op.id).delete();}syncQueue.splice(i,1);i--;c++;}catch(e){c++;}}const b=$("sync-bar");if(b)b.style.width="100%";isSyncing=false;if(sb)sb.disabled=false;saveSyncQueueToLocalStorage();updateSyncUI();if(!syncQueue.length){toast("✓ Completo");await loadAll();}}
setInterval(()=>{if(!isSyncing&&syncQueue.length>0&&isOnline)performSync();},SYNC_INTERVAL);
window.addEventListener("online",()=>{isOnline=true;const i=$("sync-indicator");if(i)i.style.background="#10b981";toast("🟢 Online");if(syncQueue.length>0)performSync();});

async function loadAll(){
  const uid=curUser.uid;

  let txsRaw=await fbLoad("transactions",{f:"uid",v:uid});
  txs=txsRaw.sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  
  debts=await fbLoad("debts",{f:"fromUid",v:uid});
  
  let superRaw=await fbLoad("supermercado",{f:"uid",v:uid});

  let feriaRaw=await fbLoad("feria",{f:"uid",v:uid});

  render();
}
function nav(v){curView=v;render()}
function buildSB(){$("sidebar-nav").innerHTML=VIEWS.map(v=>`<button class="sidebar-btn ${curView===v.id?'active':''}" onclick="nav('${v.id}')"><span class="emoji">${v.e}</span><span>${v.l}</span></button>`).join("")}

}
function rDash(){
  const b=txs.reduce((s,t)=>s+(t.tipo==="egreso"?-Math.abs(t.monto):Math.abs(t.monto)),0);
  const i=txs.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+Math.abs(t.monto),0);
  const e=txs.filter(t=>t.tipo==="egreso").reduce((s,t)=>s+Math.abs(t.monto),0);
  let h=`<div class="sg sg4"><div class="sc" style="border-left-color:#10b981"><div class="inn"><span class="lbl">BALANCE</span><p class="val" style="color:${b>=0?'#10b981':'#f43f5e'}">${fmt(b)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#10b981"><div class="inn"><span class="lbl">INGRESOS</span><p class="val">${fmt(i)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#f43f5e"><div class="inn"><span class="lbl">EGRESOS</span><p class="val">${fmt(e)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#a855f7"><div class="inn"><span class="lbl">MOVIMIENTOS</span><p class="val">${txs.length}</p></div></div></div>`;
  
  const now=new Date();const mesActual=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const txsMes=txs.filter(t=>t.tipo==="egreso"&&(t.fecha||"").startsWith(mesActual));
  const gporMacro={};
  txsMes.forEach(tx=>{if(!gporMacro[tx.macro])gporMacro[tx.macro]={icon:userCategories[tx.macro]?.icon,subs:{}};if(!gporMacro[tx.macro].subs[tx.sub])gporMacro[tx.macro].subs[tx.sub]={icon:tx.icon,monto:0,qty:0};gporMacro[tx.macro].subs[tx.sub].monto+=tx.monto;gporMacro[tx.macro].subs[tx.sub].qty++;});
  
  h+=`<div class="card"><h3 class="card-t">💰 Gastos del Mes (${mesActual})</h3>`;
  if(Object.keys(gporMacro).length===0){h+=`<p style="color:var(--t3);text-align:center;padding:20px">Sin gastos registrados este mes</p>`;}else{Object.entries(gporMacro).forEach(([macro,macroData])=>{const totalMacro=Object.values(macroData.subs).reduce((s,sub)=>s+sub.monto,0);h+=`<div style="margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer" onclick="document.getElementById('details-${macro}').style.display=document.getElementById('details-${macro}').style.display==='none'?'block':'none'"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${macroData.icon}</span><span style="font-weight:700;color:var(--t1)">${macro}</span></div><div style="text-align:right"><p style="font-size:14px;font-weight:700;color:var(--red)">${fmt(totalMacro)}</p><p style="font-size:10px;color:var(--t3)">${Object.keys(macroData.subs).length} subcategorías</p></div></div><div id="details-${macro}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">`;Object.entries(macroData.subs).sort((a,b)=>b[1].monto-a[1].monto).forEach(([sub,subData])=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:12px"><div style="display:flex;align-items:center;gap:6px"><span>${subData.icon}</span><span style="color:var(--t2)">${sub}</span><span style="color:var(--t3);font-size:10px">(${subData.qty})</span></div><span style="font-weight:700;color:var(--red)">${fmt(subData.monto)}</span></div>`;});h+=`</div></div>`;});}
  h+=`</div>`;
  
  h+=`<div class="card"><h3 class="card-t">📜 Últimas Transacciones</h3>`;
  if(txs.length===0)h+=`<p style="color:var(--t3);text-align:center;padding:20px">Sin movimientos</p>`;
  else{h+=txs.slice(0,5).map((tx,i)=>{const neg=tx.tipo==="egreso";return `<div class="tr" style="animation-delay:${i*.05}s"><div class="left"><span class="emoji-i">${tx.icon||'📋'}</span><div><p class="desc">${tx.descripcion}</p><p class="date">${tx.fecha}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.monto)}</p></div></div>`}).join("")}
  h+=`</div>`;
  return h;
}
function rCashFlow(){
  const months=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()+i);months.push(d.toISOString().slice(0,7))}
  const proj=months.map(m=>{const txM=txs.filter(t=>(t.fecha||"").startsWith(m));const inc=txM.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);const exp=txM.filter(t=>t.tipo==="egreso").reduce((s,t)=>s+t.monto,0);return{m,inc,exp,saldo:inc-exp}});
  let h=`<div class="card"><h3 class="card-t">📊 Proyección 12 meses</h3><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:10px"><tr style="background:#f1f5f9"><th style="padding:8px;text-align:left;font-weight:700;border:1px solid var(--border)">Mes</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">Ingresos</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">Egresos</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">SALDO</th></tr>`;
  proj.forEach(p=>{const isNow=p.m===new Date().toISOString().slice(0,7);h+=`<tr style="background:${isNow?'#0ea5e908':''}"><td style="padding:8px;border:1px solid var(--border);font-size:11px">${p.m}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:var(--green);font-weight:600;font-size:11px">${fmt(p.inc)}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:var(--red);font-weight:600;font-size:11px">${fmt(p.exp)}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:${p.saldo>=0?'var(--green)':'var(--red)'};font-weight:700;font-size:11px">${fmt(p.saldo)}</td></tr>`});
  h+=`</table></div>`;
  return h;
}
function rMov(){
  if(txs.length===0)return `<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p></div>`;
  let h=`<div style="margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">${txs.length} transacciones</p></div>`;
  h+=txs.map((tx,i)=>{const neg=tx.tipo==="egreso";return `<div class="tr" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${tx.icon||'📋'}</span><div><p class="desc">${tx.descripcion}</p><p class="date">${tx.fecha} • ${tx.macro}/${tx.sub}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.monto)}</p><button class="ib edit" onclick="editTx('${tx._id}')">✏️</button><button class="ib del" onclick="delTx('${tx._id}')">🗑️</button></div></div>`}).join("");
  return h;
}
function rTarjetas(){
  const tarjetaTxs=txs.filter(t=>t.metodoPago==='Tarjeta Crédito');
  if(tarjetaTxs.length===0)return `<div class="es"><div class="ei">💳</div><p class="et">Sin compras con tarjeta crédito</p></div>`;
  const byBanco={};
  tarjetaTxs.forEach(tx=>{const banco=tx.bancoPago||'Otra';if(!byBanco[banco])byBanco[banco]={monto:0,txs:[]};byBanco[banco].monto+=tx.monto;byBanco[banco].txs.push(tx)});
  let h=`<div style="margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">Estado de tus tarjetas</p></div>`;
  Object.entries(byBanco).forEach(([banco,data])=>{h+=`<div class="card" style="margin-bottom:12px"><p style="font-size:12px;font-weight:700">${banco}</p><p style="font-size:14px;color:var(--green);font-weight:700">Saldo: ${fmt(data.monto)}</p><p style="font-size:11px;color:var(--t3)">${data.txs.length} compras</p></div>`});
  return h;
}
function rDeudas(){
  const iOwe=debts.filter(d=>d.status==="pending");
  if(iOwe.length===0)return `<div class="card"><h3 class="card-t">🤝 Deudas Compartidas</h3><p style="color:var(--t3);text-align:center;padding:20px">✓ Sin deudas pendientes</p></div>`;
  let h=`<div class="card"><h3 class="card-t">🤝 Debo Pagar (${iOwe.length})</h3>`;
  iOwe.forEach(d=>{const userName=getUserName(d.toUid);const divInfo=d.divisionType==="equal"?"50/50":d.divisionType==="percent"?d.divisionPercent+"%":"Monto";h+=`<div style="padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><p style="font-size:12px;font-weight:700">👤 ${userName}</p><p style="font-size:11px;color:var(--t3)">${d.fecha}</p></div><p style="font-size:11px;color:var(--t3);margin-bottom:8px">${d.descripcion} • ${divInfo}</p><p style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">Debes: ${fmt(d.amount)}</p><button style="width:100%;padding:8px;border:none;border-radius:8px;background:var(--green);color:#fff;font-size:12px;font-weight:700;cursor:pointer" onclick="markPaidDebt('${d._id}')">✓ Confirmar Pago</button></div>`});
  h+=`</div>`;
  return h;
}
function rSuper(){
  if(superProds.length===0)return `<div style="margin-bottom:20px"><button class="bp" style="width:auto;padding:12px 24px;margin-top:0" onclick="openSuperModal()">📦 Registrar Compra Supermercado</button></div><div class="es"><div class="ei">🛒</div><p class="et">Sin historial de compras</p></div>`;
  
  const byMonth={};
  superProds.forEach(p=>{
    const mes=p.fecha.slice(0,7);
    if(!byMonth[mes])byMonth[mes]={total:0,items:[],cantidad:0};
    byMonth[mes].total+=p.valor*p.cantidad;
    byMonth[mes].cantidad+=p.cantidad;
    byMonth[mes].items.push(p);
  });
  
  let h=`<div style="margin-bottom:20px"><button class="bp" style="width:auto;padding:12px 24px;margin-top:0" onclick="openSuperModal()">📦 Registrar Compra Supermercado</button></div>`;
  Object.keys(byMonth).sort().reverse().forEach(mes=>{
    const data=byMonth[mes];
    h+=`<div class="card" style="margin-bottom:12px"><h3 style="font-size:14px;font-weight:700;margin-bottom:8px">${mes}</h3>`;
    h+=`<p style="font-size:11px;color:var(--t3);margin-bottom:10px">Total: ${fmt(data.total)} | ${data.cantidad} unidades</p>`;
    h+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    data.items.forEach(item=>{
      h+=`<div style="display:flex;justify-content:space-between;padding:8px;background:#f8fafc;border-radius:8px;font-size:11px"><div><span style="font-weight:600">${item.producto}</span><br><span style="color:var(--t3)">x${item.cantidad}</span></div><div style="text-align:right"><span style="font-weight:700;color:var(--green)">${fmt(item.valor*item.cantidad)}</span><br><span style="color:var(--t3);font-size:10px">${item.compartida?'🤝 Compartida':'Personal'}</span></div></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}
function rFeria(){
  if(feriaProds.length===0)return `<div style="margin-bottom:20px"><button class="bp" style="width:auto;padding:12px 24px;margin-top:0" onclick="openFeriaModal()">🥕 Registrar Compra Feria</button></div><div class="es"><div class="ei">🥕</div><p class="et">Sin historial de compras en feria</p></div>`;
  
  const byMonth={};
  feriaProds.forEach(p=>{
    const mes=p.fecha.slice(0,7);

    byMonth[mes].cantidad+=p.cantidad;
    byMonth[mes].items.push(p);
  });
  
  let h=`<div style="margin-bottom:20px"><button class="bp" style="width:auto;padding:12px 24px;margin-top:0" onclick="openFeriaModal()">🥕 Registrar Compra Feria</button></div>`;
  Object.keys(byMonth).sort().reverse().forEach(mes=>{
    const data=byMonth[mes];
    h+=`<div class="card" style="margin-bottom:12px"><h3 style="font-size:14px;font-weight:700;margin-bottom:8px">${mes}</h3>`;
    h+=`<p style="font-size:11px;color:var(--t3);margin-bottom:10px">Total: ${fmt(data.total)} | ${data.cantidad} unidades</p>`;
    h+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    data.items.forEach(item=>{
      h+=`<div style="display:flex;justify-content:space-between;padding:8px;background:#f8fafc;border-radius:8px;font-size:11px"><div><span style="font-weight:600">${item.producto}</span><br><span style="color:var(--t3)">x${item.cantidad}</span></div><div style="text-align:right"><span style="font-weight:700;color:var(--green)">${fmt(item.valor*item.cantidad)}</span><br><span style="color:var(--t3);font-size:10px">${item.compartida?'🤝 Compartida':'Personal'}</span></div></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}
function rSettings(){
  let h=`<h2 style="font-size:18px;font-weight:700;margin-bottom:18px">Gestionar Categorías</h2>`;
  Object.entries(userCategories).forEach(([macro,data])=>{
    h+=`<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 class="card-t" style="margin-bottom:0"><span>${data.icon}</span> ${macro}</h3><button style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer" onclick="openAddSubCategory('${macro}')">+ Cat</button></div>`;
    h+=`<div style="display:flex;flex-direction:column;gap:8px">`;
    Object.entries(data.subs||{}).forEach(([sub,subData])=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--border);border-radius:8px"><div><p style="font-size:13px;font-weight:600">${subData.icon} ${sub}</p></div></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}
function openModal(txId=null){
  window.editingTxId=txId;
  const editTx=txId?txs.find(t=>t._id===txId):null;
  $("mo").classList.remove("hidden");
  
  let h=`<div style="margin-bottom:14px"><div style="display:flex;gap:6px">`;
  h+=`<button class="tipo-btn ${editTx?.tipo==='ingreso'?'active':''}" onclick="setFormTipo('ingreso')">INGRESO</button>`;
  h+=`<button class="tipo-btn ${editTx?.tipo==='egreso'?'active':''}" onclick="setFormTipo('egreso')">EGRESO</button>`;
  h+=`</div></div>`;
  
  h+=`<div class="section"><p class="section-title">Categoría</p><div class="select-group" id="macro-list"></div></div>`;
  h+=`<div class="section hidden" id="sub-section"><p class="section-title">Subcategoría</p><div class="select-group" id="sub-list"></div></div>`;
  
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><input class="fi" id="tx-monto" type="number" placeholder="Monto $" min="0" value="${editTx?.monto||''}" style="margin-bottom:0"><input class="fi" id="tx-fecha" type="date" value="${editTx?.fecha||new Date().toISOString().slice(0,10)}" style="margin-bottom:0"></div>`;
  
  h+=`<input class="fi" id="tx-desc" placeholder="Descripción" value="${editTx?.descripcion||''}" style="margin-bottom:14px">`;
  
  h+=`<div class="section"><p class="section-title">Método de Pago</p><select class="fi" id="tx-metodo" style="margin-bottom:0" onchange="updateMetodoPago()"><option value="">-- Selecciona método --</option><option value="Efectivo" ${editTx?.metodoPago==='Efectivo'?'selected':''}>💵 Efectivo</option><option value="Tarjeta Débito" ${editTx?.metodoPago==='Tarjeta Débito'?'selected':''}>💳 Tarjeta Débito</option><option value="Tarjeta Crédito" ${editTx?.metodoPago==='Tarjeta Crédito'?'selected':''}>💳 Tarjeta Crédito</option><option value="Transferencia Bancaria" ${editTx?.metodoPago==='Transferencia Bancaria'?'selected':''}>🏦 Transferencia</option><option value="Cheque" ${editTx?.metodoPago==='Cheque'?'selected':''}>📄 Cheque</option><option value="Otra" ${editTx?.metodoPago==='Otra'?'selected':''}>📌 Otra</option></select></div>`;
  
  h+=`<div class="section hidden" id="tarjeta-section"><p class="section-title">Detalles Tarjeta Crédito</p><select class="fi" id="tx-banco" style="margin-bottom:0"><option value="Otro">-- Selecciona banco --</option>${BANCOS.map(b=>`<option value="${b}" ${editTx?.bancoPago===b?'selected':''}>${b}</option>`).join('')}<option value="Otro" ${editTx?.bancoPago==="Otro"||!editTx?.bancoPago?"selected":""}>Otro Banco</option></select><div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label style="font-size:10px;font-weight:700;display:block;margin-bottom:4px">Cuotas (opcional)</label><input class="fi" id="tx-cuotas" type="number" placeholder="Ej: 6" min="1" value="${editTx?.cuotas||''}" style="margin-bottom:0" oninput="calcularCuota()"></div><div><label style="font-size:10px;font-weight:700;display:block;margin-bottom:4px">Interés % (opcional)</label><input class="fi" id="tx-interes" type="number" placeholder="Ej: 2.5" min="0" step="0.1" value="${editTx?.interes||''}" style="margin-bottom:0" oninput="calcularCuota()"></div></div><p id="cuota-calc" style="font-size:11px;color:var(--t3);margin-top:8px;text-align:right"></p></div>`;
  
  h+=`<div class="section"><p class="section-title">🤝 Compartir Gasto</p><div style="display:flex;flex-direction:column;gap:8px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="share" value="no" ${!editTx?.sharedWith?'checked':''} onchange="updateShareOptions()"> No compartir</label><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="radio" name="share" value="yes" ${editTx?.sharedWith?'checked':''} onchange="updateShareOptions()"> Compartir con otro usuario</label></div><div id="share-details" class="hidden"><div style="margin-bottom:12px;margin-top:12px"><label style="font-size:11px;font-weight:700;display:block;margin-bottom:6px">Seleccionar usuario:</label><select id="share-user" class="fi" style="margin-bottom:0">${allUsers.filter(u=>u.uid!==curUser.uid).map(u=>`<option value="${u.uid}" ${editTx?.sharedWith===u.uid?'selected':''}>${u.name}</option>`).join('')}</select></div><div style="margin-bottom:12px"><label style="font-size:11px;font-weight:700;display:block;margin-bottom:6px">Tipo de División:</label><div style="display:flex;flex-direction:column;gap:8px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px"><input type="radio" name="division" value="equal" ${editTx?.divisionType==='equal'||!editTx?.divisionType?'checked':''} onchange="updateDivisionUI()"> 50/50 Equitativo</label><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px"><input type="radio" name="division" value="percent" ${editTx?.divisionType==='percent'?'checked':''} onchange="updateDivisionUI()"> Porcentaje</label><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px"><input type="radio" name="division" value="amount" ${editTx?.divisionType==='amount'?'checked':''} onchange="updateDivisionUI()"> Monto específico</label></div></div><div id="division-details"></div></div></div>`;
  
  h+=`<button class="bp" onclick="saveTx()">${window.editingTxId?'Guardar Cambios':'Guardar Transacción'}</button>`;
  
  $("modal-body").innerHTML=h;
  $("modal-title").textContent=window.editingTxId?'Editar Transacción':'Nueva Transacción';
  window.formState={tipo:editTx?.tipo||"ingreso",macro:editTx?.macro||"",sub:editTx?.sub||""};
  updateMacroList();
  if(editTx?.metodoPago==='Tarjeta Crédito')updateMetodoPago();
  if(editTx?.sharedWith)updateShareOptions();
  setTimeout(checkFormValid, 100);
}
function closeModal(){$("mo").classList.add("hidden");window.formState={};window.editingTxId=null}
function openSuperModal(){
  alert("Función en desarrollo - Próximamente podrás registrar compras de supermercado con importación desde PDF, Excel o copiar/pegar");
}
function openFeriaModal(){
  alert("Función en desarrollo - Próximamente podrás registrar compras de feria con importación desde PDF, Excel o copiar/pegar");
}
function setFormTipo(tipo){
  window.formState.tipo=tipo;
  window.formState.macro="";
  window.formState.sub="";
  document.querySelectorAll('.tipo-btn').forEach(btn=>btn.classList.remove('active'));
  document.querySelector(`.tipo-btn:nth-child(${tipo==="ingreso"?1:2})`).classList.add('active');
  updateMacroList();
  $("sub-section").classList.add("hidden");
  checkFormValid();
}
function updateMacroList(){
  const tipo=window.formState.tipo;
  let macros=tipo==="ingreso"?["Ingresos"]:["Gastos Fijos","Gastos Variables","Gastos Esporádicos"];
  let h=macros.map(m=>{const d=userCategories[m];return `<div class="select-option ${window.formState.macro===m?'active':''}" onclick="selectMacro('${m}')"><span class="opt-icon">${d.icon}</span><span class="opt-name">${m}</span></div>`}).join("");
  $("macro-list").innerHTML=h;
}
function selectMacro(macro){
  window.formState.macro=macro;
  const subs=userCategories[macro].subs||{};
  let h=Object.keys(subs).map(s=>{const d=subs[s];return `<div class="select-option ${window.formState.sub===s?'active':''}" onclick="selectSub('${s}')"><span class="opt-icon">${d.icon}</span><span class="opt-name">${s}</span></div>`}).join("");
  h+=`<div style="padding:12px;border-top:1px solid var(--border)"><button style="width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer" onclick="openAddSubCategory('${macro}')">+ Agregar subcategoría</button></div>`;
  $("sub-list").innerHTML=h;
  $("sub-section").classList.remove("hidden");
  checkFormValid();
}
function selectSub(sub){
  window.formState.sub=sub;
  checkFormValid();
}
function updateMetodoPago(){
  const metodo=$("tx-metodo")?.value;
  if(metodo==='Tarjeta Crédito'){
    $("tarjeta-section").classList.remove("hidden");
  }else{
    $("tarjeta-section").classList.add("hidden");
  }
  checkFormValid();
}
function checkFormValid(){
  const monto=$("tx-monto")?.value;
  const desc=$("tx-desc")?.value.trim();
  const fecha=$("tx-fecha")?.value;
  const metodo=$("tx-metodo")?.value;
  const macro=window.formState?.macro;
  const sub=window.formState?.sub;
  
  const isValid=monto&&desc&&fecha&&metodo&&macro&&sub;
  const saveBtn=document.querySelector('.bp');
  if(saveBtn){
    saveBtn.disabled=!isValid;
  }
}
document.addEventListener('input',()=>checkFormValid());
function calcularCuota(){const monto=parseInt($("tx-monto")?.value)||0;const cuotas=parseInt($("tx-cuotas")?.value)||1;const interes=parseFloat($("tx-interes")?.value)||0;if(monto>0&&cuotas>0){const tasa=interes/100/12;const valorCuota=tasa>0?monto*tasa*Math.pow(1+tasa,cuotas)/(Math.pow(1+tasa,cuotas)-1):monto/cuotas;$("cuota-calc").textContent=`Valor cuota: ${fmt(valorCuota)} (Total: ${fmt(valorCuota*cuotas)})`}}
function updateShareOptions(){
  const shareVal=document.querySelector('input[name="share"]:checked').value;
  const detailsDiv=$("share-details");
  if(shareVal==="yes"){
    detailsDiv.classList.remove("hidden");
    window.formState.sharedWith=$("share-user")?.value||'';
  }else{
    detailsDiv.classList.add("hidden");
    window.formState.sharedWith=null;
  }
}
function updateDivisionUI(){
  const divType=document.querySelector('input[name="division"]:checked').value;
  window.formState.divisionType=divType;
  let h=``;
  if(divType==="percent"){
    h=`<div><label style="font-size:11px;font-weight:700;display:block;margin-bottom:6px">Tu %:</label><input class="fi" id="div-tu" type="number" value="50" min="0" max="100" style="margin-bottom:0" oninput="updateDivisionCalc()"></div>`;
  }else if(divType==="amount"){
    h=`<div><label style="font-size:11px;font-weight:700;display:block;margin-bottom:6px">Ella paga:</label><input class="fi" id="div-amount" type="number" min="0" placeholder="$" style="margin-bottom:0" oninput="updateDivisionCalc()"></div>`;
  }
  $("division-details").innerHTML=h;
  updateDivisionCalc();
}
function updateDivisionCalc(){
  const divType=window.formState.divisionType;
  if(divType==="percent"){
    const tu=parseInt($("div-tu")?.value||50);
    window.formState.divisionPercent=tu;
  }else if(divType==="amount"){
    const su=parseInt($("div-amount")?.value||0);
    window.formState.divisionAmount=su;
  }
}
async function openAddSubCategory(macro){
  const icon=prompt("Ícono (emoji):");if(!icon)return;
  const name=prompt("Nombre:");if(!name)return;
  userCategories[macro].subs[name]={icon};
  await fbSave("categories",{_id:curUser.uid,...userCategories});
  toast("Categoría agregada");
  selectMacro(macro);
}
async function saveTx(){
  const monto=parseInt($("tx-monto")?.value);
  const desc=$("tx-desc")?.value.trim();
  const fecha=$("tx-fecha")?.value;
  const metodo=$("tx-metodo")?.value;
  
  if(!monto||!desc||!fecha||!window.formState.macro||!window.formState.sub||!metodo){
    toast("Completa todos los campos requeridos");
    return;
  }
  
  const txId=window.editingTxId;
  
  const data={
    uid:curUser.uid,
    descripcion:desc,
    monto,
    tipo:window.formState.tipo,
    fecha,
    macro:window.formState.macro,
    sub:window.formState.sub,
    metodoPago:metodo
  };
  
  if(userCategories[data.macro].subs[data.sub]){
    data.icon=userCategories[data.macro].subs[data.sub].icon;
  }
  
  if(metodo==='Tarjeta Crédito'){
    const banco=$("tx-banco")?.value||'';
    data.bancoPago=banco;
    data.cuotas=parseInt($("tx-cuotas")?.value)||null;
    data.interes=parseFloat($("tx-interes")?.value)||null;
  }
  
  if(window.formState.sharedWith){
    data.sharedWith=window.formState.sharedWith;
    data.divisionType=window.formState.divisionType||"equal";
    if(window.formState.divisionType==="percent")data.divisionPercent=window.formState.divisionPercent||50;
    if(window.formState.divisionType==="amount")data.divisionAmount=window.formState.divisionAmount||0;
    
    let amountOther=0;
    if(window.formState.divisionType==="equal"){
      amountOther=Math.round(monto/2);
    }else if(window.formState.divisionType==="percent"){
      const tuPorcentaje=window.formState.divisionPercent||50;
      amountOther=monto-Math.round(monto*tuPorcentaje/100);
    }else if(window.formState.divisionType==="amount"){
      amountOther=window.formState.divisionAmount||0;
    }
    
    const debtData={
      fromUid:window.formState.sharedWith,
      toUid:curUser.uid,
      amount:amountOther,
      descripcion:desc,
      fecha,
      divisionType:window.formState.divisionType||"equal",
      txId:txId||String(Date.now()),
      status:"pending"
    };
    await fbSave("debts",debtData);
  }
  
  try{
    if(txId){
      // Editar transacción existente
      await db.collection("transactions").doc(txId).set(data,{merge:true});
      const idx=txs.findIndex(t=>t._id===txId);
      if(idx>=0)txs[idx]={_id:txId,...data};
      toast("Transacción actualizada");
    }else{
      // Crear nueva transacción
      const docRef=await db.collection("transactions").add(data);
      txs.unshift({_id:docRef.id,...data});
      toast("Transacción guardada");
    }
    closeModal();
    await loadAll();
  }catch(err){
    console.error("Error al guardar:",err);
    toast("Error al guardar: "+err.message);
  }
}
function editTx(id){openModal(id)}

function delTx(id){showCo("Eliminar","¿Eliminar esta transacción?","Eliminar",async()=>{await fbDel("transactions",id);txs=txs.filter(t=>t._id!==id);toast("Eliminado");render()})}
async function markPaidDebt(debtId){await fbSave("debts",{_id:debtId,status:"paid",paidAt:new Date().toISOString()});debts=debts.map(d=>d._id===debtId?{...d,status:"paid"}:d);toast("Pago registrado");render()}

</script>
