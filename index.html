<div id="login-screen" class="login-bg">

function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(n){return n?n.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}

function validateLoginForm(){const rut=$("l-rut").value.trim();const pass=$("l-pass").value;$("login-btn").disabled=!(rut&&pass&&pass.length>=6)}
function validateRegisterForm(){const name=$("r-name").value.trim();const rut=$("r-rut").value.trim();const pass=$("r-pass").value;const pass2=$("r-pass2").value;$("register-btn").disabled=!(name&&rut&&pass&&pass2&&pass.length>=6&&pass===pass2)}

function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
  validateLoginForm();validateRegisterForm();
}

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;const btn=$("register-btn");
  if(!name||!rut||!pass||!pass2){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contraseña minimo 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contraseñas no coinciden";return}
  btn.disabled=true;btn.textContent="Creando...";$("r-err").textContent="";
  try{
    const cred=await auth.createUserWithEmailAndPassword(rutToEmail(rut),pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection("categories").doc(cred.user.uid).set({...DEFAULT_CATEGORIES});
    toast("Cuenta creada");switchTab("login");
    btn.disabled=false;btn.textContent="Crear Cuenta";
  }catch(e){
    $("r-err").textContent=e.code==="auth/email-already-in-use"?"RUT ya registrado":e.message;
    btn.disabled=false;btn.textContent="Crear Cuenta";
  }
}

async function doLogin(){
  const rut=$("l-rut").value.trim(),pass=$("l-pass").value;const btn=$("login-btn");
  if(!rut||!pass){$("l-err").textContent="Completa todos los campos";return}
  btn.disabled=true;btn.textContent="Ingresando...";$("l-err").textContent="";
  try{
    await auth.signInWithEmailAndPassword(rutToEmail(rut),pass);
  }catch(e){
    $("l-err").textContent=e.code==="auth/user-not-found"?"RUT no registrado":e.code==="auth/wrong-password"?"Contraseña incorrecta":"Error al ingresar";
    btn.disabled=false;btn.textContent="Ingresar";
  }
}

function doLogout(){auth.signOut()}

auth.onAuthStateChanged(async user=>{
  if(user){
    curUser=user;
    const doc=await db.collection("users").doc(user.uid).get();
    curProfile=doc.exists?doc.data():{name:"Usuario"};
    const usersSnap=await db.collection("users").get();
    allUsers=usersSnap.docs.map(d=>({uid:d.id,...d.data()}));
    $("login-screen").classList.add("hidden");
    $("app-screen").classList.remove("hidden");
    $("sb-name").textContent=curProfile.name;
    $("sb-avatar").textContent=getInitial(curProfile.name);
    await loadAll();
  }else{
    curUser=null;
    $("login-screen").classList.remove("hidden");
    $("app-screen").classList.add("hidden");
  }
});

async function fbLoad(col,filter=null){try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}}
async function fbSave(col,data){try{const id=data._id||String(Date.now());const d={...data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(id).set(d,{merge:true});return id}catch(e){console.error(e);return null}}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete()}catch(e){console.error(e)}}

async function loadAll(){
  const uid=curUser.uid;
  const catDoc=await db.collection("categories").doc(uid).get();
  userCategories=catDoc.exists?catDoc.data():{...DEFAULT_CATEGORIES};
  
  let txsRaw=await fbLoad("transactions",{f:"uid",v:uid});
  txs=txsRaw.map(tx=>{
    if(!tx.tipo)tx.tipo=tx.amount>0?"ingreso":"egreso";
    if(!tx.monto)tx.monto=Math.abs(tx.amount||0);
    if(!tx.macro&&tx.cat){
      const isExp=tx.amount<0;
      tx.macro=!isExp?"Ingresos":["food","transport","shopping","health","entertainment","emergency","other_exp"].includes(tx.cat)?"Gastos Variables":"Gastos Fijos";
    }
    if(!tx.sub&&tx.cat){
      const m={food:"Supermercado",transport:"Combustible Auto",shopping:"Supermercado",health:"Salud",entertainment:"Deporte",emergency:"Emergencia",housing:"Arriendo",services:"Servicio Internet/TV",salary:"Sueldo Fijo Mensual"};
      tx.sub=m[tx.cat]||"Otros";
    }
    if(!tx.icon&&tx.macro&&userCategories[tx.macro]?.subs[tx.sub]){
      tx.icon=userCategories[tx.macro].subs[tx.sub].icon;
    }
    return tx;
  }).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  
  debts=await fbLoad("debts",{f:"fromUid",v:uid});
  render();
}

function buildMN(){$("mob-nav").innerHTML=VIEWS.map(v=>`<button class="${curView===v.id?'active':''}" onclick="nav('${v.id}')"><span class="mi">${v.e}</span></button>`).join("")}

function render(){
  $("header-date").textContent=new Date().toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"});

  $("header-title").textContent=t[curView]||"";
  buildSB();buildMN();
  $("vc").innerHTML={dashboard:rDash,cashflow:rCashFlow,movimientos:rMov,tarjetas:rTarjetas,deudas:rDeudas,settings:rSettings}[curView]();

function rDash(){
  const b=bal();const i=totI();const e=totE();
  let h=`<div class="sg sg4"><div class="sc" style="border-left-color:#10b981"><div class="inn"><span class="lbl">BALANCE</span><p class="val" style="color:${b>=0?'#10b981':'#f43f5e'}">${fmt(b)}</p><p class="sub" style="color:${b>=0?'#10b981':'#f43f5e'}">${b>=0?'✓ Positivo':'✗ Negativo'}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#10b981"><div class="inn"><span class="lbl">INGRESOS</span><p class="val">${fmt(i)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#f43f5e"><div class="inn"><span class="lbl">EGRESOS</span><p class="val">${fmt(e)}</p></div></div>`;
  h+=`<div class="sc" style="border-left-color:#a855f7"><div class="inn"><span class="lbl">MOVIMIENTOS</span><p class="val">${txs.length}</p></div></div></div>`;
  h+=`<div class="card"><h3 class="card-t">📜 Últimas Transacciones</h3>`;
  if(txs.length===0)h+=`<p style="color:var(--t3);text-align:center;padding:20px">Sin movimientos</p>`;
  else{h+=txs.slice(0,5).map((tx,i)=>{const neg=tx.tipo==="egreso";const metodoEmoji={'Efectivo':'💵','Tarjeta Débito':'💳','Tarjeta Crédito':'💳','Transferencia Bancaria':'🏦','Cheque':'📄','Otra':'📌'}[tx.metodoPago]||'📌';return `<div class="tr" style="animation-delay:${i*.05}s"><div class="left"><span class="emoji-i">${tx.icon||'📋'}</span><div><p class="desc">${tx.descripcion}</p><p class="date">${tx.fecha} ${metodoEmoji}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.monto)}</p></div></div>`}).join("")}
  h+=`</div>`;
  return h;
}

function rCashFlow(){
  const today=new Date().toISOString().slice(0,7);const months=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()+i);months.push(d.toISOString().slice(0,7))}
  const proj=months.map(m=>{const txM=txs.filter(t=>(t.fecha||"").startsWith(m));const inc=txM.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);const exp=txM.filter(t=>t.tipo==="egreso").reduce((s,t)=>s+t.monto,0);return{m,inc,exp,saldo:inc-exp}});
  let h=`<div class="card"><h3 class="card-t">📊 Proyección 12 meses</h3><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:10px"><tr style="background:#f1f5f9"><th style="padding:8px;text-align:left;font-weight:700;border:1px solid var(--border)">Mes</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">Ingresos</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">Egresos</th><th style="padding:8px;text-align:right;border:1px solid var(--border)">SALDO</th></tr>`;
  proj.forEach(p=>{const isNow=p.m===today;h+=`<tr style="background:${isNow?'#0ea5e908':''}"><td style="padding:8px;border:1px solid var(--border);font-size:11px">${p.m}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:var(--green);font-weight:600;font-size:11px">${fmt(p.inc)}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:var(--red);font-weight:600;font-size:11px">${fmt(p.exp)}</td><td style="padding:8px;border:1px solid var(--border);text-align:right;color:${p.saldo>=0?'var(--green)':'var(--red)'};font-weight:700;font-size:11px">${fmt(p.saldo)}</td></tr>`});
  h+=`</table></div>`;
  return h;
}

function rMov(){
  if(txs.length===0)return `<div class="es"><div class="ei">📭</div><p class="et">Sin movimientos</p></div>`;
  let h=`<div style="margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">${txs.length} transacciones</p></div>`;
  h+=txs.map((tx,i)=>{const neg=tx.tipo==="egreso";const metodoEmoji={'Efectivo':'💵','Tarjeta Débito':'💳','Tarjeta Crédito':'💳','Transferencia Bancaria':'🏦','Cheque':'📄','Otra':'📌'}[tx.metodoPago]||'📌';return `<div class="tr" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${tx.icon||'📋'}</span><div><p class="desc">${tx.descripcion}</p><p class="date">${tx.fecha} • ${tx.macro}/${tx.sub} ${metodoEmoji}</p></div></div><div class="right"><p class="amt ${neg?'neg':'pos'}">${neg?'-':'+'} ${fmt(tx.monto)}</p><button class="ib edit" onclick="editTx('${tx._id}')">✏️</button><button class="ib del" onclick="delTx('${tx._id}')">🗑️</button></div></div>`}).join("");
  return h;
}

function rTarjetas(){
  const tarjetaTxs=txs.filter(t=>t.metodoPago==='Tarjeta Crédito');
  const byBanco={};
  tarjetaTxs.forEach(tx=>{const banco=tx.bancoPago||'Otra';if(!byBanco[banco])byBanco[banco]={monto:0,cuotas:[],txs:[]};byBanco[banco].monto+=tx.monto;if(tx.cuotas)byBanco[banco].cuotas.push(tx.cuotas);byBanco[banco].txs.push(tx)});
  
  const sharedTxs=txs.filter(t=>t.sharedWith);
  
  let h=`<div style="margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">Estado de tus tarjetas de crédito</p></div>`;
  Object.entries(byBanco).forEach(([banco,data])=>{
    const slug=banco.toLowerCase().replace(/\s+/g,'');
    h+=`<div class="tarjeta-card ${slug}"><div><div class="tarjeta-header">${banco}</div><div class="tarjeta-saldo">Saldo pendiente</div><div class="tarjeta-amount">${fmt(data.monto)}</div><div class="tarjeta-cuotas">${data.txs.length} compras • ${data.cuotas.length} con cuotas</div></div><div class="tarjeta-actions"><button onclick="nav('movimientos')">Ver transacciones</button></div></div>`;
  });
  
  if(tarjetaTxs.length===0)h+=`<div class="es"><div class="ei">💳</div><p class="et">No tienes compras con tarjeta crédito</p></div>`;
  
  h+=`<div style="margin-top:28px;margin-bottom:14px"><p style="font-size:13px;color:var(--t3)">Gastos compartidos</p></div>`;
  if(sharedTxs.length===0){
    h+=`<div class="es"><div class="ei">🤝</div><p class="et">No tienes gastos compartidos</p></div>`;
  }else{
    h+=`<div class="card"><h3 class="card-t">🤝 Tus Gastos Compartidos (${sharedTxs.length})</h3>`;
    sharedTxs.forEach((tx,i)=>{
      const otherUser=getUserName(tx.sharedWith);
      const divInfo=tx.divisionType==='equal'?'50/50':tx.divisionType==='percent'?tx.divisionPercent+'%':'Monto específico';
      let amountOther=0;
      if(tx.divisionType==='equal'){amountOther=Math.round(tx.monto/2)}else if(tx.divisionType==='percent'){amountOther=tx.monto-Math.round(tx.monto*tx.divisionPercent/100)}else if(tx.divisionType==='amount'){amountOther=tx.divisionAmount}
      const tuMonto=tx.monto-amountOther;
      h+=`<div class="tr" style="animation-delay:${i*.03}s"><div class="left"><span class="emoji-i">${tx.icon||'📋'}</span><div><p class="desc">${tx.descripcion}</p><p class="date">${tx.fecha} • Con ${otherUser}</p><p style="font-size:10px;color:var(--t3);margin-top:2px">División: ${divInfo}</p></div></div><div class="right" style="flex-direction:column;align-items:flex-end"><p style="font-size:12px;font-weight:700;color:var(--t1)">Total: ${fmt(tx.monto)}</p><p style="font-size:11px;color:var(--green);font-weight:600">Tu parte: ${fmt(tuMonto)}</p><p style="font-size:11px;color:var(--orange);font-weight:600">${otherUser}: ${fmt(amountOther)}</p></div></div>`;
    });
    h+=`</div>`;
  }
  
  return h;
}

function rDeudas(){
  const iOwe=debts.filter(d=>d.status==="pending");
  if(iOwe.length===0)return `<div class="card"><h3 class="card-t">🤝 Deudas Compartidas</h3><p style="color:var(--t3);text-align:center;padding:20px">✓ No hay gastos compartidos pendientes</p></div>`;
  let h=`<div class="card"><h3 class="card-t">🤝 Debo Pagar (${iOwe.length})</h3>`;
  iOwe.forEach(d=>{const userName=getUserName(d.toUid);const divInfo=d.divisionType==="equal"?"50/50":d.divisionType==="percent"?d.divisionPercent+"%":"Monto específico";h+=`<div style="padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><p style="font-size:12px;font-weight:700">👤 ${userName}</p><p style="font-size:11px;color:var(--t3)">${d.fecha}</p></div><p style="font-size:11px;color:var(--t3);margin-bottom:8px">${d.descripcion} • División: ${divInfo}</p><p style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">Debes: ${fmt(d.amount)}</p><button style="width:100%;padding:8px;border:none;border-radius:8px;background:var(--green);color:#fff;font-size:12px;font-weight:700;cursor:pointer" onclick="markPaidDebt('${d._id}')">✓ Confirmar Pago</button></div>`});
  h+=`</div>`;
  return h;
}

function rSettings(){
  let h=`<h2 style="font-size:18px;font-weight:700;margin-bottom:18px">Gestionar Categorías</h2>`;
  Object.entries(userCategories).forEach(([macro,data])=>{
    h+=`<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 class="card-t" style="margin-bottom:0"><span>${data.icon}</span> ${macro}</h3><button style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer" onclick="openAddSubCategory('${macro}')">+ Categoría</button></div>`;

    });
    h+=`</div></div>`;
  });
  return h;
}

  if(editTx?.metodoPago==='Tarjeta Crédito')updateMetodoPago();
}

function setFormTipo(tipo){window.formState.tipo=tipo;window.formState.macro="";window.formState.sub="";document.querySelectorAll('.tipo-btn').forEach(btn=>btn.classList.remove('active'));document.querySelector(`.tipo-btn:nth-child(${tipo==="ingreso"?1:2})`).classList.add('active');updateMacroList();$("sub-section").classList.add("hidden")}

function updateMacroList(){
  const tipo=window.formState.tipo;
  let macros=tipo==="ingreso"?["Ingresos"]:["Gastos Fijos","Gastos Variables","Gastos Esporádicos"];
  let h=macros.map(m=>{const d=userCategories[m];return `<div class="select-option ${window.formState.macro===m?'active':''}" onclick="selectMacro('${m}')"><span class="opt-icon">${d.icon}</span><span class="opt-name">${m}</span></div>`}).join("");
  $("macro-list").innerHTML=h;
}

function selectMacro(macro){
  window.formState.macro=macro;
  const subs=userCategories[macro].subs||{};
  let h=Object.keys(subs).map(s=>{const d=subs[s];return `<div class="select-option ${window.formState.sub===s?'active':''}" onclick="selectSub('${s}')"><span class="opt-icon">${d.icon}</span><span class="opt-name">${s}</span></div>`}).join("");
  $("sub-list").innerHTML=h+`<div style="padding:12px;border-top:1px solid var(--border)"><button style="width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer" onclick="openAddSubCategory('${macro}')">+ Agregar subcategoría</button></div>`;
  $("sub-section").classList.remove("hidden");
}

function selectSub(sub){window.formState.sub=sub}

function updateMetodoPago(){const metodo=$("tx-metodo")?.value;if(metodo==='Tarjeta Crédito'){$("tarjeta-section").classList.remove("hidden")}else{$("tarjeta-section").classList.add("hidden")}}

function calcularCuota(){const monto=parseInt($("tx-monto")?.value)||0;const cuotas=parseInt($("tx-cuotas")?.value)||1;const interes=parseFloat($("tx-interes")?.value)||0;if(monto>0&&cuotas>0){const tasa=interes/100/12;const valorCuota=tasa>0?monto*tasa*Math.pow(1+tasa,cuotas)/(Math.pow(1+tasa,cuotas)-1):monto/cuotas;$("cuota-calc").textContent=`Valor cuota: ${fmt(valorCuota)} (Total: ${fmt(valorCuota*cuotas)})`}}

function updateShareOptions(){const shareVal=document.querySelector('input[name="share"]:checked').value;const detailsDiv=$("share-details");if(shareVal==="yes"){detailsDiv.classList.remove("hidden");window.formState.sharedWith=$("share-user")?.value||''}else{detailsDiv.classList.add("hidden");window.formState.sharedWith=null}}

function updateDivisionUI(){const divType=document.querySelector('input[name="division"]:checked').value;window.formState.divisionType=divType;let h=``;if(divType==="percent"){h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label style="font-size:10px;font-weight:700;display:block;margin-bottom:4px">Tu %:</label><input class="fi" id="div-tu" type="number" value="50" min="0" max="100" style="margin-bottom:0" oninput="syncPercent()"></div><div><label style="font-size:10px;font-weight:700;display:block;margin-bottom:4px">Su %:</label><input class="fi" id="div-su" type="number" value="50" min="0" max="100" style="margin-bottom:0" oninput="syncPercent()"></div></div><p id="percent-calc" style="font-size:10px;color:var(--t3);margin-top:8px"></p>`}else if(divType==="amount"){h=`<div><label style="font-size:10px;font-weight:700;display:block;margin-bottom:6px">Ella paga:</label><input class="fi" id="div-amount" type="number" min="0" placeholder="$" style="margin-bottom:0" oninput="calcAmount()"></div><p id="amount-calc" style="font-size:10px;color:var(--t3);margin-top:8px"></p>`}$("division-details").innerHTML=h;updateDivisionCalc()}

function syncPercent(){const tu=parseInt($("div-tu")?.value||0);const su=100-tu;$("div-su").value=su;updateDivisionCalc()}
function calcAmount(){updateDivisionCalc()}

function updateDivisionCalc(){const monto=parseInt($("tx-monto")?.value)||0;const divType=window.formState.divisionType;if(divType==="percent"){const tu=parseInt($("div-tu")?.value||50);const tuMonto=Math.round(monto*tu/100);const suMonto=monto-tuMonto;$("percent-calc").textContent=`Tu parte: ${fmt(tuMonto)} | Su parte: ${fmt(suMonto)}`;window.formState.divisionPercent=tu}else if(divType==="amount"){const suMonto=parseInt($("div-amount")?.value||0);const tuMonto=monto-suMonto;$("amount-calc").textContent=`Tu parte: ${fmt(tuMonto)} | Su parte: ${fmt(suMonto)}`;window.formState.divisionAmount=suMonto}else{const mitad=Math.round(monto/2);const percentCalc=$("percent-calc");if(percentCalc)percentCalc.textContent=`Tu parte: ${fmt(mitad)} | Su parte: ${fmt(monto-mitad)}`}}

async function openAddSubCategory(macro){
  const icon=prompt("Ícono (emoji):");if(!icon)return;
  const name=prompt("Nombre de la categoría:");if(!name)return;
  userCategories[macro].subs[name]={icon,recurrente:false};
  await fbSave("categories",{_id:curUser.uid,...userCategories});
  toast("Categoría agregada");
  if(window.formState.macro===macro){selectMacro(macro)}else{render()}
}

async function saveTx(){
  const monto=parseInt($("tx-monto")?.value);const desc=$("tx-desc")?.value.trim();const fecha=$("tx-fecha")?.value;const metodo=$("tx-metodo")?.value;
  if(!monto||!desc||!fecha||!window.formState.macro||!window.formState.sub||!metodo)return toast("Completa todos los campos");
  const data={uid:curUser.uid,descripcion:desc,monto,tipo:window.formState.tipo,fecha,macro:window.formState.macro,sub:window.formState.sub,metodoPago:metodo};
  if(window.editingTxId)data._id=window.editingTxId;
  if(userCategories[data.macro].subs[data.sub]){data.icon=userCategories[data.macro].subs[data.sub].icon}
  if(metodo==='Tarjeta Crédito'){data.bancoPago=$("tx-banco")?.value;data.cuotas=parseInt($("tx-cuotas")?.value)||null;data.interes=parseFloat($("tx-interes")?.value)||null}
  if(window.formState.sharedWith){data.sharedWith=window.formState.sharedWith;data.divisionType=window.formState.divisionType;if(window.formState.divisionType==="percent")data.divisionPercent=window.formState.divisionPercent;if(window.formState.divisionType==="amount")data.divisionAmount=window.formState.divisionAmount;let amountOther=0;if(window.formState.divisionType==="equal"){amountOther=Math.round(monto/2)}else if(window.formState.divisionType==="percent"){const tuPorcentaje=window.formState.divisionPercent;amountOther=monto-Math.round(monto*tuPorcentaje/100)}else if(window.formState.divisionType==="amount"){amountOther=window.formState.divisionAmount}
    const debtData={fromUid:window.formState.sharedWith,toUid:curUser.uid,amount:amountOther,descripcion:desc,fecha,divisionType:window.formState.divisionType,txId:data._id||String(Date.now()),status:"pending"};await fbSave("debts",debtData)}
  const id=await fbSave("transactions",data);
  if(id){
    if(window.editingTxId){const idx=txs.findIndex(t=>t._id===window.editingTxId);if(idx>=0)txs[idx]={_id:id,...data};toast("Transacción actualizada")}else{txs.unshift({_id:id,...data});toast("Transacción guardada")}
    closeModal();await loadAll();
  }
}

function editTx(id){openModal(id)}
function delTx(id){showCo("Eliminar","¿Eliminar esta transacción?","Eliminar",async()=>{await fbDel("transactions",id);txs=txs.filter(t=>t._id!==id);toast("Eliminado");render()})}
async function markPaidDebt(debtId){await fbSave("debts",{_id:debtId,status:"paid",paidAt:new Date().toISOString()});debts=debts.map(d=>d._id===debtId?{...d,status:"paid"}:d);toast("Pago registrado");render()}
</script>
</body>
</html>
