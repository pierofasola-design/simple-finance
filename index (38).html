<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;width:100%}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* LOGIN */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo .icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo .text{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
.login-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--t3)}
.login-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fi{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:12px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1);outline:none}
.bp{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}.bp:active{transform:scale(.97)}.bp:disabled{opacity:.5;cursor:not-allowed}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px}

/* APP */
.app{width:100%;min-height:100vh;background:var(--bg);display:flex}
.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;cursor:pointer;transition:all .15s;text-align:left}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px;display:flex;align-items:center;gap:10px}
.sf-user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logout-btn{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}.logout-btn:hover{background:#1e293b;color:#e2e8f0}

/* MAIN */
.main{flex:1;overflow:auto;padding:28px 36px 30px;width:100%}
.main-inner{max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--t1);margin-top:2px}

/* GRID */
.sg{display:grid;gap:12px;margin-bottom:22px}.sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
.sc{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}.sc .inn{padding:18px 16px}
.sc .lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}.sc .val{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--t1);margin-top:6px}.sc .sub{font-size:11px;font-weight:600;margin-top:4px}
.card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(14,165,233,.35);z-index:50;cursor:pointer}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0}
.mb{background:#fff;width:520px;max-width:95%;max-height:90vh;overflow-y:auto;border-radius:22px;padding:26px 22px 34px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;margin:20px 0}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt-t{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--t1)}
.mc{width:34px;height:34px;border-radius:10px;background:#f1f5f9;border:none;font-size:16px;color:var(--t2);cursor:pointer}

/* TOGGLE */
.tt{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:16px;gap:2px}
.tb{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.tb.ae{background:#f43f5e15;color:#f43f5e}.tb.ai{background:#10b98115;color:#10b981}.tb.off{background:transparent;color:#94a3b8}

/* SECTION */
.section{margin-bottom:18px;padding:14px;border-radius:12px;background:#f8fafc;border:1px solid var(--border)}
.section-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

/* SELECT */
.select-group{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.select-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;background:#fff}
.select-option:last-child{border-bottom:none}.select-option:hover{background:#f1f5f9}.select-option.active{background:#0ea5e908;border-left:3px solid var(--accent)}.select-option .opt-icon{font-size:16px}.select-option .opt-name{font-size:12px;font-weight:600;color:var(--t1)}.select-option .opt-desc{font-size:10px;color:var(--t3);margin-left:auto}

/* DIVISION OPTIONS */
.div-opt{padding:10px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.div-opt:hover{background:#f1f5f9;border-color:var(--accent)}.div-opt.selected{background:#0ea5e908;border-color:var(--accent)}.div-opt input[type="radio"]{cursor:pointer}

/* TOAST & CONFIRM */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:999;background:#0f172a;color:#38bdf8;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid #1e293b;animation:fadeIn .3s ease-out}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.cbox{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .25s ease-out;text-align:center}
.cbox h3{font-size:18px;font-weight:700;margin-bottom:8px}.cbox p{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.cbtns{display:flex;gap:10px}.cbtns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.cbtn-c{background:#f1f5f9;color:var(--t2)}.cbtn-d{background:var(--red);color:#fff}

/* HIDDEN */
.hidden{display:none!important}

/* RESPONSIVE */
@media(max-width:767px){
  .app{flex-direction:column}.sidebar{display:none}.main{padding:16px 12px 90px}
  .mb{width:95%;max-width:100%;max-height:85vh;padding:16px 12px 24px}
  .fab{bottom:75px;right:12px;width:48px;height:48px;font-size:20px}
  .mob-nav{display:flex!important;position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);padding:6px 0 8px;z-index:40;justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .mob-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;font-weight:700;color:var(--t3);padding:4px 6px;cursor:pointer}
  .mob-nav button.active{color:var(--accent)}.mob-nav button .mi{font-size:14px}
}
@media(min-width:768px) and (max-width:1024px){
  .sidebar{width:80px;padding:16px 8px}.logo-text{display:none}.sidebar-btn span:last-of-type{display:none}
  .main{padding:20px 16px;flex:1}.mb{width:500px;max-width:90%}.mob-nav{display:none}
}
@media(min-width:1025px){
  .sidebar{width:220px;padding:24px 14px}.logo-text{display:block}.sidebar-btn span:last-of-type{display:block}
  .mb{width:520px;max-width:95%}.mob-nav{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-bg">
<div class="login-card">
  <div class="login-logo"><div class="icon">S</div><span class="text">SimpleFinance</span></div>
  <div class="login-tabs">
    <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
    <button class="login-tab" id="tab-register" onclick="switchTab('register')">Crear</button>
  </div>
  <div id="login-form">
    <input class="fi" id="l-rut" placeholder="RUT (ej: 12345678-9)" oninput="validateLoginForm()">
    <input class="fi" id="l-pass" type="password" placeholder="Contrasena" oninput="validateLoginForm()">
    <p class="login-err" id="l-err"></p>
    <button class="bp" id="login-btn" onclick="doLogin()" disabled>Ingresar</button>
  </div>
  <div id="register-form" class="hidden">
    <input class="fi" id="r-name" placeholder="Nombre completo" oninput="validateRegisterForm()">
    <input class="fi" id="r-rut" placeholder="RUT (ej: 12345678-9)" oninput="validateRegisterForm()">
    <input class="fi" id="r-pass" type="password" placeholder="Contrasena (min 6)" oninput="validateRegisterForm()">
    <input class="fi" id="r-pass2" type="password" placeholder="Confirmar" oninput="validateRegisterForm()">
    <p class="login-err" id="r-err"></p>
    <button class="bp" id="register-btn" onclick="doRegister()" disabled>Crear Cuenta</button>
  </div>
</div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden" style="width:100%">
<div class="app" id="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo-wrap"><div class="logo-icon">S</div><span class="logo-text">SF</span></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="sf-user"><div class="avatar" id="sb-avatar">P</div><div><p style="font-size:12px;font-weight:700;color:#e2e8f0" id="sb-name">User</p></div></div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <div class="main" id="main">
    <div class="main-inner">
      <header class="header"><div><p class="header-date" id="header-date"></p><h1 class="header-title" id="header-title">Mi Resumen</h1></div></header>
      <div id="vc"></div>
    </div>
  </div>
</div>
<div class="mob-nav hidden" id="mob-nav"></div>
<button class="fab" id="fab-btn" onclick="openModal()">+</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- MODAL -->
<div class="mo hidden" id="mo" onclick="if(event.target.id==='mo')closeModal()">
<div class="mb" onclick="event.stopPropagation()">
<div class="mh"><h3 class="mt-t" id="modal-title">Nueva Transaccion</h3><button class="mc" onclick="closeModal()">✕</button></div>
<div id="modal-body"></div>
</div>
</div>

<!-- CONFIRM -->
<div class="co hidden" id="co"><div class="cbox"><h3 id="co-t">Confirmar</h3><p id="co-m"></p><div class="cbtns"><button class="cbtn-c" onclick="closeCo()">Cancelar</button><button class="cbtn-d" id="co-a" onclick="execCo()">OK</button></div></div></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyAO4e9V_t9oyE_rrWJg9smeD4X6GPHSJ6w",authDomain:"simple-finance-5cd8d.firebaseapp.com",projectId:"simple-finance-5cd8d",storageBucket:"simple-finance-5cd8d.firebasestorage.app",messagingSenderId:"440080124392",appId:"1:440080124392:web:80a8be866c8aab6359fc5d"});
const db=firebase.firestore();const auth=firebase.auth();

// CATEGORIAS JERARQUICAS (3 NIVELES)
const CATEGORIAS={
  Ingresos:{icon:"💰",subs:{
    "sueldo-fijo":{name:"Sueldo Fijo",icon:"💵",recurrente:true},
    "comisiones":{name:"Comisiones",icon:"📊",recurrente:false},
    "bonos":{name:"Bonos",icon:"🎁",recurrente:false},
    "utilidades":{name:"Utilidades",icon:"📈",recurrente:false},
    "negocios":{name:"Negocios",icon:"🏪",recurrente:false}
  }},
  "Gastos-Fijos":{icon:"📌",subs:{
    "arriendo":{name:"Arriendo",icon:"🏠",recurrente:true},
    "dividendo":{name:"Dividendo",icon:"🏢",recurrente:true},
    "luz":{name:"Luz",icon:"⚡",recurrente:true},
    "agua":{name:"Agua",icon:"💧",recurrente:true},
    "gas":{name:"Gas",icon:"🔥",recurrente:true},
    "internet":{name:"Internet/TV",icon:"📶",recurrente:true},
    "telefono":{name:"Telefono",icon:"📱",recurrente:true},
    "creditos":{name:"Creditos",icon:"💳",recurrente:true}
  }},
  "Gastos-Variables":{icon:"📉",subs:{
    "tarjeta-credito":{name:"Tarjeta Credito",icon:"💳",recurrente:false,bancos:["Santander","BCI","Scotiabank","BBVA","Itau","Falabella","Paris","Ripley"]},
    "supermercado":{name:"Supermercado",icon:"🛒",recurrente:false},
    "farmacia":{name:"Farmacia",icon:"💊",recurrente:false},
    "salud":{name:"Salud",icon:"🏥",recurrente:false},
    "deporte":{name:"Deporte",icon:"⚽",recurrente:false},
    "estacionamiento":{name:"Estacionamiento",icon:"🅿️",recurrente:false},
    "bencina":{name:"Bencina",icon:"⛽",recurrente:false},
    "patentes":{name:"Patentes",icon:"📋",recurrente:false},
    "contribuciones":{name:"Contribuciones",icon:"📄",recurrente:false},
    "impuestos":{name:"Impuestos",icon:"🏛️",recurrente:false},
    "otros":{name:"Otros",icon:"📦",recurrente:false}
  }},
  Inversiones:{icon:"🌱",subs:{
    "fondo-mutuo":{name:"Fondo Mutuo",icon:"📊",recurrente:false},
    "dap":{name:"DAP",icon:"🎯",recurrente:false},
    "apv":{name:"APV",icon:"🏦",recurrente:false},
    "acciones":{name:"Acciones",icon:"📈",recurrente:false},
    "crypto":{name:"Crypto",icon:"₿",recurrente:false}
  }}
};

const VIEWS=[{id:"dashboard",l:"Dashboard",e:"🏠"},{id:"cashflow",l:"Flujo Caja",e:"📊"},{id:"movimientos",l:"Movimientos",e:"↕️"},{id:"deudas",l:"Deudas",e:"🤝"},{id:"creditos",l:"Creditos",e:"💳"},{id:"comparador",l:"Comparador",e:"⚖️"},{id:"inversiones",l:"Inversiones",e:"🌱"}];

let curUser=null,curProfile=null,allUsers=[];let txs=[],credits=[],quotes=[],investments=[],debts=[];
let curView="dashboard",editId=null,coCb=null;

const fmt=n=>"$"+Math.abs(n).toLocaleString("es-CL");const $=id=>document.getElementById(id);
const bal=()=>txs.reduce((s,t)=>s+t.amount,0);const totI=()=>txs.filter(t=>t.amount>0&&t.macro==="Ingresos").reduce((s,t)=>s+t.amount,0);
const totE=()=>txs.filter(t=>t.amount<0&&t.macro!=="Ingresos"&&t.macro!=="Inversiones").reduce((s,t)=>s+t.amount,0);

function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}
function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(n){return n?n.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}
function getOtherUsers(){return allUsers.filter(u=>u.uid!==curUser.uid)}

// AUTH
function validateLoginForm(){const rut=$("l-rut").value.trim();const pass=$("l-pass").value;const btn=$("login-btn");btn.disabled=!(rut&&pass&&pass.length>=6)}
function validateRegisterForm(){const name=$("r-name").value.trim();const rut=$("r-rut").value.trim();const pass=$("r-pass").value;const pass2=$("r-pass2").value;const btn=$("register-btn");btn.disabled=!(name&&rut&&pass&&pass2&&pass.length>=6&&pass===pass2)}

function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
  validateLoginForm();validateRegisterForm();
}

async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;const btn=$("register-btn");
  if(!name||!rut||!pass||!pass2){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contrasena minimo 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contrasenas no coinciden";return}
  btn.disabled=true;btn.textContent="Creando...";$("r-err").textContent="";
  try{
    const cred=await auth.createUserWithEmailAndPassword(rutToEmail(rut),pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast("Cuenta creada");switchTab("login");
  }catch(e){
    $("r-err").textContent=e.code==="auth/email-already-in-use"?"RUT ya registrado":e.message;
    btn.disabled=false;btn.textContent="Crear Cuenta";
  }
}

async function doLogin(){
  const rut=$("l-rut").value.trim(),pass=$("l-pass").value;const btn=$("login-btn");
  if(!rut||!pass){$("l-err").textContent="Completa todos los campos";return}
  btn.disabled=true;btn.textContent="Ingresando...";$("l-err").textContent="";
  try{
    await auth.signInWithEmailAndPassword(rutToEmail(rut),pass);
  }catch(e){
    $("l-err").textContent=e.code==="auth/user-not-found"?"RUT no registrado":e.code==="auth/wrong-password"?"Contrasena incorrecta":"Error al ingresar";
    btn.disabled=false;btn.textContent="Ingresar";
  }
}

function doLogout(){auth.signOut()}

auth.onAuthStateChanged(async user=>{
  if(user){
    curUser=user;
    const doc=await db.collection("users").doc(user.uid).get();
    curProfile=doc.exists?doc.data():{name:"Usuario"};
    const usersSnap=await db.collection("users").get();
    allUsers=usersSnap.docs.map(d=>({uid:d.id,...d.data()}));
    $("login-screen").classList.add("hidden");
    $("app-screen").classList.remove("hidden");
    $("sb-name").textContent=curProfile.name;
    $("sb-avatar").textContent=getInitial(curProfile.name);
    await loadAll();
  }else{
    curUser=null;
    $("login-screen").classList.remove("hidden");
    $("app-screen").classList.add("hidden");
  }
});

// FIREBASE
async function fbLoad(col,filter=null){try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}}
async function fbSave(col,data){try{const id=data._id||String(Date.now());const d={...data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(id).set(d,{merge:true});return id}catch(e){return null}}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete()}catch(e){}}

async function loadAll(){
  const uid=curUser.uid;
  txs=(await fbLoad("transactions",{f:"uid",v:uid})).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  credits=await fbLoad("credits",{f:"uid",v:uid});
  quotes=await fbLoad("quotes",{f:"uid",v:uid});
  investments=await fbLoad("investments",{f:"uid",v:uid});
  const d1=await fbLoad("debts",{f:"fromUid",v:uid});
  const d2=await fbLoad("debts",{f:"toUid",v:uid});
  debts=[...d1,...d2].filter((d,i,a)=>a.findIndex(x=>x._id===d._id)===i);
  render();
}

// NAV & RENDER
function nav(v){curView=v;render()}
function buildSB(){$("sidebar-nav").innerHTML=VIEWS.map(v=>`<button class="sidebar-btn ${curView===v.id?'active':''}" onclick="nav('${v.id}')"><span class="emoji">${v.e}</span><span>${v.l}</span></button>`).join("")}
function buildMN(){$("mob-nav").innerHTML=VIEWS.map(v=>`<button class="${curView===v.id?'active':''}" onclick="nav('${v.id}')"><span class="mi">${v.e}</span></button>`).join("")}

function render(){
  $("header-date").textContent=new Date().toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"});
  const t={dashboard:"Mi Resumen",cashflow:"Flujo de Caja",movimientos:"Movimientos",deudas:"Deudas Compartidas",creditos:"Creditos",comparador:"Comparador",inversiones:"Inversiones"};
  $("header-title").textContent=t[curView]||"";
  buildSB();buildMN();
  $("vc").innerHTML={dashboard:rDash,cashflow:rCashFlow,movimientos:rMovimientos,deudas:rDeudas,creditos:rCreditos,comparador:rComparador,inversiones:rInversiones}[curView]();
}

// VISTAS
function rDash(){const b=bal();let h=`<div class="sg sg4"><div class="sc" style="border-left-color:#10b981"><div class="inn"><span class="lbl">BALANCE</span><p class="val" style="color:${b>=0?'#10b981':'#f43f5e'}">${fmt(b)}</p></div></div></div>`;return h}
function rCashFlow(){return`<div class="card"><h3 class="card-t">📊 Proyeccion Flujo Caja (12 meses)</h3><p style="color:var(--t3)">Proyecciones automáticas basadas en gastos fijos e ingresos recurrentes...</p></div>`}
function rMovimientos(){return`<div class="card"><h3 class="card-t">↕️ Movimientos</h3><p style="color:var(--t3)">${txs.length} transacciones registradas</p></div>`}
function rDeudas(){const iOwe=debts.filter(d=>d.fromUid===curUser.uid&&d.status==="pending");const theyOwe=debts.filter(d=>d.toUid===curUser.uid&&d.status==="pending");return`<div class="card"><h3 class="card-t">🤝 Deudas Compartidas</h3><p style="color:var(--t3)">Debes: ${iOwe.length} • Te deben: ${theyOwe.length}</p></div>`}
function rCreditos(){return`<div class="card"><h3 class="card-t">💳 Creditos</h3><p style="color:var(--t3)">${credits.length} creditos registrados</p></div>`}
function rComparador(){return`<div class="card"><h3 class="card-t">⚖️ Comparador</h3><p style="color:var(--t3)">${quotes.length} cotizaciones</p></div>`}
function rInversiones(){return`<div class="card"><h3 class="card-t">🌱 Inversiones</h3><p style="color:var(--t3)">${investments.length} inversiones</p></div>`}

// MODAL - CASCADA JERARQUICA
function openModal(){editId=null;$("mo").classList.remove("hidden");buildModalForm()}

function buildModalForm(){
  let h=`<div class="tt"><button class="tb ae" onclick="setTxType('gasto')">GASTO</button><button class="tb ai" onclick="setTxType('ingreso')">INGRESO</button></div>
  <div class="section" id="macro-section"><p class="section-title">Tipo de Transaccion</p><div class="select-group" id="macro-select"></div></div>
  <div class="section hidden" id="sub-section"><p class="section-title">Categoria Especifica</p><div class="select-group" id="sub-select"></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><input class="fi" id="tx-amount" type="number" placeholder="Monto $" min="0"><input class="fi" id="tx-date" type="date"></div>
  <input class="fi" id="tx-desc" placeholder="Descripcion (ej: Almuerzo en cafe)">
  <div class="section hidden" id="share-section"><p class="section-title">🤝 Compartir Gasto</p><div id="share-options"></div></div>
  <button class="bp" onclick="saveTx()">Guardar Transaccion</button>`;
  $("modal-body").innerHTML=h;
  buildMacroSelect();
}

function setTxType(type){window.curTxType=type;buildMacroSelect()}

function buildMacroSelect(){
  const type=window.curTxType||"gasto";
  const macros=type==="gasto"?["Gastos-Fijos","Gastos-Variables"]:["Ingresos"];
  let h=macros.map(m=>{const cat=CATEGORIAS[m];return`<div class="select-option" onclick="selectMacro('${m}')"><span class="opt-icon">${cat.icon}</span><div><span class="opt-name">${m}</span></div></div>`}).join("");
  $("macro-select").innerHTML=h;
}

function selectMacro(macro){
  window.curMacro=macro;
  const cat=CATEGORIAS[macro];
  let h=Object.entries(cat.subs).map(([key,sub])=>`<div class="select-option" onclick="selectSub('${key}','${macro}')"><span class="opt-icon">${sub.icon}</span><div><span class="opt-name">${sub.name}</span><span class="opt-desc" style="margin-left:auto;font-size:10px">${sub.recurrente?'📌 Recurrente':''}</span></div></div>`).join("");
  $("sub-select").innerHTML=h;
  $("sub-section").classList.remove("hidden");
  $("share-section").classList.add("hidden");
}

function selectSub(subId,macro){
  window.curSub=subId;window.curMacro=macro;
  const cat=CATEGORIAS[macro];const sub=cat.subs[subId];
  if(subId==="tarjeta-credito"){
    let h=`<p style="font-size:11px;color:var(--t3);margin-bottom:8px">Selecciona banco:</p><select class="fi" id="tx-banco"><option value="">Elige un banco...</option>`;
    sub.bancos.forEach(b=>h+=`<option value="${b}">${b}</option>`);
    h+=`</select>`;
    $("sub-select").innerHTML+=h;
  }
  buildShareOptions();
}

function buildShareOptions(){
  const others=getOtherUsers();
  if(others.length===0)return;
  let h=`<div class="div-opt"><input type="radio" name="division" value="none" checked onchange="setDivType('none')"><span>No compartir</span></div>
  <div class="div-opt" onclick="setDivType('equal');document.querySelector('input[value=equal]').checked=true"><input type="radio" name="division" value="equal"><span>50/50 Equitativo</span></div>
  <div class="div-opt" onclick="setDivType('percent');document.querySelector('input[value=percent]').checked=true"><input type="radio" name="division" value="percent"><span>Porcentaje personalizado</span></div>
  <div class="div-opt" onclick="setDivType('amount');document.querySelector('input[value=amount]').checked=true"><input type="radio" name="division" value="amount"><span>Monto especifico</span></div>
  <div style="margin-top:10px;padding:10px;background:#f1f5f9;border-radius:10px"><p style="font-size:11px;font-weight:700;margin-bottom:8px">Con quien?</p><select class="fi" id="tx-sharedwith" style="margin-bottom:0"><option value="">Selecciona usuario...</option>`;
  others.forEach(u=>h+=`<option value="${u.uid}">${u.name}</option>`);
  h+=`</select></div><div id="div-params" style="margin-top:10px"></div>`;
  $("share-section").innerHTML=h;
  $("share-section").classList.remove("hidden");
}

function setDivType(type){
  window.curDivType=type;
  let h="";
  if(type==="percent"){h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><input class="fi" id="div-pct1" type="number" placeholder="Tu %" min="0" max="100" value="50" oninput="updatePct()"><input class="fi" id="div-pct2" type="number" placeholder="Su %" min="0" max="100" value="50" readonly></div>`}else if(type==="amount"){h=`<input class="fi" id="div-amt" type="number" placeholder="Monto que paga el otro $" min="0">`}
  $("div-params").innerHTML=h;
}

function updatePct(){const pct1=parseInt($("div-pct1")?.value||0);if($("div-pct2"))$("div-pct2").value=100-pct1}

async function saveTx(){
  const amount=parseInt($("tx-amount")?.value);const desc=$("tx-desc")?.value.trim();const date=$("tx-date")?.value;
  if(!amount||amount<=0||!desc||!date)return toast("Completa todos los campos");
  if(!window.curMacro||!window.curSub)return toast("Selecciona categoria");

  const macro=window.curMacro;const sub=CATEGORIAS[macro].subs[window.curSub];
  const txAmount=(window.curTxType==="gasto")?-amount:amount;
  const sharedWith=$("tx-sharedwith")?.value||"";
  let finalAmount=txAmount;let debtAmount=0;

  if(sharedWith&&window.curDivType&&window.curDivType!=="none"){
    const divType=window.curDivType;
    if(divType==="equal"){finalAmount=txAmount/2;debtAmount=Math.abs(txAmount)/2}
    else if(divType==="percent"){const pct=parseInt($("div-pct1")?.value||50);finalAmount=txAmount*(pct/100);debtAmount=Math.abs(txAmount)*((100-pct)/100)}
    else if(divType==="amount"){debtAmount=parseInt($("div-amt")?.value||0);finalAmount=txAmount+(window.curTxType==="gasto"?debtAmount:0)}
  }

  const txData={uid:curUser.uid,desc,amount:Math.round(finalAmount),macro,sub:window.curSub,date,banco:$("tx-banco")?.value||null,sharedWith:sharedWith||null,divType:window.curDivType||"none"};
  const txId=await fbSave("transactions",txData);
  
  if(txId){
    txs.unshift({_id:txId,...txData});
    if(sharedWith&&debtAmount>0){
      const debtData={fromUid:sharedWith,toUid:curUser.uid,amount:Math.round(debtAmount),desc,date,divType:window.curDivType,status:"pending"};
      await fbSave("debts",debtData);
    }
    toast("Transaccion guardada");closeModal();render();
  }
}

function closeModal(){$("mo").classList.add("hidden");window.curTxType=null;window.curMacro=null;window.curSub=null;window.curDivType=null}
</script>
</body>
