<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SimpleFinance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<script>
// ===== PANEL DE ADMINISTRADOR =====
var adminUserData={};
var adminSelectedTab="dashboard";

function navAdmin(view){
  adminView=view;
  const titles={users:"👥 Usuarios",invitations:"📧 Invitaciones",audit:"📋 Auditoría"};
  $("header-title").textContent=titles[view]||"Admin";
  const renders={users:rAdminUsers,invitations:rAdminInvitations,audit:rAdminAudit};
  if(renders[view])$("vc").innerHTML=renders[view]();
}

function rAdminUsers(){
  let h="<div class='card'><h3 class='card-t'>👥 Usuarios Registrados</h3>";
  h+="<p style='font-size:11px;color:var(--t3);margin-bottom:12px'>Total: "+allUsers.length+" usuarios</p>";
  h+="<div style='display:flex;flex-direction:column;gap:8px'>";
  allUsers.forEach(function(u){
    var isSelf=curUser&&u.uid===curUser.uid;
    h+="<div style='padding:12px;border:1px solid var(--border);border-radius:10px;background:#fff'>";
    h+="<div style='display:flex;justify-content:space-between;align-items:flex-start'>";
    h+="<div style='flex:1'>";
    h+="<p style='font-weight:700;color:var(--t1);font-size:13px'>"+u.name+(isSelf?" (Tú)":"")+"</p>";
    h+="<p style='font-size:10px;color:var(--t3);margin-top:2px'>RUT: "+(u.rut||"---")+" • "+(u.email||"---")+"</p>";
    h+="<span style='display:inline-block;margin-top:4px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;background:"+(u.role==="admin"?"#fef3c7;color:#92400e":"#f1f5f9;color:#64748b")+"'>"+(u.role==="admin"?"👨‍💼 ADMIN":"👤 Usuario")+"</span>";
    h+="</div>";
    h+="<div style='display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end'>";
    h+="<button style='padding:5px 10px;font-size:9px;background:#0ea5e9;color:#fff;border:none;border-radius:6px;cursor:pointer' onclick=\"viewAdminUser('"+u.uid+"')\">👁️ Ver</button>";
    h+="<button style='padding:5px 10px;font-size:9px;background:#f59e0b;color:#fff;border:none;border-radius:6px;cursor:pointer' onclick=\"editAdminUser('"+u.uid+"')\">✎ Editar</button>";
    if(!isSelf) h+="<button style='padding:5px 10px;font-size:9px;background:#f43f5e;color:#fff;border:none;border-radius:6px;cursor:pointer' onclick=\"deleteAdminUser('"+u.uid+"','"+u.name.replace(/'/g,"\\'")+"')\">🗑️</button>";
    h+="</div></div></div>";
  });
  h+="</div></div>";
  return h;
}

function editAdminUser(uid){
  var u=allUsers.find(function(x){return x.uid===uid});
  if(!u){toast("Usuario no encontrado");return}
  var h="<div style='text-align:center;margin-bottom:12px'><span style='font-size:28px'>✎</span><h3 style='font-size:16px;font-weight:700;margin:4px 0'>Editar Usuario</h3></div>";
  h+="<div style='margin-bottom:10px'><label style='font-size:10px;font-weight:700'>Nombre</label><input class='fi' id='edit-user-name' value='"+(u.name||"").replace(/'/g,"&#39;")+"' style='margin-bottom:0'></div>";
  h+="<div style='margin-bottom:10px'><label style='font-size:10px;font-weight:700'>RUT</label><input class='fi' id='edit-user-rut' value='"+(u.rut||"")+"' style='margin-bottom:0'></div>";
  h+="<div style='margin-bottom:10px'><label style='font-size:10px;font-weight:700'>Email</label><input class='fi' id='edit-user-email' value='"+(u.email||"")+"' style='margin-bottom:0'></div>";
  h+="<div style='margin-bottom:12px'><label style='font-size:10px;font-weight:700'>Rol</label><select class='fi' id='edit-user-role' style='margin-bottom:0'><option value='user'"+(u.role!=="admin"?" selected":"")+">👤 Usuario</option><option value='admin'"+(u.role==="admin"?" selected":"")+">👨‍💼 Administrador</option></select></div>";
  h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'><button class='bp' style='margin:0' onclick=\"saveAdminUser('"+uid+"')\">💾 Guardar</button><button class='bp' style='background:#64748b;margin:0' onclick='closeModal()'>Cancelar</button></div>";
  $("modal-body").innerHTML=h;
  $("mo").classList.remove("hidden");
}

async function saveAdminUser(uid){
  var name=$("edit-user-name").value.trim();
  var rut=$("edit-user-rut").value.trim();
  var email=$("edit-user-email").value.trim();
  var role=$("edit-user-role").value;
  if(!name){toast("El nombre es obligatorio");return}
  try{
    await db.collection("users").doc(uid).set({name:name,rut:rut,email:email,role:role},{merge:true});
    allUsers=allUsers.map(function(u){return u.uid===uid?Object.assign({},u,{name:name,rut:rut,email:email,role:role}):u});
    toast("✓ Usuario actualizado");
    closeModal();
    navAdmin("users");
  }catch(e){toast("Error: "+e.message)}
}

function deleteAdminUser(uid,name){
  showCo("Eliminar Usuario","¿Eliminar a "+name+"? Se eliminarán todos sus datos. Esta acción no se puede deshacer.","Eliminar",async function(){
    try{
      // Delete user document
      await db.collection("users").doc(uid).delete();
      // Delete user's transactions
      var userTxs=await fbLoad("transactions",{f:"uid",v:uid});
      for(var i=0;i<userTxs.length;i++){await db.collection("transactions").doc(userTxs[i]._id).delete()}
      // Delete user's super purchases
      var userSuper=await fbLoad("supermercado",{f:"uid",v:uid});
      for(var i=0;i<userSuper.length;i++){await db.collection("supermercado").doc(userSuper[i]._id).delete()}
      // Delete user's feria purchases
      var userFeria=await fbLoad("feria",{f:"uid",v:uid});
      for(var i=0;i<userFeria.length;i++){await db.collection("feria").doc(userFeria[i]._id).delete()}
      // Delete debts
      var userDebtsFrom=await fbLoad("debts",{f:"fromUid",v:uid});
      for(var i=0;i<userDebtsFrom.length;i++){await db.collection("debts").doc(userDebtsFrom[i]._id).delete()}
      var userDebtsTo=await fbLoad("debts",{f:"toUid",v:uid});
      for(var i=0;i<userDebtsTo.length;i++){await db.collection("debts").doc(userDebtsTo[i]._id).delete()}
      allUsers=allUsers.filter(function(u){return u.uid!==uid});
      toast("✓ Usuario y datos eliminados");
      navAdmin("users");
    }catch(e){toast("Error: "+e.message)}
  });
}

async function viewAdminUser(uid){
  var u=allUsers.find(function(x){return x.uid===uid});
  if(!u){toast("Usuario no encontrado");return}
  $("vc").innerHTML="<div style='text-align:center;padding:40px'><p style='color:var(--t3)'>Cargando datos de "+u.name+"...</p></div>";
  try{
    var uTxs=await fbLoad("transactions",{f:"uid",v:uid});
    uTxs.sort(function(a,b){return(b.fecha||"").localeCompare(a.fecha||"")});
    var uDebtsFrom=await fbLoad("debts",{f:"fromUid",v:uid});
    var uDebtsTo=await fbLoad("debts",{f:"toUid",v:uid});
    var dIds=new Set(uDebtsFrom.map(function(d){return d._id}));
    uDebtsTo.forEach(function(d){if(!dIds.has(d._id)){uDebtsFrom.push(d)}});
    var uSuper=await fbLoad("supermercado",{f:"uid",v:uid});
    var superDedupMap=new Map();
    uSuper.forEach(function(p){var key=p.fecha+"|"+p.supermercado+"|"+p.producto;if(!superDedupMap.has(key))superDedupMap.set(key,p)});
    uSuper=Array.from(superDedupMap.values()).sort(function(a,b){return(b.fecha||"").localeCompare(a.fecha||"")});
    var uFeria=await fbLoad("feria",{f:"uid",v:uid});
    var feriaDedupMap=new Map();
    uFeria.forEach(function(p){var key=p.fecha+"|"+p.producto+"|"+p.valor;if(!feriaDedupMap.has(key))feriaDedupMap.set(key,p)});
    uFeria=Array.from(feriaDedupMap.values()).sort(function(a,b){return(b.fecha||"").localeCompare(a.fecha||"")});
    var allDebts=uDebtsFrom.filter(function(d){return d.amount&&d.amount>0});
    var debtDedupMap=new Map();
    allDebts.forEach(function(d){var key=d.fromUid+"|"+d.toUid+"|"+d.fecha+"|"+d.descripcion+"|"+d.status;var ex=debtDedupMap.get(key);if(!ex||d.amount>ex.amount)debtDedupMap.set(key,d)});
    allDebts=Array.from(debtDedupMap.values());
    var uCreditos=[];
    try{uCreditos=await fbLoad("creditos",{f:"titularUid",v:uid})}catch(e){}
    // Save original data
    window._origData={txs:txs,debts:debts,superProds:superProds,feriaProds:feriaProds,creditosData:creditosData,curView:curView};
    // Swap globals to this user's data
    txs=uTxs;debts=allDebts;superProds=uSuper;feriaProds=uFeria;creditosData=uCreditos;
    window._adminViewing={uid:uid,user:u};
    adminSelectedTab=adminSelectedTab||"dashboard";
    renderAdminUserView();
  }catch(e){
    $("vc").innerHTML="<div class='card'><p style='color:var(--red)'>Error: "+e.message+"</p></div>";
  }
}

function exitAdminView(){
  if(window._origData){
    txs=window._origData.txs;
    debts=window._origData.debts;
    superProds=window._origData.superProds;
    feriaProds=window._origData.feriaProds;
    creditosData=window._origData.creditosData;
    curView=window._origData.curView||"dashboard";
    window._origData=null;
  }
  window._adminViewing=null;
  navAdmin("users");
}

function adminNavTab(tab){
  adminSelectedTab=tab;
  renderAdminUserView();
}

function renderAdminUserView(){
  var av=window._adminViewing;
  if(!av)return;
  var u=av.user;
  var uid=av.uid;
  var tab=adminSelectedTab;

  var h="<button class='bp' style='margin-bottom:12px;width:auto;padding:8px 16px' onclick='exitAdminView()'>← Volver a Usuarios</button>";

  // User header
  h+="<div class='card' style='background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:16px;margin-bottom:12px'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center'>";
  h+="<div><p style='font-size:16px;font-weight:800'>"+u.name+"</p>";
  h+="<p style='font-size:10px;color:#94a3b8;margin-top:2px'>RUT: "+(u.rut||"---")+" • "+(u.role==="admin"?"Admin":"Usuario")+"</p></div>";
  h+="<div style='width:40px;height:40px;border-radius:50%;background:#0ea5e9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px'>"+((u.name||"U").charAt(0).toUpperCase())+"</div>";
  h+="</div>";
  var totalIngresos=txs.filter(function(t){return t.tipo==="ingreso"}).reduce(function(s,t){return s+t.monto},0);
  var totalGastos=txs.filter(function(t){return t.tipo==="egreso"}).reduce(function(s,t){return s+t.monto},0);
  h+="<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;text-align:center'>";
  h+="<div><p style='font-size:14px;font-weight:800;color:#10b981'>"+fmt(totalIngresos)+"</p><p style='font-size:8px;color:#94a3b8'>Ingresos</p></div>";
  h+="<div><p style='font-size:14px;font-weight:800;color:#f43f5e'>"+fmt(totalGastos)+"</p><p style='font-size:8px;color:#94a3b8'>Gastos</p></div>";
  h+="<div><p style='font-size:14px;font-weight:800'>"+superProds.length+"</p><p style='font-size:8px;color:#94a3b8'>Super</p></div>";
  h+="<div><p style='font-size:14px;font-weight:800'>"+feriaProds.length+"</p><p style='font-size:8px;color:#94a3b8'>Feria</p></div>";
  h+="</div></div>";

  // Tabs - use the same main views
  var tabs=[{id:"dashboard",icon:"🏠",label:"Dashboard"},{id:"cashflow",icon:"💰",label:"Flujo Caja"},{id:"movimientos",icon:"📊",label:"Movimientos"},{id:"tarjetas",icon:"💳",label:"Tarjetas"},{id:"deudas",icon:"🤝",label:"Deudas"},{id:"creditos",icon:"🏦",label:"Créditos"},{id:"supermercado",icon:"🛒",label:"Super"},{id:"feria",icon:"🥕",label:"Feria"}];
  h+="<div style='display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px'>";
  tabs.forEach(function(t){
    var active=tab===t.id;
    h+="<button style='padding:8px 12px;border-radius:8px;border:1px solid "+(active?"#0ea5e9":"var(--border)")+";background:"+(active?"#0ea5e9":"#fff")+";color:"+(active?"#fff":"var(--t2)")+";font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:inherit' onclick=\"adminNavTab('"+t.id+"')\">"+t.icon+" "+t.label+"</button>";
  });
  h+="</div>";

  // Month nav for applicable views
  var monthViews=["dashboard","movimientos","tarjetas","deudas","supermercado","feria"];
  if(monthViews.indexOf(tab)>=0) h+=monthNav();

  // Render the REAL view function
  var viewFns={dashboard:rDash,cashflow:rCashFlow,movimientos:rMov,tarjetas:rTarjetas,deudas:rDeudas,creditos:rCreditos,supermercado:rSuper,feria:rFeria};
  if(viewFns[tab]) h+=viewFns[tab]();

  $("vc").innerHTML=h;
}

function rAdminInvitations(){
  var code="SF-"+Math.random().toString(36).substr(2,8).toUpperCase();
  var h="<div class='card'><h3 class='card-t'>📧 Invitaciones</h3>";
  h+="<p style='font-size:11px;color:var(--t3);margin-bottom:12px'>Código para invitar usuarios:</p>";
  h+="<input type='text' id='invCode' value='"+code+"' readonly style='width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-family:monospace'>";
  h+="<button class='bp' style='width:100%' onclick='copyInvCode()'>📋 Copiar Código</button>";
  h+="</div>";
  return h;
}

function rAdminAudit(){
  var h="<div class='card'><h3 class='card-t'>📋 Auditoría del Sistema</h3>";
  h+="<div style='padding:12px;background:#f8fafc;border-radius:10px'>";
  h+="<p style='font-size:11px;color:var(--t3);margin-bottom:8px'><strong>📊 Estadísticas:</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Total de usuarios: <strong>"+allUsers.length+"</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Total de transacciones: <strong>"+txs.length+"</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Deudas pendientes: <strong>"+debts.filter(function(d){return d.status==="pending"}).length+"</strong></p>";
  h+="<p style='font-size:11px;color:var(--t3)'>• Datos por sincronizar: <strong>"+syncQueue.length+"</strong></p>";
  h+="</div></div>";
  return h;
}

function copyInvCode(){
  var code=$("invCode").value;
  navigator.clipboard.writeText(code);
  toast("✓ Código copiado al portapapeles");
}
</script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--t1:#0f172a;--t2:#334155;--t3:#94a3b8;--accent:#0ea5e9;--red:#f43f5e;--green:#10b981;--orange:#f47245;--purple:#a855f7;--border:#e2e8f0;--sidebar:#0f172a;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1e293b;color:var(--t1);min-height:100vh;width:100%}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo .icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.login-logo .text{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
.login-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;background:transparent;color:var(--t3)}
.login-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fi{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-size:14px;color:var(--t1);margin-bottom:12px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,.1);outline:none}
.bp{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}.bp:disabled{opacity:.5;cursor:not-allowed}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px}
.app{width:100%;min-height:100vh;background:var(--bg);display:flex}
.sidebar{background:var(--sidebar);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;width:220px;padding:24px 14px}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff}
.logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#f1f5f9}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:none;width:100%;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;cursor:pointer;transition:all .15s;text-align:left}
.sidebar-btn.active{background:rgba(14,165,233,.15);color:#38bdf8;font-weight:700}
.sidebar-btn .emoji{font-size:18px}
.sidebar-footer{border-top:1px solid #1e293b;padding-top:14px;display:flex;align-items:center;gap:10px}
.sf-user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logout-btn{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}.logout-btn:hover{background:#1e293b;color:#e2e8f0}
.main{flex:1;overflow:auto;padding:28px 36px 30px;width:100%}
.main-inner{max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header-date{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.header-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--t1);margin-top:2px}
.sg{display:grid;gap:12px;margin-bottom:22px}.sg3{grid-template-columns:1fr 1fr 1fr}.sg4{grid-template-columns:1fr 1fr 1fr 1fr}
.sc{background:#fff;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid var(--accent)}.sc .inn{padding:18px 16px}
.sc .lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px}.sc .val{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--t1);margin-top:6px}.sc .sub{font-size:11px;font-weight:600;margin-top:4px}
.card{background:#fff;padding:18px;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.tr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border);margin-bottom:8px}
.tr .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}.tr .emoji-i{font-size:18px;flex-shrink:0}
.tr .desc{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

<script>
firebase.initializeApp({apiKey:"AIzaSyAO4e9V_t9oyE_rrWJg9smeD4X6GPHSJ6w",authDomain:"simple-finance-5cd8d.firebaseapp.com",projectId:"simple-finance-5cd8d",storageBucket:"simple-finance-5cd8d.firebasestorage.app",messagingSenderId:"440080124392",appId:"1:440080124392:web:80a8be866c8aab6359fc5d"});
const db=firebase.firestore();const auth=firebase.auth();
const DEFAULT_CATEGORIES={
  "Ingresos":{icon:"💰",subs:{"Sueldo Fijo Mensual":{icon:"💵"},"Comisiones":{icon:"📊"},"Bonos":{icon:"🎁"},"Utilidades":{icon:"📈"},"Ganancia Negocios":{icon:"🏪"}}},

  "Gastos Esporádicos":{icon:"📋",subs:{"Patente Vehículo":{icon:"📋"},"Permiso Circulación":{icon:"📄"},"Contribuciones":{icon:"🏛️"},"Impuestos":{icon:"📋"},"Préstamo Bancario":{icon:"🏦"},"Crédito Personal":{icon:"👤"},"Crédito Comercial":{icon:"🏪"},"Préstamo Amigos/Familia":{icon:"👨‍👩‍👧‍👦"},"Línea de Crédito":{icon:"📈"},"Otras Deudas":{icon:"📌"}}}
};

const VIEWS=[{id:"dashboard",l:"Dashboard",e:"🏠"},{id:"cashflow",l:"Flujo Caja",e:"📊"},{id:"movimientos",l:"Movimientos",e:"↕️"},{id:"tarjetas",l:"Tarjetas",e:"💳"},{id:"deudas",l:"Deudas",e:"🤝"},{id:"creditos",l:"Créditos",e:"🏦"},{id:"supermercado",l:"Supermercado",e:"🛒"},{id:"feria",l:"Feria",e:"🥕"},{id:"settings",l:"Categorías",e:"⚙️"}];
let curUser=null,curProfile=null,allUsers=[];
let txs=[],debts=[],superProds=[],feriaProds=[],despensaData=[],creditosData=[],userCategories={},curView="dashboard",coCb=null;
let isAdmin=false,viewingUserId=null,adminView=null;
// Sistema de sincronización
let syncQueue=[];
let isSyncing=false;
let isOnline=true;
const SYNC_INTERVAL=30000; // 30 segundos
const fmt=n=>"$"+Math.abs(n).toLocaleString("es-CL");

function toast(m){const t=$("toast");t.textContent="✓ "+m;t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2400)}
function showCo(t,m,b,cb){$("co-t").textContent=t;$("co-m").textContent=m;$("co-a").textContent=b;coCb=cb;$("co").classList.remove("hidden")}
function closeCo(){$("co").classList.add("hidden");coCb=null}
function execCo(){if(coCb)coCb();closeCo()}
function rutToEmail(r){return r.replace(/[^0-9kK]/g,"").toLowerCase()+"@sf.local"}
function getInitial(n){return n?n.charAt(0).toUpperCase():"?"}
function getUserName(uid){const u=allUsers.find(x=>x.uid===uid);return u?u.name:"Usuario"}
function validateLoginForm(){const rut=$("l-rut").value.trim();const pass=$("l-pass").value;$("login-btn").disabled=!(rut&&pass&&pass.length>=6)}
function validateRegisterForm(){const name=$("r-name").value.trim();const rut=$("r-rut").value.trim();const pass=$("r-pass").value;const pass2=$("r-pass2").value;$("register-btn").disabled=!(name&&rut&&pass&&pass2&&pass.length>=6&&pass===pass2)}
function switchTab(t){
  $("tab-login").classList.toggle("active",t==="login");
  $("tab-register").classList.toggle("active",t==="register");
  $("login-form").classList.toggle("hidden",t!=="login");
  $("register-form").classList.toggle("hidden",t!=="register");
  $("l-err").textContent="";$("r-err").textContent="";
  validateLoginForm();validateRegisterForm();
}
async function doRegister(){
  const name=$("r-name").value.trim(),rut=$("r-rut").value.trim(),pass=$("r-pass").value,pass2=$("r-pass2").value;const btn=$("register-btn");
  if(!name||!rut||!pass||!pass2){$("r-err").textContent="Completa todos los campos";return}
  if(pass.length<6){$("r-err").textContent="Contraseña minimo 6 caracteres";return}
  if(pass!==pass2){$("r-err").textContent="Las contraseñas no coinciden";return}
  btn.disabled=true;btn.textContent="Creando...";$("r-err").textContent="";
  try{
    const cred=await auth.createUserWithEmailAndPassword(rutToEmail(rut),pass);
    await db.collection("users").doc(cred.user.uid).set({name,rut,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection("categories").doc(cred.user.uid).set({...DEFAULT_CATEGORIES});
    toast("Cuenta creada");switchTab("login");
    btn.disabled=false;btn.textContent="Crear Cuenta";
  }catch(e){
    $("r-err").textContent=e.code==="auth/email-already-in-use"?"RUT ya registrado":e.message;
    btn.disabled=false;btn.textContent="Crear Cuenta";
  }
}
async function doLogin(){
  const rut=$("l-rut").value.trim(),pass=$("l-pass").value;const btn=$("login-btn");
  if(!rut||!pass){$("l-err").textContent="Completa todos los campos";return}
  btn.disabled=true;btn.textContent="Ingresando...";$("l-err").textContent="";
  try{
    await auth.signInWithEmailAndPassword(rutToEmail(rut),pass);
    // onAuthStateChanged se encargará del resto
  }catch(e){
    let msg="Error al ingresar";
    if(e.code==="auth/user-not-found"||e.code==="auth/invalid-credential")msg="RUT no registrado o contraseña incorrecta";
    else if(e.code==="auth/wrong-password")msg="Contraseña incorrecta";
    else if(e.code==="auth/too-many-requests")msg="Demasiados intentos. Espera un momento";
    else if(e.code==="auth/network-request-failed")msg="Sin conexión a internet";
    $("l-err").textContent=msg;
    btn.disabled=false;btn.textContent="Ingresar";
  }
}
function doLogout(){auth.signOut()}
auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      curUser=user;
      // Cargar perfil del usuario
      try{
        const doc=await db.collection("users").doc(user.uid).get();
        curProfile=doc.exists?doc.data():{name:"Usuario"};
      }catch(profileErr){
        console.warn("No se pudo cargar perfil, usando default:",profileErr);
        curProfile={name:user.email?user.email.split("@")[0]:"Usuario"};
      }
      isAdmin=curProfile.role==="admin";
      // Cargar lista de usuarios (puede fallar por permisos)
      try{
        const usersSnap=await db.collection("users").get();
        allUsers=usersSnap.docs.map(d=>({uid:d.id,...d.data()}));
      }catch(usersErr){
        console.warn("No se pudo cargar lista de usuarios:",usersErr);
        allUsers=[{uid:user.uid,...curProfile}];
      }
      // Mostrar la app (ANTES de cargar datos pesados)
      $("login-screen").classList.add("hidden");
      $("app-screen").classList.remove("hidden");
      $("sb-name").textContent=curProfile.name;
      $("sb-avatar").textContent=getInitial(curProfile.name);
      // Reset login button por si quedó en "Ingresando..."
      const btn=$("login-btn");
      if(btn){btn.disabled=false;btn.textContent="Ingresar";}
      const adminSec=$("admin-section");
      if(adminSec){
        if(isAdmin){
          adminSec.classList.remove("hidden");
          $("sb-name").innerHTML+=` <span style="color:#f59e0b;font-size:10px">[ADMIN]</span>`;
        }else{
          adminSec.classList.add("hidden");
        }
      }
      loadSyncQueueFromLocalStorage();
      // Cargar datos (puede fallar pero la app ya está visible)
      try{
        await loadAll();
      }catch(loadErr){
        console.warn("Error cargando datos:",loadErr);
        toast("Error cargando datos, reintentando...");
        setTimeout(()=>loadAll().catch(e=>console.error(e)),3000);
      }
      if(syncQueue.length>0)setTimeout(performSync,2000);
    }catch(fatalErr){
      console.error("Error fatal en login:",fatalErr);
      // Asegurar que la app se muestre aunque haya errores
      $("login-screen").classList.add("hidden");
      $("app-screen").classList.remove("hidden");
      const btn=$("login-btn");
      if(btn){btn.disabled=false;btn.textContent="Ingresar";}
      toast("Error al cargar. Reintentar con Sincronizar");
    }
  }else{
    curUser=null;
    $("login-screen").classList.remove("hidden");
    $("app-screen").classList.add("hidden");
    // Reset login button
    const btn=$("login-btn");
    if(btn){btn.disabled=false;btn.textContent="Ingresar";}
  }
});
async function fbLoad(col,filter=null){try{let q=db.collection(col);if(filter)q=q.where(filter.f,filter.op||"==",filter.v);const s=await q.get();return s.docs.map(d=>({_id:d.id,...d.data()}))}catch(e){return[]}}
async function fbSave(col,data){
  try{
    const id=data._id;
    const d={...data};
    delete d._id;
    d._ts=firebase.firestore.FieldValue.serverTimestamp();
    if(id){
      await db.collection(col).doc(id).set(d,{merge:true});
    }else{
      const ref=await db.collection(col).add(d);
      return ref.id;
    }
    return id;
  }catch(e){
    console.error("fbSave error:",e);
    return null;
  }
}
async function fbDel(col,id){try{await db.collection(col).doc(id).delete()}catch(e){console.error(e)}}
function addToSyncQueue(op){syncQueue.push({...op,timestamp:Date.now(),id:String(Date.now())+Math.random()});updateSyncUI();saveSyncQueueToLocalStorage();}
function saveSyncQueueToLocalStorage(){try{localStorage.setItem(`sf_sync_${curUser.uid}`,JSON.stringify(syncQueue));}catch(e){}}
function loadSyncQueueFromLocalStorage(){try{const s=localStorage.getItem(`sf_sync_${curUser.uid}`);syncQueue=s?JSON.parse(s):[];updateSyncUI();}catch(e){}}
function updateSyncUI(){const p=syncQueue.length;const i=$("sync-indicator");const st=$("sync-status");const pe=$("sync-pending");const sb=$("sync-btn");if(pe)pe.textContent=p;if(p>0){if(i)i.style.background="#f59e0b";if(st)st.textContent="Pendiente";if(sb)sb.style.background="#f59e0b";}else{if(i)i.style.background="#10b981";if(st)st.textContent="Sincronizado";if(sb)sb.style.background="#0ea5e9";}}
async function triggerSync(){if(isSyncing||syncQueue.length===0){if(syncQueue.length===0)toast("✓ Sincronizado");return;} await performSync();}
async function performSync(){if(isSyncing||!syncQueue.length)return;isSyncing=true;const sb=$("sync-btn");if(sb)sb.disabled=true;const t=syncQueue.length;let c=0;for(let i=0;i<syncQueue.length;i++){const op=syncQueue[i];const b=$("sync-bar");if(b)b.style.width=(c/t*100)+"%";try{if(op.type==="save"){const id=op.data._id||String(Date.now());const d={...op.data};delete d._id;d._ts=firebase.firestore.FieldValue.serverTimestamp();if(op.data._id){await db.collection(op.col).doc(id).set(d,{merge:true});}else{d._syncId=id;await db.collection(op.col).doc(id).set(d,{merge:true});}}else if(op.type==="del"){await db.collection(op.col).doc(op.id).delete();}syncQueue.splice(i,1);i--;c++;}catch(e){c++;}}const b=$("sync-bar");if(b)b.style.width="100%";isSyncing=false;if(sb)sb.disabled=false;saveSyncQueueToLocalStorage();updateSyncUI();if(!syncQueue.length){toast("✓ Completo");await loadAll();}}

let isLoading=false;
async function loadAll(){
  if(isLoading)return;
  isLoading=true;
  try{
    const uid=curUser.uid;
    const catDoc=await db.collection("categories").doc(uid).get();
    userCategories=catDoc.exists?catDoc.data():{...DEFAULT_CATEGORIES};
    
    let txsRaw=await fbLoad("transactions",{f:"uid",v:uid});
    txs=txsRaw.sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
    
    debts=await fbLoad("debts",{f:"fromUid",v:uid});
    // Also load debts where I'm the creditor (toUid)
    let debtsToMe=[];
    try{debtsToMe=await fbLoad("debts",{f:"toUid",v:uid})}catch(e){console.warn("Error loading debtsToMe:",e)}
    // Merge without ID duplicates
    const debtIds=new Set(debts.map(d=>d._id));
    debtsToMe.forEach(d=>{if(!debtIds.has(d._id)){debts.push(d);debtIds.add(d._id)}});
    // Clean up: remove $0 debts from Firestore silently
    const zeroDebts=debts.filter(d=>!d.amount||d.amount<=0);
    zeroDebts.forEach(d=>{if(d._id)fbDel("debts",d._id).catch(()=>{})});
    debts=debts.filter(d=>d.amount&&d.amount>0);
    // Deduplicate by content (fromUid+toUid+fecha+descripcion+status), keep highest amount
    const debtMap=new Map();
    debts.forEach(d=>{
      const key=`${d.fromUid}|${d.toUid}|${d.fecha}|${d.descripcion}|${d.status}`;
      const existing=debtMap.get(key);
      if(!existing||d.amount>existing.amount){
        // Delete the duplicate with lower amount from Firestore
        if(existing&&existing._id)fbDel("debts",existing._id).catch(()=>{});
        debtMap.set(key,d);
      }else{
        // This one is the duplicate, delete it
        if(d._id)fbDel("debts",d._id).catch(()=>{});
      }
    });
    debts=Array.from(debtMap.values());
    
    // Load super/feria for ALL users so everyone can see shared purchases
    let superRaw=[];
    let feriaRaw=[];
    for(const u of allUsers){
      try{
        const uSuper=await fbLoad("supermercado",{f:"uid",v:u.uid});
        superRaw=superRaw.concat(uSuper);
      }catch(e){}
      try{
        const uFeria=await fbLoad("feria",{f:"uid",v:u.uid});
        feriaRaw=feriaRaw.concat(uFeria);
      }catch(e){}
    }
    // Deduplicate super por (_id first, then fecha+supermercado+producto)
    const superIdMap=new Map();
    superRaw.forEach(p=>{if(p._id&&!superIdMap.has(p._id))superIdMap.set(p._id,p)});
    const superMap=new Map();
    Array.from(superIdMap.values()).forEach(p=>{
      const key=`${p.fecha}|${p.supermercado}|${p.producto}|${p.uid}`;
      if(!superMap.has(key))superMap.set(key,p);
    });
    superProds=Array.from(superMap.values()).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
    
    // Deduplicate feria por (_id first, then fecha+producto+valor)
    const feriaIdMap=new Map();
    feriaRaw.forEach(p=>{if(p._id&&!feriaIdMap.has(p._id))feriaIdMap.set(p._id,p)});
    const feriaMap=new Map();
    Array.from(feriaIdMap.values()).forEach(p=>{
      const key=`${p.fecha}|${p.producto}|${p.valor}|${p.uid}`;
      if(!feriaMap.has(key))feriaMap.set(key,p);
    });
    feriaProds=Array.from(feriaMap.values()).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
    
    // Load despensa status
    try{despensaData=await fbLoad("despensa",{f:"uid",v:uid})}catch(e){despensaData=[]}
    // Load creditos for all users
    try{
      let allCreditos=[];
      for(const u of allUsers){try{const uc=await fbLoad("creditos",{f:"titularUid",v:u.uid});allCreditos=allCreditos.concat(uc)}catch(e){}}
      const credIdMap=new Map();
      allCreditos.forEach(c=>{if(c._id&&!credIdMap.has(c._id))credIdMap.set(c._id,c)});
      creditosData=Array.from(credIdMap.values());
    }catch(e){creditosData=[]}
    
    render();
  }finally{
    isLoading=false;
  }
}

function getProjectedInstallments(){
  // Generar proyección de cuotas de tarjeta crédito
  // Ciclo: Corte 25 de cada mes, Vencimiento 5 del mes siguiente
  const projected=[];
  const cutoffDay=25; // Corte de facturación el 25 de cada mes
  const dueDay=5;     // Vencimiento el 5 del mes siguiente
  
  // Para cada compra con tarjeta de crédito
  [...superProds,...txs.filter(t=>t.metodoPago==="Tarjeta Crédito"),...feriaProds].forEach(item=>{
    if(item.metodoPago!=="Tarjeta Crédito")return;
    
    const purchaseDate=new Date(item.fecha);
    const purchaseDay=purchaseDate.getDate();
    const purchaseYear=purchaseDate.getFullYear();
    const purchaseMonth=purchaseDate.getMonth();
    
    const cuotas=item.cuotas||1;
    const interes=item.interes||0;
    const total=item.monto||item.subtotal||item.cantidad*item.valor||0;
    const conInteres=Math.round(total*(1+interes/100));
    const porCuota=Math.round(conInteres/cuotas);
    
    // Determinar en qué ciclo de facturación cae la compra
    let billingCycleStart,billingCycleEnd,dueMonth;
    
    if(purchaseDay<=cutoffDay){
      // Compra entre 1 y 25: Ciclo anterior, vencimiento en mes actual + 1
      // Ej: 19 mayo (ciclo 25 abril - 25 mayo) → vencimiento 5 junio
      billingCycleStart=new Date(purchaseYear,purchaseMonth-1,25);
      billingCycleEnd=new Date(purchaseYear,purchaseMonth,25);
      dueMonth=new Date(purchaseYear,purchaseMonth+1,dueDay);
    }else{
      // Compra entre 26 y 31: Ciclo actual, vencimiento en mes siguiente + 1
      // Ej: 26 mayo (ciclo 25 mayo - 25 junio) → vencimiento 5 julio
      billingCycleStart=new Date(purchaseYear,purchaseMonth,25);
      billingCycleEnd=new Date(purchaseYear,purchaseMonth+1,25);
      dueMonth=new Date(purchaseYear,purchaseMonth+2,dueDay);
    }
    
    // Generar cuotas para cada mes a partir del vencimiento
    for(let i=0;i<cuotas;i++){
      const paymentDate=new Date(dueMonth);
      paymentDate.setMonth(paymentDate.getMonth()+i);
      const dueMonthStr=paymentDate.toISOString().slice(0,7);
      
      projected.push({
        fecha:dueMonthStr,
        monto:porCuota,
        descripcion:`Cuota ${i+1}/${cuotas} - ${item.supermercado||item.vendedor||item.descripcion||'Compra TC'}`,
        tipo:"egreso",
        metodoPago:"Tarjeta Crédito",
        icon:item.icon||item.supermercado?"🛒":"🥕",
        _isProjected:true
      });
    }
  });
  
  // Project credit module installments
  const uid=curUser?.uid;
  creditosData.filter(c=>c.estado!=="finalizado").forEach(cred=>{
    const pago=calcPagoCredito(cred,uid);
    if(pago.miPago<=0)return;
    const restantes=(cred.totalCuotas||0)-(cred.cuotaActual||0);
    const fechaBase=new Date(cred.fechaInicio+"T12:00:00");
    
    for(let i=0;i<restantes&&i<36;i++){
      const futureDate=new Date(fechaBase);
      futureDate.setMonth(fechaBase.getMonth()+cred.cuotaActual+i);
      const futureMonth=futureDate.toISOString().slice(0,7);
      
      projected.push({
        fecha:futureMonth,
        monto:pago.miPago,
        descripcion:`Cuota ${(cred.cuotaActual||0)+i+1}/${cred.totalCuotas} - ${cred.descripcion||cred.tipoCredito}`,
        tipo:"egreso",
        metodoPago:"Transferencia Bancaria",
        sub:cred.tipoCredito,
        icon:"🏦",
        _isProjected:true,
        _isCredit:true,
        _creditId:cred._id
      });
    }
  });
  
  return projected;
}

function getSelMonth(){
  if(!window._selMonth){const d=new Date();window._selMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
  return window._selMonth;
}
function changeMonth(delta){
  const parts=getSelMonth().split("-");
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1+delta,1);
  window._selMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  if(window._adminViewing){renderAdminUserView()}else{render()}
}

  return h;

function rCashFlow(){
  const months=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()+i);months.push(d.toISOString().slice(0,7))}
  
  const projected=getProjectedInstallments();
  const today=new Date();
  const currentMonth=today.toISOString().slice(0,7);
  
  const proj=months.map(m=>{
    const txM=txs.filter(t=>(t.fecha||"").startsWith(m));
    // Supermercado: solo incluye si NO es tarjeta de crédito (CC se proyecta después)
    const superM=superProds.filter(p=>(p.fecha||"").startsWith(m)&&p.metodoPago!=="Tarjeta Crédito");
    // Feria: solo incluye si NO es tarjeta de crédito
    const feriaM=feriaProds.filter(p=>(p.fecha||"").startsWith(m)&&p.metodoPago!=="Tarjeta Crédito");
    const projM=projected.filter(p=>p.fecha===m);
    
    const inc=txM.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);
    const exp=txM.filter(t=>t.tipo==="egreso"&&t.metodoPago!=="Tarjeta Crédito").reduce((s,t)=>s+t.monto,0)+superM.reduce((s,p)=>s+(p.subtotal||p.cantidad*p.valor),0)+feriaM.reduce((s,p)=>s+(p.subtotal||p.valor||0),0)+projM.reduce((s,p)=>s+p.monto,0);
    
    return{m,inc,exp,saldo:inc-exp,hasProjected:projM.length>0,isCurrent:m===currentMonth}
  });

  h+=`</table><p style="font-size:10px;color:var(--t3);margin-top:8px">📅 = Incluye proyección de cuotas (TC y/o créditos)</p></div>`;

function exportMovXlsx(){
  const exportTxs=filterMonth(txs,"fecha");
  if(exportTxs.length===0){toast("Sin datos para exportar en este mes");return}
  const data=exportTxs.map(tx=>({
    "Fecha":tx.fecha,
    "Descripción":tx.descripcion||"",
    "Tipo":tx.tipo==="ingreso"?"Ingreso":"Egreso",
    "Categoría":tx.macro||"",
    "Subcategoría":tx.sub||"",
    "Método Pago":tx.metodoPago||"",
    "Banco":tx.bancoPago||"",
    "Cuotas":tx.cuotas||1,
    "Monto":tx.tipo==="egreso"?-tx.monto:tx.monto
  }));
  const ws=XLSX.utils.json_to_sheet(data);
  // Set column widths
  ws['!cols']=[{wch:12},{wch:30},{wch:10},{wch:18},{wch:18},{wch:16},{wch:14},{wch:8},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Movimientos");
  XLSX.writeFile(wb,"SimpleFinance_Movimientos_"+new Date().toISOString().slice(0,10)+".xlsx");
  toast("✓ Excel descargado");
}

      const origin=tx.supermercado?` (${tx.supermercado})`:"";

function rDeudas(){
  const uid=curUser?.uid;
  const selMonth=getSelMonth();
  const pending=debts.filter(d=>d.status==="pending");
  const paid=debts.filter(d=>(d.fromUid===uid||d.toUid===uid)&&d.status==="paid"&&(d.paidAt||d.fecha||"").startsWith(selMonth)).sort((a,b)=>(b.paidAt||b.fecha||"").localeCompare(a.paidAt||a.fecha||""));

  // Expand debts with cuotas into monthly installments
  function expandDebt(d){
    const cuotas=d.cuotas||1;
    if(cuotas<=1) return [{...d,cuotaNum:1,cuotaTotal:1,cuotaMonto:d.amount}];
    const perCuota=Math.floor(d.amount/cuotas);
    const remainder=d.amount-(perCuota*cuotas);
    const items=[];
    for(let i=0;i<cuotas;i++){
      const dt=new Date(d.fecha+"T12:00:00");
      dt.setMonth(dt.getMonth()+i);
      const monthKey=dt.toISOString().slice(0,7);
      items.push({...d,cuotaNum:i+1,cuotaTotal:cuotas,cuotaMonto:perCuota+(i===0?remainder:0),mesKey:monthKey});
    }
    return items;
  }

  // Build expanded lists - filter to selected month only
  const allExpanded=[];
  pending.forEach(d=>{
    if(d.fromUid===uid||d.toUid===uid){
      expandDebt(d).forEach(e=>{
        e.direction=e.fromUid===uid?"owe":"owed";
        const mk=e.mesKey||e.fecha?.slice(0,7)||"unknown";
        if(mk===selMonth) allExpanded.push(e);
      });
    }
  });

  // Group by month
  const byMonth={};
  allExpanded.forEach(e=>{
    const mk=e.mesKey||e.fecha?.slice(0,7)||"unknown";
    if(!byMonth[mk])byMonth[mk]={owe:[],owed:[]};
    byMonth[mk][e.direction].push(e);
  });
  const months=Object.keys(byMonth).sort();

  // Calculate totals
  const totalIOwe=allExpanded.filter(e=>e.direction==="owe").reduce((s,e)=>s+e.cuotaMonto,0);
  const totalOwedToMe=allExpanded.filter(e=>e.direction==="owed").reduce((s,e)=>s+e.cuotaMonto,0);
  const balance=totalOwedToMe-totalIOwe;

  let h="";

  // === Balance ===
  h+=`<div class="card" style="background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:16px;margin-bottom:16px">`;
  h+=`<p style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:700;margin-bottom:10px">Balance de Deudas</p>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">`;
  h+=`<div><p style="font-size:18px;font-weight:800;color:#f43f5e">${fmt(totalIOwe)}</p><p style="font-size:9px;color:#94a3b8">Debo Pagar</p></div>`;
  h+=`<div><p style="font-size:18px;font-weight:800;color:#10b981">${fmt(totalOwedToMe)}</p><p style="font-size:9px;color:#94a3b8">Me Deben</p></div>`;
  h+=`<div><p style="font-size:18px;font-weight:800;color:${balance>=0?"#10b981":"#f43f5e"}">${balance>=0?"+":""}${fmt(Math.abs(balance))}</p><p style="font-size:9px;color:#94a3b8">${balance>=0?"A Favor":"En Contra"}</p></div>`;
  h+=`</div></div>`;

  if(months.length===0){
    h+=`<div class="card"><p style="color:var(--t3);text-align:center;padding:20px;font-size:12px">✓ Sin deudas pendientes</p></div>`;
  }

  // === By month ===
  months.forEach(mk=>{
    const data=byMonth[mk];
    const dt=new Date(mk+"-15");
    const monthLabel=dt.toLocaleDateString('es-CL',{year:'numeric',month:'long'});
    const monthOwe=data.owe.reduce((s,e)=>s+e.cuotaMonto,0);
    const monthOwed=data.owed.reduce((s,e)=>s+e.cuotaMonto,0);

    h+=`<div class="card" style="margin-bottom:12px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--border)">`;
    h+=`<h3 style="font-size:14px;font-weight:800;text-transform:capitalize">📅 ${monthLabel}</h3>`;
    h+=`<div style="display:flex;gap:12px;font-size:11px"><span style="color:#f43f5e;font-weight:700">-${fmt(monthOwe)}</span><span style="color:#10b981;font-weight:700">+${fmt(monthOwed)}</span></div>`;
    h+=`</div>`;

    // Debo pagar este mes
    if(data.owe.length>0){
      h+=`<p style="font-size:10px;font-weight:700;color:#f43f5e;margin-bottom:6px">🔴 Debo Pagar</p>`;

        h+=`<div><p style="font-size:11px;font-weight:700">👤 ${userName}</p>`;
        h+=`<p style="font-size:9px;color:var(--t3)">${e.descripcion||"---"}${cuotaLabel}</p></div>`;
        h+=`<div style="text-align:right"><p style="font-size:14px;font-weight:800;color:#f43f5e">${fmt(e.cuotaMonto)}</p>`;

          h+=`</div>`;
        }

      });

          h+=`</div>`;
        }
        h+=`</div>`;
      });
    }
    h+=`</div>`;

function buildDespensaCatalog(prods,tipo){
  const catalog={};
  prods.forEach(p=>{
    const name=(p.producto||"").trim();
    if(!name)return;
    const key=name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(!catalog[key])catalog[key]={nombre:name,key:key,compras:[],totalCantidad:0,totalGasto:0,tipo:tipo};
    catalog[key].compras.push({fecha:p.fecha,cantidad:p.cantidad||1,valor:p.valor||0,subtotal:p.subtotal||(p.cantidad||1)*(p.valor||0)});
    catalog[key].totalCantidad+=p.cantidad||1;
    catalog[key].totalGasto+=p.subtotal||(p.cantidad||1)*(p.valor||0);
  });
  // Add manual products from despensaData
  despensaData.filter(d=>d.tipo===tipo&&d.manual).forEach(d=>{
    const key=d.producto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(!catalog[key]){
      catalog[key]={nombre:d.producto,key:key,compras:[],totalCantidad:0,totalGasto:0,tipo:tipo,manual:true,frecuencia:d.frecuencia||7,valor:d.valor||0};
    }
  });
  const today=new Date();
  return Object.values(catalog).map(prod=>{
    // Check if marked as "agotado"
    const statusDoc=despensaData.find(d=>d.key===prod.key&&d.tipo===tipo);
    const agotadoAt=statusDoc?.agotadoAt?new Date(statusDoc.agotadoAt):null;
    const fechas=prod.compras.map(c=>new Date(c.fecha+"T12:00:00")).sort((a,b)=>a-b);
    const lastPurchase=fechas.length>0?fechas[fechas.length-1]:null;
    const effectiveLastDate=agotadoAt&&(!lastPurchase||agotadoAt>lastPurchase)?agotadoAt:lastPurchase;
    const daysSinceLast=effectiveLastDate?Math.floor((today-effectiveLastDate)/(1000*60*60*24)):999;
    const totalDays=fechas.length>1?Math.max(1,Math.floor((fechas[fechas.length-1]-fechas[0])/(1000*60*60*24))):0;
    const frecuencia=statusDoc?.frecuencia||prod.frecuencia||(fechas.length>1?Math.round(totalDays/(fechas.length-1)):7);
    const diasRestantes=Math.max(0,frecuencia-daysSinceLast);
    const precioPromedio=prod.totalGasto>0?Math.round(prod.totalGasto/Math.max(1,prod.totalCantidad)):(prod.valor||0);
    const cantidadPromedio=prod.compras.length>0?Math.round(prod.totalCantidad/prod.compras.length*10)/10:1;
    let estado="ok";
    if(agotadoAt&&(!lastPurchase||agotadoAt>=lastPurchase))estado="comprar";
    else if(diasRestantes<=0)estado="comprar";
    else if(diasRestantes<=Math.round(frecuencia*0.3))estado="bajo";
    return{...prod,lastPurchase,agotadoAt,effectiveLastDate,daysSinceLast,frecuencia,diasRestantes,precioPromedio,cantidadPromedio,estado,numCompras:fechas.length,statusDoc};
  }).sort((a,b)=>{const o={comprar:0,bajo:1,ok:2};return(o[a.estado]||2)-(o[b.estado]||2)||a.diasRestantes-b.diasRestantes});
}

    });

  // Projection
  const monthlyCost=products.reduce((s,p)=>{const ppm=30/Math.max(1,p.frecuencia);return s+Math.round(ppm*p.cantidadPromedio*p.precioPromedio)},0);

  h+=`<div><p style="font-size:18px;font-weight:800">${products.length}</p><p style="font-size:9px;color:#94a3b8">Productos</p></div>`;
  h+=`<div><p style="font-size:18px;font-weight:800">${needBuy.length}</p><p style="font-size:9px;color:#94a3b8">Pendientes</p></div>`;
  h+=`</div></div>`;
  return h;
}

async function saveDespensaProduct(tipo){
  const nombre=$("desp-nombre")?.value?.trim();
  const frecuencia=parseInt($("desp-freq")?.value)||7;
  const valor=parseInt($("desp-valor")?.value)||0;
  if(!nombre){toast("Escribe el nombre del producto");return}
  const key=nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const data={uid:curUser.uid,producto:nombre,key:key,tipo:tipo,manual:true,frecuencia:frecuencia,valor:valor,agotadoAt:new Date().toISOString()};
  await fbSave("despensa",data);
  despensaData.push(data);
  toast("✓ "+nombre+" agregado a despensa");
  closeModal();
  render();
}

async function markDespensaEmpty(key,tipo){
  const existing=despensaData.find(d=>d.key===key&&d.tipo===tipo);
  if(existing){
    existing.agotadoAt=new Date().toISOString();
    await fbSave("despensa",{_id:existing._id,agotadoAt:existing.agotadoAt});
  }else{
    const data={uid:curUser.uid,key:key,tipo:tipo,agotadoAt:new Date().toISOString()};
    const id=await fbSave("despensa",data);
    if(id)data._id=id;
    despensaData.push(data);
  }
  toast("Marcado como agotado");
  render();
}

async function markDespensaStocked(key,tipo){
  const existing=despensaData.find(d=>d.key===key&&d.tipo===tipo);
  if(existing){
    existing.agotadoAt=null;
    await fbSave("despensa",{_id:existing._id,agotadoAt:null});
  }
  toast("✓ Marcado como abastecido");
  render();
}

async function removeDespensaProduct(key,tipo){
  const existing=despensaData.find(d=>d.key===key&&d.tipo===tipo&&d.manual);
  if(existing&&existing._id){
    await fbDel("despensa",existing._id);
    despensaData=despensaData.filter(d=>d._id!==existing._id);
    toast("✓ Producto eliminado");
  }else{
    // Just clear the agotado status
    const status=despensaData.find(d=>d.key===key&&d.tipo===tipo);
    if(status){
      status.agotadoAt=null;
      if(status._id)await fbSave("despensa",{_id:status._id,agotadoAt:null});
    }
    toast("✓ Estado limpiado");
  }
  render();
}

function exportDespensaXlsx(){
  const superProducts=buildDespensaCatalog(superProds,"super");
  const feriaProducts=buildDespensaCatalog(feriaProds,"feria");
  const toRow=p=>({"Producto":p.nombre,"Tipo":p.tipo==="super"?"Supermercado":"Feria","Compras":p.numCompras,"Frecuencia (días)":p.frecuencia,"Días desde última":p.daysSinceLast,"Estado":p.estado==="comprar"?"COMPRAR":p.estado==="bajo"?"BAJO":"OK","Precio Prom.":p.precioPromedio,"Manual":p.manual?"Sí":"No"});
  const data=superProducts.map(toRow).concat(feriaProducts.map(toRow));
  data.sort((a,b)=>{const o={COMPRAR:0,BAJO:1,OK:2};return(o[a.Estado]||2)-(o[b.Estado]||2)});
  const ws=XLSX.utils.json_to_sheet(data);
  ws["!cols"]=[{wch:28},{wch:14},{wch:10},{wch:16},{wch:18},{wch:10},{wch:14},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Despensa");
  XLSX.writeFile(wb,"SimpleFinance_Despensa_"+new Date().toISOString().slice(0,10)+".xlsx");
  toast("✓ Excel descargado");
}

function calcPagoCredito(c,myUid){
  const cuota=c.montoCuota||0;
  if(c.modoPago==="solo")return{miPago:c.titularUid===myUid?cuota:0,pagoTitular:cuota,pagoOtro:0};
  if(c.modoPago==="otro_paga")return{miPago:c.pagadorUid===myUid?cuota:0,pagoTitular:0,pagoOtro:cuota};
  if(c.modoPago==="compartido"){
    let pagoTitular=0,pagoOtro=0;
    if(c.divisionTipo==="equal"){pagoTitular=Math.round(cuota/2);pagoOtro=cuota-pagoTitular}
    else if(c.divisionTipo==="percent"){pagoTitular=Math.round(cuota*(c.divisionPctTitular||50)/100);pagoOtro=cuota-pagoTitular}
    else if(c.divisionTipo==="amount"){pagoTitular=c.divisionMontoTitular||0;pagoOtro=cuota-pagoTitular}
    const miPago=myUid===c.titularUid?pagoTitular:myUid===c.pagadorUid?pagoOtro:0;
    return{miPago,pagoTitular,pagoOtro};
  }
  return{miPago:0,pagoTitular:0,pagoOtro:0};
}

async function saveCredito(editId){
  const tipo=$("cred-tipo")?.value;
  const desc=$("cred-desc")?.value?.trim();
  const titularUid=$("cred-titular")?.value;
  const totalCuotas=parseInt($("cred-total-cuotas")?.value)||12;
  const cuotaActual=parseInt($("cred-cuota-actual")?.value)||0;
  const montoCuota=parseInt($("cred-monto")?.value)||0;
  const diaVencimiento=parseInt($("cred-dia-venc")?.value)||5;
  const fechaInicio=$("cred-fecha-inicio")?.value;
  const modoPago=document.querySelector('input[name="cred-modo"]:checked')?.value||"solo";

  if(!desc||!montoCuota){toast("Completa descripción y monto");return}

  const data={
    titularUid,tipoCredito:tipo,descripcion:desc,
    totalCuotas,cuotaActual,montoCuota,
    diaVencimiento,fechaInicio,
    modoPago,estado:"activo"
  };

  if(modoPago==="compartido"){
    data.pagadorUid=$("cred-pagador")?.value;
    data.divisionTipo=$("cred-division-tipo")?.value||"equal";
    if(data.divisionTipo==="percent")data.divisionPctTitular=parseInt($("cred-pct-titular")?.value)||50;
    if(data.divisionTipo==="amount")data.divisionMontoTitular=parseInt($("cred-monto-titular")?.value)||0;
  }else if(modoPago==="otro_paga"){
    data.pagadorUid=$("cred-otro-pagador")?.value;
  }

  try{
    if(editId){
      data._id=editId;
      await fbSave("creditos",data);
      creditosData=creditosData.map(c=>c._id===editId?{...c,...data}:c);
    }else{
      const id=await fbSave("creditos",data);
      if(id)data._id=id;
      creditosData.push(data);
    }
    toast("✓ Crédito "+(editId?"actualizado":"registrado"));
    closeModal();
    render();
  }catch(e){toast("Error: "+e.message)}
}

function deleteCredito(id){
  showCo("Eliminar","¿Eliminar este crédito?","Eliminar",async()=>{
    try{await fbDel("creditos",id);creditosData=creditosData.filter(c=>c._id!==id);toast("✓ Eliminado");render()}catch(e){toast("Error: "+e.message)}
  });
}

async function pagarCuotaCredito(id){
  const c=creditosData.find(x=>x._id===id);
  if(!c){toast("Crédito no encontrado");return}
  const nuevaCuota=(c.cuotaActual||0)+1;
  if(nuevaCuota>c.totalCuotas){
    c.estado="finalizado";c.cuotaActual=c.totalCuotas;
    await fbSave("creditos",{_id:id,estado:"finalizado",cuotaActual:c.totalCuotas});
    toast("✓ Crédito finalizado — todas las cuotas pagadas");
  }else{
    c.cuotaActual=nuevaCuota;
    await fbSave("creditos",{_id:id,cuotaActual:nuevaCuota});
    toast(`✓ Cuota ${nuevaCuota}/${c.totalCuotas} registrada`);
  }
  // Register as transaction
  const uid=curUser?.uid;
  const pago=calcPagoCredito(c,uid);
  if(pago.miPago>0){
    const txData={uid:uid,descripcion:`${c.descripcion} - Cuota ${nuevaCuota}/${c.totalCuotas}`,monto:pago.miPago,tipo:"egreso",fecha:new Date().toISOString().slice(0,10),macro:"Gastos Fijos",sub:c.tipoCredito,metodoPago:"Transferencia Bancaria",icon:"🏦",cuotasCredito:c.totalCuotas,cuotaActual:nuevaCuota};
    await fbSave("transactions",txData);
  }
  await loadAll();
  render();
}

async function saveEditedSupermarketPurchase(oldKey){
  const market=$("edit-super-market").value.trim();
  const tipo=$("edit-super-tipo").value;
  const fecha=$("edit-super-fecha").value;
  const metodo=$("edit-super-metodo").value;
  const cuotas=metodo==="Tarjeta Crédito"?parseInt($("edit-super-cuotas")?.value)||1:1;
  const interes=metodo==="Tarjeta Crédito"?parseFloat($("edit-super-interes")?.value)||0:0;
  const ownerUid=$("super-owner")?.value||curUser.uid;
  const categoria=$("super-categoria")?.value||"";
  const shareUserId=$("edit-super-share-user")?.value||"";
  const divType=$("edit-super-division")?.value||"equal";
  
  if(!market||!fecha||window.editSuperProductsTmp.length===0){
    toast("Completa todos los campos");
    return;
  }
  
  // Eliminar productos antiguos de Firestore
  const oldItems=superProds.filter(p=>p.supermercado===oldKey.split('_')[0]&&p.fecha===oldKey.split('_')[1]);
  for(let old of oldItems){if(old._id)await fbDel("supermercado",old._id).catch(()=>{})}
  superProds=superProds.filter(p=>!(p.supermercado===oldKey.split('_')[0]&&p.fecha===oldKey.split('_')[1]));
  
  let totalAmount=0;
  for(let p of window.editSuperProductsTmp){
    if(!p.producto||!p.cantidad||!p.valor){toast("Completa datos de todos los productos");return}
    const isShared=shareUserId?true:false;
    const data={uid:ownerUid,supermercado:market,tipo,fecha,producto:p.producto,cantidad:p.cantidad,valor:p.valor,subtotal:p.cantidad*p.valor,metodoPago:metodo,banco:$("edit-super-banco")?.value||"",cuotas,interes,compartida:isShared,categoria};
    if(ownerUid!==curUser.uid){data.registradoPor=curUser.uid;data.registradoPorNombre=curProfile.name}
    const id=await fbSave("supermercado",data);
    if(id)data._id=id;
    addToSyncQueue({type:"save",col:"supermercado",data});
    superProds.unshift(data);
    totalAmount+=p.cantidad*p.valor;
  }
  
  // Crear deuda si es compartida
  if(shareUserId&&totalAmount>0){
    let theyPay=Math.round(totalAmount/2);
    if(divType==="percent"){const pct=50;theyPay=totalAmount-Math.round(totalAmount*pct/100)}
    if(theyPay>0){
      const debtData={fromUid:shareUserId,toUid:ownerUid,amount:theyPay,descripcion:"Compra Supermercado "+market+" - "+fecha,fecha,divisionType:divType,cuotas:cuotas||1,txId:String(Date.now()),status:"pending"};
      const debtId=await fbSave("debts",debtData);
      if(debtId)debtData._id=debtId;
      addToSyncQueue({type:"save",col:"debts",data:debtData});
    }
  }
  
  toast("✓ Compra actualizada ("+window.editSuperProductsTmp.length+" productos)");
  closeModal();
  await loadAll();
}

async function deleteSuperProduct(id){
  showCo("Eliminar","¿Eliminar este producto?","Eliminar",async()=>{
    superProds=superProds.filter(p=>p._id!==id);
    if(id!==0)await fbDel("supermercado",id);
    addToSyncQueue({type:"delete",col:"supermercado",id});
    toast("✓ Eliminado");
    render();
  });
}

function addEditFeriaItem(){

function renderEditFeriaList(){
  const listEl=$("edit-feria-products-list");

  if(window.editFeriaItems.length===0){
    listEl.innerHTML=`<p style="text-align:center;color:var(--t3);font-size:11px;padding:16px 0">Sin artículos</p>`;
    if($("edit-feria-total-display"))$("edit-feria-total-display").textContent="$0";
    return;
  }
  let html="";
  window.editFeriaItems.forEach((p,i)=>{
    html+=`<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:12px">`;

    html+=`</div>`;
  });
  listEl.innerHTML=html;
  const total=window.editFeriaItems.reduce((s,p)=>s+(p.subtotal||p.valor||0),0);
  if($("edit-feria-total-display"))$("edit-feria-total-display").textContent=fmt(total);
  updateEditFeriaPayment();
}

function updateEditFeriaPayment(){
  const metodo=$("edit-feria-metodo")?.value;
  const bankSec=$("edit-feria-bank-section");
  const installSec=$("edit-feria-installments");
  const preview=$("edit-feria-payment-preview");
  if(!bankSec||!installSec||!preview)return;
  bankSec.style.display=(metodo!=="Efectivo")?"block":"none";
  if(metodo==="Tarjeta Crédito"){
    installSec.style.display="grid";
    const total=window.editFeriaItems.reduce((s,p)=>s+(p.subtotal||p.valor||0),0);
    const cuotas=parseInt($("edit-feria-cuotas")?.value)||1;
    const interes=parseFloat($("edit-feria-interes")?.value)||0;
    if(total>0){
      const conInteres=Math.round(total*(1+interes/100));
      const porCuota=Math.round(conInteres/cuotas);
      preview.textContent=`Total con interés: ${fmt(conInteres)} | ${cuotas} cuotas de ${fmt(porCuota)}`;
      preview.style.display="block";
    }else{preview.style.display="none"}
  }else{
    installSec.style.display="none";
    preview.style.display="none";
  }
}

async function saveEditFeriaPurchase(){
  try{
    const newFecha=$("edit-feria-fecha")?.value;
    const metodo=$("edit-feria-metodo")?.value;
    const banco=$("edit-feria-banco")?.value||"";
    const cuotas=metodo==="Tarjeta Crédito"?parseInt($("edit-feria-cuotas")?.value)||1:1;
    const interes=metodo==="Tarjeta Crédito"?parseFloat($("edit-feria-interes")?.value)||0:0;
    const ownerUid=$("edit-feria-owner")?.value||curUser.uid;
    const categoria=$("edit-feria-categoria")?.value||"";
    const shareUserId=$("edit-feria-share-user")?.value||"";
    const divType=$("edit-feria-division")?.value||"equal";
    const origFecha=window.editFeriaOriginalFecha;

    if(!newFecha){toast("Selecciona una fecha");return}
    if(!window.editFeriaItems||window.editFeriaItems.length===0){toast("Agrega al menos un artículo");return}

    for(let p of window.editFeriaItems){
      if(!p.producto?.trim()||!p.valor){toast("Completa todos los artículos");return}
    }

    // Delete original items
    const origItems=feriaProds.filter(p=>p.fecha===origFecha);
    const keptIds=new Set(window.editFeriaItems.filter(p=>p._id).map(p=>p._id));
    for(let orig of origItems){
      if(!keptIds.has(orig._id)){
        await fbDel("feria",orig._id);
        addToSyncQueue({type:"delete",col:"feria",id:orig._id});
      }
    }

    let totalAmount=0;
    const isShared=shareUserId?true:false;
    for(let p of window.editFeriaItems){
      const data={
        _id:p._id||undefined,
        uid:ownerUid,
        fecha:newFecha,
        producto:p.producto.trim(),
        valor:p.valor,
        subtotal:p.subtotal||p.valor,
        metodoPago:metodo,
        banco,cuotas,interes,
        compartida:isShared,
        categoria
      };
      if(ownerUid!==curUser.uid){data.registradoPor=curUser.uid;data.registradoPorNombre=curProfile.name}
      const savedId=await fbSave("feria",data);
      if(savedId&&!data._id)data._id=savedId;
      addToSyncQueue({type:"save",col:"feria",data});
      totalAmount+=p.valor;
    }

    // Crear deuda si es compartida
    if(shareUserId&&totalAmount>0){
      let theyPay=Math.round(totalAmount/2);
      if(divType==="percent"){const pct=50;theyPay=totalAmount-Math.round(totalAmount*pct/100)}
      if(theyPay>0){
        const debtData={fromUid:shareUserId,toUid:ownerUid,amount:theyPay,descripcion:"Compra Feria - "+newFecha,fecha:newFecha,divisionType:divType,cuotas:cuotas||1,txId:String(Date.now()),status:"pending"};
        const debtId=await fbSave("debts",debtData);
        if(debtId)debtData._id=debtId;
        addToSyncQueue({type:"save",col:"debts",data:debtData});
      }
    }

    toast("✓ Compra actualizada");
    closeModal();
    await loadAll();
  }catch(err){
    console.error("Error editando feria:",err);
    toast("Error al guardar: "+err.message);
  }
}

function updateOwnerInfo(){

function updateSuperPaymentDisplay(){
  const metodo=$("super-metodo").value;
  const bankSection=$("super-bank-section");
  const installDiv=$("super-installments-section");
  const preview=$("super-payment-preview");
  
  // Mostrar banco si es TC, Débito o Transferencia
  if(metodo==="Tarjeta Crédito"||metodo==="Tarjeta Débito"||metodo==="Transferencia"){
    bankSection.style.display="block";
  }else{
    bankSection.style.display="none";
  }
  
  if(metodo==="Tarjeta Crédito"){
    installDiv.style.display="grid";
    preview.style.display="block";
    
    const total=parseInt($("super-total").value)||0;
    const cuotas=parseInt($("super-cuotas").value)||1;
    const interes=parseFloat($("super-interes").value)||0;
    
    if(total>0){
      const conInteres=Math.round(total*(1+interes/100));
      const porCuota=Math.round(conInteres/cuotas);
      preview.textContent=`Total con interés: ${fmt(conInteres)} | Por cuota: ${fmt(porCuota)}`;
    }
  }else{
    installDiv.style.display="none";
    preview.style.display="none";
  }
}

function updateSuperSharePreview(){
  const divType=$("super-division-type").value;
  $("super-division-input").style.display=divType==="percent"?"block":"none";
  $("super-division-amount").style.display=divType==="amount"?"block":"none";
  
  const userId=$("super-share-user").value;
  const total=parseInt($("super-total").value)||0;
  
  if(!userId||total===0){
    $("super-share-preview").textContent="Selecciona usuario y agrega productos para ver el desglose";
    window.superSharedWith=null;
    return;
  }
  
  const user=allUsers.find(u=>u.uid===userId);
  let youPay=0,theyPay=0;
  
  if(divType==="equal"){
    youPay=Math.round(total/2);
    theyPay=total-youPay;
  }else if(divType==="percent"){
    const pct=parseInt($("super-division-percent").value)||50;
    youPay=Math.round(total*pct/100);
    theyPay=total-youPay;
  }else if(divType==="amount"){
    youPay=parseInt($("super-division-amount-val").value)||0;
    theyPay=total-youPay;
  }
  
  const preview=`<strong>Total: ${fmt(total)}</strong><br>💰 Tú pagas: ${fmt(youPay)}<br>💰 ${user.name} paga: ${fmt(theyPay)}`;
  $("super-share-preview").innerHTML=preview;
  window.superSharedWith={userId,divType,youPay,theyPay};
}

function importSuperBulk(){
  const text=$("super-bulk-import").value.trim();
  if(!text){
    toast("Pega los productos en el formato: Cantidad  Nombre  Valor");
    return;
  }
  
  const lines=text.split('\n').filter(l=>l.trim());
  let added=0;
  lines.forEach(line=>{
    const parts=line.split(/\s{2,}|\t/);
    if(parts.length>=3){
      const cantidad=parseInt(parts[0])||1;
      const producto=parts[1].trim();
      const valor=parseInt(parts[2])||0;
      if(producto&&valor){
        window.superProductsTmp.push({id:"sp_"+Date.now()+"_"+Math.random(),producto,cantidad,valor});
        added++;
      }
    }
  });
  
  if(added===0){
    toast("Formato inválido. Usa: Cantidad  Nombre  Valor");
  }else{
    toast(`✓ ${added} productos importados`);
    $("super-bulk-import").value="";
    updateSuperProductsList();
  }
}

  const checked=$("super-shared").checked;

  const divType=$("super-division-type").value;
  $("super-division-input").style.display=divType==="percent"?"block":"none";
  $("super-division-amount").style.display=divType==="amount"?"block":"none";

async function saveSupermarketPurchase(){
  try {
    const marketEl=$("super-market");
    const tipoEl=$("super-tipo");
    const fechaEl=$("super-fecha");
    const metodoEl=$("super-metodo");
    const bancoEl=$("super-banco");
    const userEl=$("super-share-user");
    
    if(!marketEl||!tipoEl||!fechaEl||!metodoEl){
      toast("Error: Elementos del formulario no encontrados");
      return;
    }
    
    const market=marketEl.value?.trim();
    const tipo=tipoEl.value;
    const fecha=fechaEl.value;
    const metodo=metodoEl.value;
    const banco=bancoEl?bancoEl.value:'';
    const cuotas=metodo==="Tarjeta Crédito"?parseInt($("super-cuotas").value)||1:1;
    const interes=metodo==="Tarjeta Crédito"?parseFloat($("super-interes").value)||0:0;
    const userId=userEl?userEl.value:'';
    
    // Validar que si es TC, Débito o Transferencia, debe tener banco
    if((metodo==="Tarjeta Crédito"||metodo==="Tarjeta Débito"||metodo==="Transferencia")&&!banco){
      toast("Selecciona el banco para este método de pago");
      return;
    }
    
    if(!market||!fecha||!window.superProductsTmp||window.superProductsTmp.length===0){
      toast("Completa todos los campos y agrega productos");
      return;
    }
    
    let savedCount=0;
    for(let p of window.superProductsTmp){
      if(!p.producto||!p.cantidad||!p.valor){
        toast("Completa datos de todos los productos");
        return;
      }
      const isShared=userId?true:false;
      const ownerUid=$("super-owner")?.value||curUser.uid;
      const categoria=$("super-categoria")?.value||"";
      const data={uid:ownerUid,supermercado:market,tipo,fecha,producto:p.producto,cantidad:p.cantidad,valor:p.valor,subtotal:p.cantidad*p.valor,metodoPago:metodo,banco,cuotas,interes,compartida:isShared,categoria};
      if(ownerUid!==curUser.uid){data.registradoPor=curUser.uid;data.registradoPorNombre=curProfile.name}
      await fbSave("supermercado",data);
      addToSyncQueue({type:"save",col:"supermercado",data});
      savedCount++;
    }
    
    // Si es compra compartida, crear deuda
    if(userId&&window.superSharedWith&&window.superSharedWith.theyPay>0){
      const shared=window.superSharedWith;
      const debtData={
        fromUid:shared.userId,
        toUid:$("super-owner")?.value||curUser.uid,
        amount:shared.theyPay,
        descripcion:`Compra Supermercado ${market} - ${fecha}`,
        fecha,
        divisionType:shared.divType,
        cuotas:cuotas||1,
        txId:String(Date.now()),
        status:"pending"
      };
      const debtId=await fbSave("debts",debtData);
      if(debtId)debtData._id=debtId;
      addToSyncQueue({type:"save",col:"debts",data:debtData});
    }
    
    toast(`✓ ${savedCount} productos guardados`);
    closeModal();
    await loadAll();
  } catch(err) {
    console.error("Error en saveSupermarketPurchase:",err);
    toast("Error al guardar: "+err.message);
  }
}

function updateFeriaPaymentDisplay(){
  const metodo=$("feria-metodo")?.value;
  const bankSection=$("feria-bank-section");
  const installDiv=$("feria-installments-section");
  const preview=$("feria-payment-preview");

  if(!bankSection||!installDiv||!preview)return;

  if(metodo==="Tarjeta Crédito"||metodo==="Tarjeta Débito"||metodo==="Transferencia"){
    bankSection.style.display="block";
  }else{
    bankSection.style.display="none";
  }

  if(metodo==="Tarjeta Crédito"){
    installDiv.style.display="grid";
    preview.style.display="block";
    const total=parseInt($("feria-total")?.value)||0;
    const cuotas=parseInt($("feria-cuotas")?.value)||1;
    const interes=parseFloat($("feria-interes")?.value)||0;
    if(total>0){
      const conInteres=Math.round(total*(1+interes/100));
      const porCuota=Math.round(conInteres/cuotas);
      preview.textContent=`Total con interés: ${fmt(conInteres)} | ${cuotas} cuotas de ${fmt(porCuota)}`;
    }else{
      preview.textContent="Agrega artículos para ver proyección";
    }
  }else{
    installDiv.style.display="none";
    preview.style.display="none";
  }
}

function updateFeriaSharePreview(){
  const userId=$("feria-share-user")?.value;
  const divType=$("feria-division-type")?.value;
  const previewEl=$("feria-share-preview");
  const divInput=$("feria-division-input");
  const divAmount=$("feria-division-amount");

  if(!previewEl)return;

  if(divInput) divInput.style.display=divType==="percent"?"block":"none";
  if(divAmount) divAmount.style.display=divType==="amount"?"block":"none";

  if(!userId){
    previewEl.style.display="none";
    window.feriaSharedWith=null;
    return;
  }

  const total=window.feriaProductsTmp.reduce((s,p)=>s+(p.subtotal||p.valor||0),0);
  if(total<=0){previewEl.style.display="block";previewEl.textContent="Agrega artículos para ver el desglose";return}

  let youPay=0,theyPay=0;
  if(divType==="equal"){youPay=Math.round(total/2);theyPay=total-youPay;}
  else if(divType==="percent"){const pct=parseInt($("feria-division-percent")?.value)||50;youPay=Math.round(total*pct/100);theyPay=total-youPay;}
  else if(divType==="amount"){youPay=parseInt($("feria-division-amount-val")?.value)||0;theyPay=total-youPay;}

  const userName=allUsers.find(u=>u.uid===userId)?.name||"Usuario";
  previewEl.style.display="block";
  previewEl.textContent=`Tú: ${fmt(youPay)} | ${userName}: ${fmt(theyPay)}`;
  previewEl.style.color=theyPay>0?"#10b981":"#f59e0b";
  window.feriaSharedWith={userId,divType,youPay,theyPay};
}

function updateFeriaOwner(){

}

function importFeriaBulk(){
  const text=$("feria-bulk-import")?.value?.trim();
  if(!text){
    toast("Pega los productos en el formato: Nombre  Valor");
    return;
  }

  const lines=text.split('\n').filter(l=>l.trim());
  let added=0;
  lines.forEach(line=>{
    const parts=line.split(/\s{2,}|\t/);
    if(parts.length>=2){
      const producto=parts[0].trim();
      const valor=parseInt(parts[parts.length-1])||0;
      if(producto&&valor){
        window.feriaProductsTmp.push({producto,valor,subtotal:valor});
        added++;
      }
    }
  });

  if(added===0){
    toast("Formato inválido. Usa: Nombre  Valor");
  }else{
    toast(`✓ ${added} productos importados`);
    $("feria-bulk-import").value="";
    updateFeriaProductsList();
  }
}

async function saveFeriaPurchase(){
  try {
    const fechaEl=$("feria-fecha");
    const metodoEl=$("feria-metodo");
    const bancoEl=$("feria-banco");
    const userEl=$("feria-share-user");

    if(!fechaEl||!metodoEl){toast("Error: formulario no encontrado");return}

    const fecha=fechaEl.value;
    const metodo=metodoEl.value;
    const banco=bancoEl?bancoEl.value:'';
    const cuotas=metodo==="Tarjeta Crédito"?parseInt($("feria-cuotas")?.value)||1:1;
    const interes=metodo==="Tarjeta Crédito"?parseFloat($("feria-interes")?.value)||0:0;
    const userId=userEl?userEl.value:'';

    if((metodo==="Tarjeta Crédito"||metodo==="Tarjeta Débito"||metodo==="Transferencia")&&!banco){
      toast("Selecciona el banco");return;
    }

    if(!fecha||!window.feriaProductsTmp||window.feriaProductsTmp.length===0){
      toast("Agrega al menos un artículo");return;
    }

    let savedCount=0;
    for(let p of window.feriaProductsTmp){
      if(!p.producto||!p.valor){toast("Completa todos los artículos");return}
      const isShared=userId?true:false;
      const ownerUid=$("feria-owner")?.value||curUser.uid;
      const categoria=$("feria-categoria")?.value||"";
      const data={
        uid:ownerUid,
        fecha,
        producto:p.producto,
        valor:p.valor,
        subtotal:p.subtotal||p.valor,
        metodoPago:metodo,
        banco,
        cuotas,
        interes,
        compartida:isShared,
        categoria
      };
      if(ownerUid!==curUser.uid){data.registradoPor=curUser.uid;data.registradoPorNombre=curProfile.name}
      await fbSave("feria",data);
      addToSyncQueue({type:"save",col:"feria",data});
      savedCount++;
    }

    if(userId&&window.feriaSharedWith&&window.feriaSharedWith.theyPay>0){
      const shared=window.feriaSharedWith;
      const debtData={
        fromUid:shared.userId,
        toUid:$("feria-owner")?.value||curUser.uid,
        amount:shared.theyPay,
        descripcion:`Compra Feria - ${fecha}`,
        fecha,
        divisionType:shared.divType,
        cuotas:cuotas||1,
        txId:String(Date.now()),
        status:"pending"
      };
      const debtId=await fbSave("debts",debtData);
      if(debtId)debtData._id=debtId;
      addToSyncQueue({type:"save",col:"debts",data:debtData});
    }

    toast(`✓ ${savedCount} artículos guardados`);
    closeModal();
    await loadAll();
  } catch(err) {
    console.error("Error en saveFeriaPurchase:",err);
    toast("Error al guardar: "+err.message);
  }
}

async function saveTx(){
  const monto=parseInt($("tx-monto")?.value);
  const desc=$("tx-desc")?.value.trim();
  const fecha=$("tx-fecha")?.value;
  const metodo=$("tx-metodo")?.value;
  const ownerUid=$("tx-owner")?.value||curUser.uid;
  const isOtherUser=ownerUid!==curUser.uid;
  
  if(!monto||!desc||!fecha||!window.formState.macro||!window.formState.sub||!metodo){
    toast("Completa todos los campos requeridos");
    return;
  }
  
  const txId=window.editingTxId;
  
  const data={
    uid:ownerUid,
    descripcion:desc,
    monto,
    tipo:window.formState.tipo,
    fecha,
    macro:window.formState.macro,
    sub:window.formState.sub,
    metodoPago:metodo
  };
  
  // Si lo registra otro usuario, guardar quién lo registró
  if(isOtherUser){
    data.registradoPor=curUser.uid;
    data.registradoPorNombre=curProfile.name;
  }
  
  if(userCategories[data.macro]&&userCategories[data.macro].subs[data.sub]){
    data.icon=userCategories[data.macro].subs[data.sub].icon;
  }
  
  if(metodo==='Tarjeta Crédito'){
    const banco=$("tx-banco")?.value||'';
    data.bancoPago=banco;
    data.cuotas=parseInt($("tx-cuotas")?.value)||null;
    data.interes=parseFloat($("tx-interes")?.value)||null;
  }
  
  // Credit installment data
  const cuotasCredito=parseInt($("tx-cuotas-credito")?.value)||0;
  const cuotaActual=parseInt($("tx-cuota-actual")?.value)||0;
  if(cuotasCredito>0){
    data.cuotasCredito=cuotasCredito;
    data.cuotaActual=cuotaActual||1;
  }
  
  // Lógica de compartir gasto
  const hasSharedWith=window.formState.sharedWith;
  
  if(hasSharedWith){
    data.sharedWith=window.formState.sharedWith;
    data.divisionType=window.formState.divisionType||"equal";
    if(window.formState.divisionType==="percent")data.divisionPercent=window.formState.divisionPercent||50;
    if(window.formState.divisionType==="amount")data.divisionAmount=window.formState.divisionAmount||0;
    
    let amountOther=0;
    const divType=window.formState.divisionType||"equal";
    if(divType==="equal"){
      amountOther=Math.round(monto/2);
    }else if(divType==="percent"){
      const tuPorcentaje=window.formState.divisionPercent||50;
      amountOther=monto-Math.round(monto*tuPorcentaje/100);
    }else if(divType==="amount"){
      amountOther=window.formState.divisionAmount||0;
    }
    
    if(amountOther>0){
      const debtData={
        fromUid:window.formState.sharedWith,
        toUid:ownerUid,
        amount:amountOther,
        descripcion:desc,
        fecha,
        divisionType:window.formState.divisionType||"equal",
        cuotas:data.cuotas||1,
        txId:txId||String(Date.now()),
        status:"pending"
      };
      const debtId=await fbSave("debts",debtData);
      if(debtId)debtData._id=debtId;
      addToSyncQueue({type:"save",col:"debts",data:debtData});
    }
  }else if(isOtherUser){
    // Sin compartir pero registrado a nombre de otro usuario = deuda total
    const debtData={
      fromUid:curUser.uid,
      toUid:ownerUid,
      amount:monto,
      descripcion:desc+" (registrado por "+curProfile.name+")",
      fecha,
      divisionType:"full",
      cuotas:data.cuotas||1,
      txId:txId||String(Date.now()),
      status:"pending"
    };
    const debtId=await fbSave("debts",debtData);
    if(debtId)debtData._id=debtId;
    addToSyncQueue({type:"save",col:"debts",data:debtData});
  }
  
  try{
    if(txId){
      await db.collection("transactions").doc(txId).set(data,{merge:true});
      const idx=txs.findIndex(t=>t._id===txId);
      if(idx>=0)txs[idx]={_id:txId,...data};
      toast("Transacción actualizada");
    }else{
      const docRef=await db.collection("transactions").add(data);
      txs.unshift({_id:docRef.id,...data});
      toast("Transacción guardada");
    }
    closeModal();
    if(window._adminViewing){
      const adminUid=window._adminViewing.uid;
      await loadAll();
      viewAdminUser(adminUid);
    }else{
      await loadAll();
    }
  }catch(err){
    console.error("Error al guardar:",err);
    toast("Error al guardar: "+err.message);
  }
}

  $("mo").classList.remove("hidden");
}

async function saveEditDebt(debtId){
  const desc=$("edit-debt-desc")?.value.trim();
  const amount=parseInt($("edit-debt-amount")?.value)||0;
  const fecha=$("edit-debt-fecha")?.value;
  const division=$("edit-debt-division")?.value;
  if(!desc||amount<=0||!fecha){toast("Completa todos los campos con valores válidos");return}
  try{
    await fbSave("debts",{_id:debtId,descripcion:desc,amount,fecha,divisionType:division});
    debts=debts.map(d=>d._id===debtId?{...d,descripcion:desc,amount,fecha,divisionType:division}:d);
    toast("✓ Deuda actualizada");
    closeModal();
    render();
  }catch(e){toast("Error: "+e.message)}
}

function goToDebtTx(debtId){
  const d=debts.find(x=>x._id===debtId);
  if(!d){toast("Deuda no encontrada");return}

  // Try to find related transaction by txId
  let foundTx=null;
  if(d.txId){
    foundTx=txs.find(t=>t._id===d.txId);
  }
  // Fallback: search by description and date
  if(!foundTx){
    foundTx=txs.find(t=>t.descripcion===d.descripcion&&t.fecha===d.fecha);
  }
  // Check in super
  if(!foundTx&&d.descripcion?.includes("Supermercado")){
    nav("supermercado");
    toast("📋 Mostrando Supermercado — busca la compra del "+d.fecha);
    return;
  }
  // Check in feria
  if(!foundTx&&d.descripcion?.includes("Feria")){
    nav("feria");
    toast("📋 Mostrando Feria — busca la compra del "+d.fecha);
    return;
  }

  if(foundTx){
    // Navigate to Movimientos and open edit modal
    nav("movimientos");
    setTimeout(()=>openModal(foundTx._id),300);
  }else{
    // Show debt detail modal with all info
    const fromName=getUserName(d.fromUid);
    const toName=getUserName(d.toUid);
    let h=`<div style="text-align:center;margin-bottom:12px"><span style="font-size:28px">📋</span><h3 style="font-size:16px;font-weight:700;margin:4px 0">Detalle de Deuda</h3></div>`;
    h+=`<div style="padding:14px;background:#f8fafc;border-radius:10px;margin-bottom:12px">`;
    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:10px;color:var(--t3)">Descripción</span><span style="font-size:12px;font-weight:600">${d.descripcion||"---"}</span></div>`;
    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:10px;color:var(--t3)">Monto</span><span style="font-size:14px;font-weight:800;color:#f43f5e">${fmt(d.amount)}</span></div>`;
    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:10px;color:var(--t3)">Fecha</span><span style="font-size:12px">${d.fecha}</span></div>`;
    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:10px;color:var(--t3)">Deudor</span><span style="font-size:12px;font-weight:600">${fromName}</span></div>`;
    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:10px;color:var(--t3)">Acreedor</span><span style="font-size:12px;font-weight:600">${toName}</span></div>`;
    h+=`<div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--t3)">División</span><span style="font-size:12px">${d.divisionType||"---"}</span></div>`;
    h+=`</div>`;
    h+=`<p style="font-size:9px;color:var(--t3);text-align:center;margin-bottom:10px">No se encontró la transacción original vinculada</p>`;
    h+=`<button class="bp" style="margin:0;width:100%" onclick="closeModal()">Cerrar</button>`;
    $("modal-body").innerHTML=h;
    $("mo").classList.remove("hidden");
  }
}

function deleteDebt(debtId){
  showCo("Eliminar Deuda","¿Eliminar esta deuda? Esta acción no se puede deshacer.","Eliminar",async()=>{
    try{
      await fbDel("debts",debtId);
      debts=debts.filter(d=>d._id!==debtId);
      toast("✓ Deuda eliminada");
      render();
    }catch(e){toast("Error: "+e.message)}
  });
}

</script>
